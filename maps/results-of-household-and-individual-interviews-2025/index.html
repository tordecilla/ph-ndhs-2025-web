<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results of the Household and Individual Interviews</title>
<style>
  :root {
    --bg:               #edf1f7;
    --panel-bg:         #ffffff;
    --panel-border:     rgba(0,0,0,0.09);
    --panel-divider:    rgba(0,0,0,0.07);
    --title-color:      #1a2840;
    --section-color:    rgba(0,0,0,0.34);
    --text-color:       rgba(0,0,0,0.68);
    --muted-color:      rgba(0,0,0,0.45);
    --scroll-thumb:     rgba(0,0,0,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    min-height: 100%;
    background: var(--bg);
    color: var(--text-color);
    font-family: 'Inter', system-ui, sans-serif;
  }

  main {
    padding: 28px 28px 56px;
  }

  #tables-container {
    max-width: 1280px;
    margin: 0 auto;
  }

  .page-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--title-color);
    line-height: 1.25;
    margin-bottom: 4px;
  }

  .page-subtitle {
    font-size: 12px;
    color: var(--muted-color);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .dt-section {
    margin-bottom: 24px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    padding: 16px;
  }

  .dt-section-label {
    font: 10px/1 'IBM Plex Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--section-color);
    margin-bottom: 12px;
  }

  .dt-table-wrap {
    overflow-x: auto;
  }

  .dt-table-wrap::-webkit-scrollbar { height: 6px; }
  .dt-table-wrap::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 3px; }

  .dt-table {
    width: 100%;
    min-width: 780px;
    border-collapse: collapse;
    font-size: 12px;
  }

  .dt-table thead th {
    font: 10px/1.3 'IBM Plex Mono', monospace;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted-color);
    padding: 6px 10px 8px;
    text-align: right;
    vertical-align: bottom;
    border-bottom: 2px solid var(--panel-border);
    white-space: nowrap;
  }

  .dt-table thead th:first-child {
    text-align: left;
    min-width: 320px;
    white-space: normal;
  }

  .dt-table tbody tr { border-bottom: 1px solid var(--panel-divider); }
  .dt-table tbody tr:last-child { border-bottom: none; }

  .dt-table tbody td {
    padding: 8px 10px;
    color: var(--text-color);
    text-align: right;
    white-space: nowrap;
  }

  .dt-table tbody td:first-child {
    text-align: left;
    color: var(--title-color);
    white-space: normal;
  }

  .dt-footnotes {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--panel-divider);
  }

  .dt-note {
    font-size: 11px;
    color: var(--muted-color);
    line-height: 1.7;
    margin-bottom: 2px;
  }

  .dt-source {
    font-size: 11px;
    color: var(--muted-color);
    margin-top: 10px;
    font-style: italic;
  }

  @media (max-width: 720px) {
    main { padding: 20px 16px 40px; }
  }
</style>
</head>
<body>
<main>
  <div id="tables-container"></div>
</main>
<script>
const tablesContainer = document.getElementById('tables-container');

function el(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text != null) node.textContent = text;
  return node;
}

function renderTableSection(table) {
  const section = el('section', 'dt-section');
  section.appendChild(el('div', 'dt-section-label', table.title || ''));

  const wrap = el('div', 'dt-table-wrap');
  const grid = el('table', 'dt-table');
  wrap.appendChild(grid);
  section.appendChild(wrap);

  const thead = grid.createTHead();
  const headRow = thead.insertRow();
  (table.columns || []).forEach((col, i) => {
    const th = document.createElement('th');
    th.textContent = col;
    if (i === 0) th.style.textAlign = 'left';
    headRow.appendChild(th);
  });

  const tbody = grid.createTBody();
  (table.rows || []).forEach(row => {
    const tr = tbody.insertRow();
    const first = tr.insertCell();
    first.textContent = row.label || '';
    (row.values || []).forEach(v => {
      const td = tr.insertCell();
      td.textContent = v == null ? 'NA' : String(v);
    });
  });

  tablesContainer.appendChild(section);
}

async function boot() {
  try {
    const config = await fetch('./data.json').then(r => r.json());
    document.title = config.title || document.title;
    const tableData = config.tableData || {};

    tablesContainer.appendChild(el('div', 'page-title', tableData.title || config.title || ''));
    if (tableData.subtitle) {
      tablesContainer.appendChild(el('div', 'page-subtitle', tableData.subtitle));
    }

    (tableData.tables || []).forEach(renderTableSection);

    if ((tableData.footnotes || []).length || tableData.source) {
      const foot = el('div', 'dt-footnotes');
      (tableData.footnotes || []).forEach(note => foot.appendChild(el('div', 'dt-note', note)));
      if (tableData.source) {
        foot.appendChild(el('div', 'dt-source', `Source: ${tableData.source}`));
      }
      tablesContainer.appendChild(foot);
    }
  } catch (err) {
    tablesContainer.appendChild(el('div', 'page-subtitle', 'Unable to load data table.'));
    console.error(err);
  }
}

boot();
</script>
</body>
</html>
