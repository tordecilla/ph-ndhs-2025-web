<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Table 2 - Background Characteristics</title>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<style>
  /* Ã¢â€â‚¬Ã¢â€â‚¬ Theme variables (matches map engine) Ã¢â€â‚¬Ã¢â€â‚¬ */
  :root {
    --bg:               #edf1f7;
    --panel-bg:         #ffffff;
    --panel-border:     rgba(0,0,0,0.09);
    --panel-divider:    rgba(0,0,0,0.07);
    --poly-fill:        #bacfe3;
    --poly-stroke:      rgba(40,65,105,0.3);
    --hover-stroke:     #2a3f60;
    --label-fill:       #1a2840;
    --label-stroke:     rgba(237,241,247,0.92);
    --btn-bg:           rgba(0,0,0,0.06);
    --btn-border:       rgba(0,0,0,0.18);
    --btn-color:        #1a2840;
    --btn-hover-bg:     rgba(0,0,0,0.11);
    --status-color:     #556;
    --status-bg:        rgba(255,255,255,0.88);
    --close-color:      rgba(0,0,0,0.35);
    --close-hover:      #000;
    --eyebrow-color:    rgba(0,0,0,0.38);
    --lgu-name-color:   #1a2840;
    --region-color:     rgba(0,0,0,0.48);
    --scroll-thumb:     rgba(0,0,0,0.1);
    --text-color:       rgba(0,0,0,0.68);
    --no-data-color:    rgba(0,0,0,0.28);
    --section-color:    rgba(0,0,0,0.28);
    --drag-handle:      rgba(0,0,0,0.12);
    --mobile-border:    rgba(0,0,0,0.1);
    --ring-color:       rgba(0,0,0,0.3);
    --data-label-color: rgba(0,0,0,0.42);
    --data-value-color: rgba(0,0,0,0.85);
    /* chart-specific */
    --bar-2025:         #2a5f8f;
    --bar-2022:         #bacfe3;
    --chart-axis:       rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
  }

  /* Ã¢â€â‚¬Ã¢â€â‚¬ Tab bar Ã¢â€â‚¬Ã¢â€â‚¬ */
  #tab-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: 6px;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--panel-divider);
    overflow-x: auto; white-space: nowrap;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-color); font: 11px 'IBM Plex Mono', monospace;
    padding: 5px 13px; cursor: pointer;
    letter-spacing: 0.4px;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--btn-hover-bg);
    border-color: rgba(0,0,0,0.36);
  }
  .tab-btn:hover { background: var(--btn-hover-bg); }

  /* Ã¢â€â‚¬Ã¢â€â‚¬ Tab panels Ã¢â€â‚¬Ã¢â€â‚¬ */
  .tab-panel {
    display: none;
    position: fixed; top: 46px; left: 0; right: 0; bottom: 0;
  }
  .tab-panel.active { display: block; }

  /* Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â
     Charts tab
  Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â */
  #tab-charts {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-charts::-webkit-scrollbar { width: 4px; }
  
  #charts-container {
    max-width: 1480px;
    margin: 0 auto;
  }
.chart-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .chart-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 24px; line-height: 1.6;
  }
  .chart-legend {
    display: flex; gap: 14px; margin-top: 8px;
    font: 11px 'IBM Plex Mono', monospace; color: var(--data-label-color); align-items: center;
  }
  .legend-swatch {
    display: inline-block; width: 12px; height: 12px;
    border-radius: 2px; margin-right: 4px; vertical-align: middle;
  }
  .legend-swatch.s2022 { border: 1px solid rgba(0,0,0,0.15); }

  /* Ã¢â€â‚¬Ã¢â€â‚¬ Chart grid Ã¢â€â‚¬Ã¢â€â‚¬ */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0 32px;
    align-items: start;
  }
  @media (min-width: 780px) {
    .chart-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .chart-group {
    margin-bottom: 36px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px 16px 14px;
  }
  .chart-group-label {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 14px;
  }
  .chart-svg-wrap { width: 100%; }
  .chart-svg-wrap svg { display: block; width: 100%; overflow: visible; }

  .chart-footnotes {
    margin-top: 32px; padding-top: 16px;
    border-top: 1px solid var(--panel-divider);
  }
  .chart-note {
    font-size: 11px; color: var(--data-label-color); line-height: 1.7;
    margin-bottom: 2px;
  }
  .source-line {
    font-size: 11px; color: var(--data-label-color); margin-top: 10px;
    font-style: italic;
  }

  /* Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â
     Data Tables tab
  Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â */
  #tab-tables {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-tables::-webkit-scrollbar { width: 4px; }
  #tab-tables::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }

  #tables-container {
    max-width: 860px;
    margin: 0 auto;
  }

  .dt-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .dt-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 28px; line-height: 1.6;
  }

  .dt-section {
    margin-bottom: 24px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px 16px 4px;
  }
  .dt-section-label {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 12px;
  }
  .dt-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .dt-table thead th {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--data-label-color);
    padding: 6px 10px 8px;
    text-align: right;
    border-bottom: 2px solid var(--panel-border);
  }
  .dt-table thead th:first-child { text-align: left; }
  .dt-table tbody tr {
    border-bottom: 1px solid var(--panel-divider);
  }
  .dt-table tbody tr:last-child { border-bottom: none; }
  .dt-table tbody td {
    padding: 7px 10px;
    color: var(--text-color);
    text-align: right;
  }
  .dt-table tbody td:first-child {
    text-align: left;
    color: var(--lgu-name-color);
  }
  .dt-table td.na { color: var(--no-data-color); font-style: italic; }

  .dt-footnotes {
    margin-top: 32px; padding-top: 16px;
    border-top: 1px solid var(--panel-divider);
  }
  .dt-note {
    font-size: 11px; color: var(--data-label-color); line-height: 1.7; margin-bottom: 2px;
  }
  .dt-source {
    font-size: 11px; color: var(--data-label-color); margin-top: 10px; font-style: italic;
  }

  /* Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â
     Map tab
  Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â */
  #tab-map { overflow: hidden; }

  #map-svg { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  #map-svg:active { cursor: grabbing; }
  .svg-bg { fill: var(--bg); }

  .region     { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.8; cursor: pointer; }
  .region:hover { opacity: 0.82; stroke: var(--hover-stroke); stroke-width: 1.5; }

  .map-label {
    fill: var(--label-fill); font-family: 'IBM Plex Mono', monospace; font-weight: 700;
    text-anchor: middle; dominant-baseline: middle;
    pointer-events: none; letter-spacing: 0.3px;
  }

  #map-status {
    position: absolute; bottom: 8px; left: 12px;
    color: var(--status-color); font: 11px 'IBM Plex Mono', monospace;
    background: var(--status-bg); padding: 3px 8px;
    pointer-events: none; z-index: 10;
  }
  #map-info-btn {
    position: absolute; bottom: 16px; right: 16px; font-size: 15px; padding: 6px 12px;
    background: var(--btn-bg); border: 1px solid var(--btn-border);
    color: var(--btn-color); font-family: 'IBM Plex Mono', monospace; cursor: pointer;
    transition: background 0.15s; z-index: 10; display: none;
  }
  #map-info-btn:hover { background: var(--btn-hover-bg); }

  /* Detail panel */
  #map-detail {
    position: absolute; top: 0; right: -380px; bottom: 0; width: 360px;
    background: var(--panel-bg); border-left: 1px solid var(--panel-border);
    display: flex; flex-direction: column;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 20; overflow: hidden;
  }
  #map-detail.open { right: 0; }

  @media (pointer: coarse) {
    #map-detail {
      width: 100%; right: 0; top: auto; bottom: 0; height: 55vh;
      border-left: none; border-top: 1px solid var(--mobile-border);
      border-radius: 14px 14px 0 0;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    }
    #map-detail.open { transform: translateY(0); }
    #map-detail.peek { transform: translateY(calc(100% - 56px)); }
    #map-detail-header { padding-top: 22px; }
    #map-detail::before {
      content: ''; display: block; width: 36px; height: 4px;
      background: var(--drag-handle); border-radius: 2px;
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    }
  }

  #map-detail-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--panel-divider); flex-shrink: 0;
  }
  #map-detail-header-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .detail-eyebrow {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--eyebrow-color); margin-bottom: 6px;
  }
  .detail-lgu-name {
    font-size: 22px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.2; margin-bottom: 4px;
  }
  .detail-region { font-size: 12px; color: var(--region-color); }
  #map-detail-close {
    background: none; border: none; color: var(--close-color);
    font-size: 18px; cursor: pointer; transition: color 0.15s; line-height: 1;
  }
  #map-detail-close:hover { color: var(--close-hover); }
  #map-detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  #map-detail-body::-webkit-scrollbar { width: 3px; }
  #map-detail-body::-webkit-scrollbar-thumb { background: var(--scroll-thumb); }

  .data-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 1px solid var(--panel-divider); gap: 12px;
  }
  .data-row:last-child { border-bottom: none; }
  .data-label { font: 10px 'IBM Plex Mono', monospace; letter-spacing: 0.8px; text-transform: uppercase; color: var(--data-label-color); flex-shrink: 0; }
  .data-value { font-size: 13px; color: var(--data-value-color); text-align: right; }
  .no-findings { text-align: center; padding: 40px 0; color: var(--no-data-color); font-size: 13px; line-height: 1.8; }
  .section-head { font: 10px 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase; color: var(--section-color); margin: 16px 0 8px; }
  .legend-bar { height: 10px; border-radius: 2px; margin: 6px 0 4px; }
  .legend-ends { display: flex; justify-content: space-between; font: 10px 'IBM Plex Mono', monospace; color: var(--data-label-color); }
  .ranked-row {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 0; border-bottom: 1px solid var(--panel-divider);
  }
  .ranked-row:last-child { border-bottom: none; }
  .ranked-i   { font: 10px 'IBM Plex Mono', monospace; color: var(--data-label-color); min-width: 20px; text-align: right; flex-shrink: 0; }
  .ranked-swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ranked-name { flex: 1; font-size: 12px; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .ranked-row.is-active .ranked-name { color: var(--lgu-name-color); font-weight: 600; }
  .ranked-val { font: 11px 'IBM Plex Mono', monospace; color: var(--data-value-color); flex-shrink: 0; }
  .ranked-row.is-active .ranked-val { color: var(--lgu-name-color); }
</style>
</head>
<body>

<!-- Ã¢â€â‚¬Ã¢â€â‚¬ Tab bar Ã¢â€â‚¬Ã¢â€â‚¬ -->
<div id="tab-bar">
  <button class="tab-btn active" data-tab="map">Maps</button>
  <button class="tab-btn"        data-tab="charts">Charts</button>
  <button class="tab-btn"        data-tab="tables">Data Tables</button>
</div>

<!-- Ã¢â€¢ÂÃ¢â€¢Â Map panel Ã¢â€¢ÂÃ¢â€¢Â -->
<div id="tab-map" class="tab-panel active">

  <svg id="map-svg"><rect class="svg-bg" width="100%" height="100%"/></svg>
  <div id="map-status">Loading...</div>
  <button id="map-info-btn">ℹ Details</button>
  <div id="map-detail">
    <div id="map-detail-header">
      <div id="map-detail-header-row">
        <div class="detail-eyebrow" id="map-eyebrow">-</div>
        <button id="map-detail-close">✕</button>
      </div>
      <div class="detail-lgu-name" id="map-lgu-name">-</div>
      <div class="detail-region"   id="map-region-label">-</div>
    </div>
    <div id="map-detail-body"></div>
  </div>
</div>

<!-- Ã¢â€¢ÂÃ¢â€¢Â Charts panel Ã¢â€¢ÂÃ¢â€¢Â -->
<div id="tab-charts" class="tab-panel">
  <div id="charts-container"></div>
</div>

<!-- Ã¢â€¢ÂÃ¢â€¢Â Data Tables panel Ã¢â€¢ÂÃ¢â€¢Â -->
<div id="tab-tables" class="tab-panel">
  <div id="tables-container"></div>

<script>

let appData       = null;

function notifyParentHash(hash) {
  try { window.parent.postMessage({ type: 'child-hash', hash }, '*'); } catch (e) {}
}

function switchTab(tab, replace = false) {
  activeTab = ['charts', 'tables'].includes(tab) ? tab : 'map';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + activeTab));
  if (activeTab === 'charts' && appData && !chartsReady) {
    chartsReady = true;
    renderCharts(appData);
  }
  if (activeTab === 'tables' && appData && !tablesReady) {
    tablesReady = true;
    renderTables(appData);
  }
  const nextHash = '#' + activeTab;
  if (location.hash !== nextHash) {
    if (replace) history.replaceState(null, '', nextHash);
    else history.pushState(null, '', nextHash);
  }
  notifyParentHash(activeTab);
}

// CHARTS
// Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â

function renderCharts(data) {
  const container = document.getElementById('charts-container');
  container.innerHTML = '';

  // Header
  const hdr = el('div');
  hdr.innerHTML = `
    <div class="chart-page-title">${data.title}</div>
    <div class="chart-page-subtitle">${data.subtitle}</div>
  `;
  container.appendChild(hdr);

  // Groups in a 2-column grid on desktop
  const grid = el('div', 'chart-grid');
  container.appendChild(grid);

  data.chartGroups.forEach(group => {
    const groupDiv = el('div', 'chart-group');
    const labelDiv = el('div', 'chart-group-label');
    labelDiv.textContent = group.label;
    groupDiv.appendChild(labelDiv);
    drawGroupChart(groupDiv, group);
    grid.appendChild(groupDiv);
  });

  // Footnotes
  if (data.notes && data.notes.length) {
    const foot = el('div', 'chart-footnotes');
    data.notes.forEach(n => {
      const d = el('div', 'chart-note');
      d.textContent = n;
      foot.appendChild(d);
    });
    container.appendChild(foot);
  }

  if (data.source) {
    const src = el('div', 'source-line');
    src.textContent = 'Source: ' + data.source;
    container.appendChild(src);
  }
}

function renderTables(data) {
  const container = document.getElementById('tables-container');
  container.innerHTML = '';

  const hdr = el('div');
  hdr.innerHTML = `
    <div class="dt-page-title">${data.title}</div>
    <div class="dt-page-subtitle">${data.subtitle}</div>
  `;
  container.appendChild(hdr);

  // Helper: value cell (no superscript Ã¢â‚¬â€ footnote refs go on the label)
  function valCell(value, suffix) {
    const cell = document.createElement('td');
    if (value != null) {
      cell.textContent = value + suffix;
    } else {
      cell.textContent = 'N/A';
      cell.className = 'na';
    }
    return cell;
  }

  // Helper: label cell with optional trailing superscript (matches XLSX placement)
  function labelCell(text, noteRef) {
    const cell = document.createElement('td');
    cell.textContent = text;
    if (noteRef) {
      const sup = document.createElement('sup');
      sup.style.cssText = 'font-size:9px;margin-left:1px';
      sup.textContent = noteRef;
      cell.appendChild(sup);
    }
    return cell;
  }

  // Helper: build a two-column (2025 | 2022) table
  function buildTable(rows, suffix) {
    const table = document.createElement('table');
    table.className = 'dt-table';
    const thead = table.createTHead();
    const hrow = thead.insertRow();
    ['', '2025', '2022'].forEach(text => {
      const th = document.createElement('th');
      th.textContent = text;
      hrow.appendChild(th);
    });
    const tbody = table.createTBody();
    rows.forEach(row => {
      const tr = tbody.insertRow();
      tr.appendChild(labelCell(row.label, row.noteRef));
      tr.appendChild(valCell(row.v2025, suffix));
      tr.appendChild(valCell(row.v2022, suffix));
    });
    return table;
  }

  // National breakdown tables (one per chartGroup)
  (data.chartGroups || []).forEach(group => {
    const section = el('div', 'dt-section');
    const lbl = el('div', 'dt-section-label');
    lbl.textContent = group.label;
    section.appendChild(lbl);

    const rows = (group.categories || []).map(cat => ({
      label:   cat.label,
      v2025:   cat.y2025,
      v2022:   cat.y2022,
      noteRef: cat.noteRef || null
    }));
    section.appendChild(buildTable(rows, '%'));
    container.appendChild(section);
  });

  // Regional distribution table
  const regionRecords = data.mapConfig?.data?.region || [];
  if (regionRecords.length) {
    const section = el('div', 'dt-section');
    const lbl = el('div', 'dt-section-label');
    lbl.textContent = 'Region';
    section.appendChild(lbl);

    const rows = regionRecords.map(rec => ({
      label:   nameRegistry[String(rec.psgc)] || ('PSGC ' + rec.psgc),
      v2025:   rec.pct_2025,
      v2022:   rec.pct_2022,
      noteRef: rec.noteRef || null
    }));
    section.appendChild(buildTable(rows, '%'));
    container.appendChild(section);
  }

  if (data.notes?.length) {
    const foot = el('div', 'dt-footnotes');
    data.notes.forEach(n => {
      const d = el('div', 'dt-note');
      d.textContent = n;
      foot.appendChild(d);
    });
    container.appendChild(foot);
  }

  if (data.source) {
    const src = el('div', 'dt-source');
    src.textContent = 'Source: ' + data.source;
    container.appendChild(src);
  }
}

function drawGroupChart(container, group) {
  const cats = group.categories || [];
  const n = cats.length;
  if (!n) return;

  const maxLabelLen = d3.max(cats, d => String(d.label || '').length) || 0;
  const ML = Math.max(108, Math.min(176, 42 + maxLabelLen * 5));
  const MR = 92;
  const MT = 14;
  const MB = 34;
  const ROW_H = 34;
  const ROW_GAP = 16;
  const INNER_H = n * ROW_H + (n - 1) * ROW_GAP;
  const VW = Math.max(700, ML + MR + 420);
  const VH = MT + INNER_H + MB;
  const INNER_W = VW - ML - MR;

  const allVals = cats.flatMap(c => [c.y2025, c.y2022].filter(v => v != null));
  const rawMax = allVals.length ? d3.max(allVals) : 100;
  const xMax = Math.ceil(rawMax * 1.1 / 5) * 5 || 5;
  const x = d3.scaleLinear().domain([0, xMax]).range([0, INNER_W]);
  const y = d3.scaleBand()
    .domain(cats.map(c => c.label))
    .range([0, INNER_H])
    .paddingInner(0.35);

  const wrap = el('div', 'chart-svg-wrap');
  container.appendChild(wrap);

  const legendDiv = el('div', 'chart-legend');
  legendDiv.innerHTML =
    `<span><span class="legend-swatch s2022" style="background:var(--bar-2022)"></span>2022</span>` +
    `<span><span class="legend-swatch" style="background:var(--bar-2025)"></span>2025</span>`;

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  svgEl.setAttribute('preserveAspectRatio', 'xMinYMid meet');
  wrap.appendChild(svgEl);

  const svg = d3.select(svgEl);
  const g = svg.append('g').attr('transform', `translate(${ML},${MT})`);

  const tickStep = xMax <= 20 ? 2 : (xMax <= 50 ? 5 : 10);
  const ticks = d3.range(0, xMax + 0.001, tickStep);
  ticks.forEach(t => {
    const xx = x(t);
    if (t !== 0) {
      g.append('line')
        .attr('x1', xx).attr('y1', 0)
        .attr('x2', xx).attr('y2', INNER_H)
        .attr('stroke', 'var(--chart-axis)')
        .attr('stroke-dasharray', '2,3')
        .attr('opacity', 0.45);
    }
    g.append('line')
      .attr('x1', xx).attr('y1', INNER_H)
      .attr('x2', xx).attr('y2', INNER_H + 5)
      .attr('stroke', 'var(--chart-axis)');
    g.append('text')
      .attr('x', xx).attr('y', INNER_H + 16)
      .attr('text-anchor', 'middle')
      .attr('font-size', 10)
      .attr('font-family', 'IBM Plex Mono, monospace')
      .attr('fill', 'var(--data-label-color)')
      .text(t);
  });

  g.append('line')
    .attr('x1', 0).attr('y1', INNER_H)
    .attr('x2', INNER_W).attr('y2', INNER_H)
    .attr('stroke', 'var(--chart-axis)');

  g.append('text')
    .attr('x', INNER_W / 2)
    .attr('y', INNER_H + 32)
    .attr('text-anchor', 'middle')
    .attr('font-size', 12)
    .attr('font-family', 'Inter, sans-serif')
    .attr('fill', 'var(--data-label-color)')
    .text((group.xLabel && String(group.xLabel).trim() !== '-') ? group.xLabel : 'Percentage');

  cats.forEach(cat => {
    const y0 = y(cat.label);
    if (y0 == null) return;
    const cy = y0 + y.bandwidth() / 2;
    const y22 = cy - 6;
    const y25 = cy + 6;
    const v2022 = cat.y2022;
    const v2025 = cat.y2025;
    const labelOffset = 8;

    d3.select(svgEl).append('text')
      .attr('x', ML - 10)
      .attr('y', MT + cy)
      .attr('text-anchor', 'end')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 12)
      .attr('font-family', 'Inter, sans-serif')
      .attr('fill', 'var(--text-color)')
      .text(cat.label);

    if (v2022 != null) {
      const x22 = x(v2022);
      g.append('line')
        .attr('x1', 0).attr('y1', y22)
        .attr('x2', x22).attr('y2', y22)
        .attr('stroke', 'var(--bar-2022)')
        .attr('stroke-width', 2)
        .attr('opacity', 0.85);
      g.append('circle')
        .attr('cx', x22).attr('cy', y22)
        .attr('r', 4.2)
        .attr('fill', 'var(--bar-2022)')
        .attr('stroke', 'rgba(0,0,0,0.18)')
        .attr('stroke-width', 0.8);
      g.append('text')
        .attr('x', x22 + labelOffset)
        .attr('y', y22)
        .attr('text-anchor', 'start')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', 10)
        .attr('font-family', 'IBM Plex Mono, monospace')
        .attr('fill', 'var(--data-label-color)')
        .text(v2022);
    } else {
      g.append('text')
        .attr('x', 4).attr('y', y22)
        .attr('dominant-baseline', 'middle')
        .attr('font-size', 10)
        .attr('font-family', 'IBM Plex Mono, monospace')
        .attr('fill', 'var(--no-data-color)')
        .text('2022 N/A');
    }

    if (v2025 != null) {
      const x25 = x(v2025);
      g.append('line')
        .attr('x1', 0).attr('y1', y25)
        .attr('x2', x25).attr('y2', y25)
        .attr('stroke', 'var(--bar-2025)')
        .attr('stroke-width', 2);
      g.append('circle')
        .attr('cx', x25).attr('cy', y25)
        .attr('r', 4.2)
        .attr('fill', 'var(--bar-2025)');
      g.append('text')
        .attr('x', x25 + labelOffset)
        .attr('y', y25)
        .attr('text-anchor', 'start')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', 10)
        .attr('font-family', 'IBM Plex Mono, monospace')
        .attr('fill', 'var(--data-value-color)')
        .text(v2025);
    } else {
      g.append('text')
        .attr('x', 4).attr('y', y25)
        .attr('dominant-baseline', 'middle')
        .attr('font-size', 10)
        .attr('font-family', 'IBM Plex Mono, monospace')
        .attr('fill', 'var(--no-data-color)')
        .text('2025 N/A');
    }
  });

  container.appendChild(legendDiv);
}

// Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â

const nameRegistry = {};
let   mapColorScale = null;
let   mapDataByRegion = {};
let   mapCfg = null;

const mapSvgEl = document.getElementById('map-svg');
const mapSvg   = d3.select('#map-svg');
const mapG     = mapSvg.append('g');

const LON_MIN = 116.93, LON_MAX = 126.60;
const LAT_MIN = 4.64,   LAT_MAX = 20.84;
const PAD     = 30;

const zoom = d3.zoom()
  .scaleExtent([0.5, 20])
  .on('zoom', e => mapG.attr('transform', e.transform));
mapSvg.call(zoom);
mapSvg.on('dblclick.zoom', null);

function makePathFn(w, h) {
  const lonSpan = LON_MAX - LON_MIN, latSpan = LAT_MAX - LAT_MIN;
  const scale   = Math.min((w - 2*PAD) / lonSpan, (h - 2*PAD) / latSpan);
  const offX    = (w - lonSpan * scale) / 2;
  const offY    = (h - latSpan * scale) / 2;
  return d3.geoPath().projection(d3.geoTransform({
    point(lon, lat) {
      this.stream.point(offX + (lon - LON_MIN) * scale, offY + (LAT_MAX - lat) * scale);
    }
  }));
}

function shortenRegion(name) {
  if (!name) return '';
  const m = name.match(/\(([^)]+)\)/);
  return m ? m[1] : name;
}

function mapLegendHTML() {
  const cfg = mapCfg;
  const [lo, hi] = cfg.colorDomain;
  const N = 24;
  const stops = Array.from({length: N}, (_, i) => mapColorScale(lo + (hi - lo) * i / (N - 1))).join(',');
  const suf   = cfg.valueSuffix || '';
  const lbl   = cfg.detailFields?.[0]?.label || '';
  return `<div class="section-head">${lbl}</div>` +
    `<div class="legend-bar" style="background:linear-gradient(to right,${stops})"></div>` +
    `<div class="legend-ends"><span>${lo}${suf}</span><span>${hi}${suf}</span></div>`;
}

function mapRankedListHTML(activePsgc) {
  const cfg     = mapCfg;
  const records = Object.values(mapDataByRegion).filter(r => r[cfg.colorField] != null);
  const sorted  = [...records].sort((a, b) => (b[cfg.colorField] ?? -Infinity) - (a[cfg.colorField] ?? -Infinity));
  if (!sorted.length) return '';
  const suf  = cfg.valueSuffix || '';
  const sups = ['&#185;','&#178;','&#179;','&#8308;','&#8309;','&#8310;','&#8311;','&#8312;','&#8313;'];
  const noted = new Map();
  let nc = 0;
  sorted.forEach(r => { if (r.psa_note) noted.set(String(r.psgc), sups[nc++] || String(nc)); });
  const rows = sorted.map((r, i) => {
    const rawName = nameRegistry[String(r.psgc)] || ('PSGC ' + r.psgc);
    const sup     = noted.get(String(r.psgc));
    const name    = sup ? `${rawName}<sup style="font-size:9px">${sup}</sup>` : rawName;
    const val     = r[cfg.colorField];
    const fill    = mapColorScale(val);
    const active  = activePsgc != null && String(r.psgc) === String(activePsgc);
    return `<div class="ranked-row${active ? ' is-active' : ''}">` +
      `<span class="ranked-i">${i + 1}</span>` +
      `<span class="ranked-swatch" style="background:${fill}"></span>` +
      `<span class="ranked-name">${name}</span>` +
      `<span class="ranked-val">${val}</span>` +
      `</div>`;
  }).join('');
  const notes = [...noted.entries()].map(([psgc, sup]) => {
    const rec = sorted.find(r => String(r.psgc) === psgc);
    return `<p style="font-size:11px;line-height:1.6;color:var(--data-label-color);margin:10px 0 0">${sup} ${rec.psa_note}</p>`;
  }).join('');
  return `<div class="section-head">All Regions</div><div>${rows}</div>${notes}`;
}

function openMapWelcome() {
  document.getElementById('map-eyebrow').textContent    = 'Survey Profile';
  document.getElementById('map-lgu-name').textContent   = 'Background Characteristics';
  document.getElementById('map-region-label').textContent = '';
  const desc = mapCfg?.description
    ? `<p style="font-size:12px;color:var(--text-color);line-height:1.8;margin-bottom:12px">${mapCfg.description}</p>`
    : '';
  document.getElementById('map-detail-body').innerHTML =
    desc + mapLegendHTML() + mapRankedListHTML(null);
  document.getElementById('map-detail').classList.add('open');
}

function openMapDetail(name, psgc, rec) {
  const cfg = mapCfg;
  document.getElementById('map-eyebrow').textContent      = 'Region';
  document.getElementById('map-lgu-name').textContent     = name;
  document.getElementById('map-region-label').textContent = 'Philippines';

  let dataHTML = '';
  if (rec) {
    const suf = '';
    dataHTML = (cfg.detailFields || []).filter(f => f.key in rec).map(f => {
      const val = rec[f.key];
      if (f.key === 'psa_note') {
        return val ? `<p style="font-size:11px;line-height:1.6;color:var(--data-label-color);margin:8px 0 0">${val}</p>` : '';
      }
      return `<div class="data-row"><span class="data-label">${f.label}</span>` +
        `<span class="data-value">${val != null ? val : '-'}</span></div>`;
    }).join('');
  } else {
    dataHTML = `<div class="no-findings">No data for this region.</div>`;
  }

  document.getElementById('map-detail-body').innerHTML =
    dataHTML +
    mapLegendHTML() +
    `<button id="detail-back-national" style="margin:10px 0 8px;padding:5px 10px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-color);font:10px 'IBM Plex Mono', monospace;letter-spacing:0.4px;cursor:pointer">Back to national ranking</button>` +
    mapRankedListHTML(psgc);
  const detailBackBtn = document.getElementById('detail-back-national');
  if (detailBackBtn) detailBackBtn.addEventListener('click', () => openMapWelcome());
  document.getElementById('map-detail').classList.add('open');
}

async function initMap(cfg) {
  mapCfg = cfg;
  mapColorScale = d3.scaleSequential(d3[cfg.colorScheme]).domain(cfg.colorDomain);

  // Build region data lookup
  for (const rec of (cfg.data?.region || [])) {
    mapDataByRegion[String(rec.psgc)] = rec;
  }

  // Load PSGC index for name registry
  try {
    const idx = await d3.json('./psgc-index.json');
    for (const r of [...(idx.regions?.nir || []), ...(idx.regions?.standard || [])]) {
      if (r.psgc && r.name) nameRegistry[String(r.psgc)] = r.name;
    }
  } catch(e) {}

  // Load GeoJSON
  const w = mapSvgEl.clientWidth  || window.innerWidth;
  const h = mapSvgEl.clientHeight || (window.innerHeight - 46);
  mapSvgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);

  let countryData;
  try {
    countryData = await d3.json('./geo-nir/country.0.001.json?v=4');
  } catch(e) {
    document.getElementById('map-status').textContent = 'Error loading map data.';
    return;
  }

  const pathFn = makePathFn(w, h);
  const features = countryData.features;

  for (const f of features) {
    const p = f.properties;
    if (p.adm1_psgc && p.adm1_en) nameRegistry[String(p.adm1_psgc)] = p.adm1_en;
  }

  // Render regions
  mapG.selectAll('path.region')
    .data(features)
    .join('path')
    .attr('class', 'region')
    .attr('d', pathFn)
    .style('fill', d => {
      const rec = mapDataByRegion[String(d.properties.adm1_psgc)];
      return (rec && rec[cfg.colorField] != null) ? mapColorScale(rec[cfg.colorField]) : null;
    })
    .attr('opacity', 0)
    .on('click', (e, d) => {
      const psgc = d.properties.adm1_psgc;
      const name = nameRegistry[String(psgc)] || d.properties.adm1_en;
      openMapDetail(name, psgc, mapDataByRegion[String(psgc)]);
    })
    .transition().duration(400).attr('opacity', 1);

  // Labels
  mapG.selectAll('text.map-label')
    .data(features)
    .join('text')
    .attr('class', 'map-label')
    .attr('font-size', 10)
    .attr('opacity', 0)
    .each(function(d) {
      const c = pathFn.centroid(d);
      if (!c || isNaN(c[0]) || isNaN(c[1])) return;
      d3.select(this).attr('x', c[0]).attr('y', c[1]).text(shortenRegion(d.properties.adm1_en));
    })
    .transition().delay(350).duration(300).attr('opacity', 1);

  document.getElementById('map-status').textContent = '18 regions - click to view details';

  // Info button - always visible; reopens the welcome/overview panel
  const infoBtnEl = document.getElementById('map-info-btn');
  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  infoBtnEl.style.display = 'block';
  infoBtnEl.addEventListener('click', openMapWelcome);
  document.getElementById('map-detail-close').addEventListener('click', () => {
    document.getElementById('map-detail').classList.remove('open');
  });

  // Welcome state
  if (isMobile) {
    setTimeout(() => {
      const detail = document.getElementById('map-detail');
      detail.classList.add('peek');
      setTimeout(() => detail.classList.remove('peek'), 1600);
    }, 800);
  } else {
    openMapWelcome();
  }
}
