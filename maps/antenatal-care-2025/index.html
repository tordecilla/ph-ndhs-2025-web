<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Philippines Map</title>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<style>
  /* ── Theme variables ── */
  :root {
    --bg:               #edf1f7;
    --panel-bg:         #ffffff;
    --panel-border:     rgba(0,0,0,0.09);
    --panel-divider:    rgba(0,0,0,0.07);
    --poly-fill:        #bacfe3;
    --poly-stroke:      rgba(40,65,105,0.3);
    --hover-stroke:     #2a3f60;
    --label-fill:       #1a2840;
    --label-stroke:     rgba(237,241,247,0.92);
    --btn-bg:           rgba(0,0,0,0.06);
    --btn-border:       rgba(0,0,0,0.18);
    --btn-color:        #1a2840;
    --btn-hover-bg:     rgba(0,0,0,0.11);
    --status-color:     #556;
    --status-bg:        rgba(255,255,255,0.88);
    --close-color:      rgba(0,0,0,0.35);
    --close-hover:      #000;
    --eyebrow-color:    rgba(0,0,0,0.38);
    --lgu-name-color:   #1a2840;
    --region-color:     rgba(0,0,0,0.48);
    --scroll-thumb:     rgba(0,0,0,0.1);
    --card-bg:          rgba(0,0,0,0.03);
    --card-border:      rgba(0,0,0,0.08);
    --year-color:       rgba(0,0,0,0.45);
    --year-bg:          rgba(0,0,0,0.05);
    --text-color:       rgba(0,0,0,0.68);
    --expand-color:     rgba(0,0,0,0.35);
    --expand-hover:     #000;
    --no-data-color:    rgba(0,0,0,0.28);
    --section-color:    rgba(0,0,0,0.28);
    --drag-handle:      rgba(0,0,0,0.12);
    --mobile-border:    rgba(0,0,0,0.1);
    --ring-color:       rgba(0,0,0,0.3);
    --strong-color:     rgba(0,0,0,0.65);
    --data-label-color: rgba(0,0,0,0.42);
    --data-value-color: rgba(0,0,0,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden;
    transition: background 0.25s;
    font-family: 'Inter', system-ui, sans-serif;
  }
  svg { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  svg:active { cursor: grabbing; }

  #tab-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: 6px;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--panel-divider);
    overflow-x: auto; white-space: nowrap;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-color); font: 11px 'IBM Plex Mono', monospace;
    padding: 5px 13px; cursor: pointer;
    letter-spacing: 0.4px;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--btn-hover-bg);
    border-color: rgba(0,0,0,0.36);
  }
  .tab-btn:hover { background: var(--btn-hover-bg); }

  .tab-panel {
    display: none;
    position: fixed; top: 46px; left: 0; right: 0; bottom: 0;
  }
  .tab-panel.active { display: block; }
  #tab-map { overflow: hidden; }
  #tab-charts {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-charts::-webkit-scrollbar { width: 4px; }
  #tab-charts::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }
  #charts-container {
    max-width: 1220px;
    margin: 0 auto;
  }
  .chart-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .chart-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 24px; line-height: 1.6;
  }
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }
  @media (min-width: 1080px) {
    .chart-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  .chart-block {
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px 16px 14px;
  }
  .chart-block-title {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 8px;
  }
  .chart-block-subtitle {
    font-size: 12px; color: var(--region-color); line-height: 1.55;
    margin-bottom: 14px;
  }
  .chart-svg-wrap { width: 100%; }
  .chart-svg-wrap svg {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
  }
  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 10px 14px; margin-top: 12px;
    font: 11px 'IBM Plex Mono', monospace; color: var(--data-label-color); align-items: center;
  }
  .legend-swatch {
    display: inline-block; width: 12px; height: 12px;
    border-radius: 2px; margin-right: 4px; vertical-align: middle;
  }
  .chart-footnotes {
    margin-top: 28px; padding-top: 16px;
    border-top: 1px solid var(--panel-divider);
  }
  .chart-note {
    font-size: 11px; color: var(--data-label-color); line-height: 1.7;
    margin-bottom: 4px;
  }
  #tab-tables {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-tables::-webkit-scrollbar { width: 4px; }
  #tab-tables::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }
  #tables-container {
    max-width: 1440px;
    margin: 0 auto;
  }
  .dt-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .dt-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 28px; line-height: 1.6;
  }
  .dt-section {
    margin-bottom: 24px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px 16px 4px;
  }
  .dt-section-label {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 12px;
  }
  .dt-table-wrap {
    width: 100%;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .dt-table {
    width: 100%;
    min-width: 1120px;
    border-collapse: collapse;
    font-size: 12px;
  }
  .dt-table thead th {
    padding: 10px 10px 9px;
    border-right: 1px solid var(--panel-divider);
    border-bottom: 1px solid var(--panel-divider);
    font: 10px/1.3 'IBM Plex Mono', monospace;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--data-label-color);
    text-align: right;
    vertical-align: bottom;
    background: rgba(0,0,0,0.02);
  }
  .dt-table thead th:last-child { border-right: none; }
  .dt-table thead th:first-child {
    text-align: left;
    min-width: 220px;
  }
  .dt-table thead th.col-group {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.8px;
  }
  .dt-table th.year-2022,
  .dt-table td.year-2022 {
    background: rgba(0,0,0,0.018);
  }
  .dt-table th.year-break,
  .dt-table td.year-break {
    border-left: 2px solid rgba(0,0,0,0.09);
  }
  .dt-table thead tr.sub-header th {
    text-transform: none;
    letter-spacing: 0;
    line-height: 1.45;
  }
  .dt-table tbody tr {
    border-bottom: 1px solid var(--panel-divider);
  }
  .dt-table tbody tr:last-child { border-bottom: none; }
  .dt-table tbody td {
    padding: 10px;
    border-right: 1px solid var(--panel-divider);
    text-align: right;
    vertical-align: top;
    color: var(--data-value-color);
    line-height: 1.45;
  }
  .dt-table tbody td:last-child { border-right: none; }
  .dt-table tbody td:first-child {
    text-align: left;
    font-weight: 500;
    color: var(--text-color);
  }
  .dt-table td.na { color: var(--no-data-color); font-style: italic; }
  .dt-table tbody tr.dt-total-row td {
    font-weight: 600;
    background: rgba(0,0,0,0.025);
  }
  .dt-footnotes {
    margin-top: 28px;
  }
  .dt-note {
    font-size: 11px; color: var(--data-label-color); line-height: 1.7;
    margin-bottom: 4px;
  }
  .dt-source {
    margin-top: 10px;
    font-size: 11px;
    color: var(--data-label-color);
    line-height: 1.7;
  }
  #tab-insights {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-insights::-webkit-scrollbar { width: 4px; }
  #tab-insights::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }
  #insights-container {
    max-width: 920px;
    margin: 0 auto;
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 24px 24px 20px;
  }
  .insights-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .insights-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 24px; line-height: 1.6;
  }
  .insight-card {
    padding: 0;
    margin-bottom: 22px;
  }
  .insight-heading {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 10px;
  }
  .insight-text {
    font-size: 13px; color: var(--text-color); line-height: 1.75;
  }
  .insight-takeaways {
    display: grid;
    gap: 10px;
  }
  .insight-takeaway {
    font-size: 13px; color: var(--text-color); line-height: 1.7;
    padding-left: 14px;
    position: relative;
  }
  .insight-takeaway::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(0,0,0,0.28);
  }
  .region   { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.8; cursor: pointer; }
  .region:hover   { opacity: 0.8; stroke: var(--hover-stroke); stroke-width: 1.5; }
  .province { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.5; cursor: pointer; }
  .province:hover { opacity: 0.8; stroke: var(--hover-stroke); stroke-width: 1; }
  .huc-city { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.3; cursor: pointer; }
  .huc-city:hover { opacity: 0.8; stroke: var(--hover-stroke); stroke-width: 0.8; }
  .huc-label { cursor: pointer; }
  .municity { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.3; cursor: pointer; }
  .region-bg { fill: var(--poly-fill); pointer-events: none; }
  .municity:hover { opacity: 0.8; stroke: var(--hover-stroke); stroke-width: 0.8; }
  .leaf { cursor: default; }
  .leaf:hover { opacity: 1; stroke: var(--poly-stroke); stroke-width: inherit; }
  .svg-bg    { fill: var(--bg); }

  .map-label {
    fill: var(--label-fill);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    letter-spacing: 0.3px;
  }

  /* ── Overlay buttons ── */
  #back-btn, #info-btn {
    position: fixed;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-color); font: 13px 'IBM Plex Mono', monospace;
    padding: 6px 14px; cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    z-index: 10;
    display: none;
  }
  #back-btn { top: 62px; right: 16px; }
  #info-btn { bottom: 16px; right: 16px; font-size: 15px; padding: 6px 12px; }
  #back-btn:hover, #info-btn:hover { background: var(--btn-hover-bg); }

  #status {
    position: fixed; bottom: 8px; left: 12px;
    color: var(--status-color); font: 11px 'IBM Plex Mono', monospace;
    background: var(--status-bg); padding: 3px 8px;
    pointer-events: none; z-index: 10;
    transition: color 0.25s, background 0.25s;
  }

  /* ── Detail panel — desktop ── */
  #detail {
    position: fixed; top: 46px; right: -380px; bottom: 0; width: 360px;
    background: var(--panel-bg); border-left: 1px solid var(--panel-border);
    display: flex; flex-direction: column;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1),
                background 0.25s, border-color 0.25s;
    z-index: 20; overflow: hidden;
  }
  #detail.open { right: 0; }
  #detail.peek { right: -285px; }

  /* ── Detail panel — mobile ── */
  @media (pointer: coarse) {
    #detail {
      width: 100%; right: 0; top: auto; bottom: 0; height: 55vh;
      border-left: none; border-top: 1px solid var(--mobile-border);
      border-radius: 14px 14px 0 0;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1),
                  background 0.25s;
    }
    #detail.open  { right: 0; transform: translateY(0); }
    #detail.peek  { right: 0; transform: translateY(calc(100% - 56px)); }
    #detail-header { padding-top: 22px; }
  }

  #detail::before {
    content: ''; display: none;
    width: 36px; height: 4px;
    background: var(--drag-handle);
    border-radius: 2px;
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  }
  @media (pointer: coarse) { #detail::before { display: block; } }

  @keyframes info-ring {
    0%   { box-shadow: 0 0 0 0 var(--ring-color); }
    100% { box-shadow: 0 0 0 12px transparent; }
  }
  #info-btn.ring { animation: info-ring 0.7s ease-out 3; }

  #detail-close {
    background: none; border: none;
    color: var(--close-color); font-size: 18px; cursor: pointer;
    transition: color 0.15s; line-height: 1;
  }
  #detail-close:hover { color: var(--close-hover); }
  #detail-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--panel-divider); flex-shrink: 0;
  }
  #detail-header-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .detail-eyebrow {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--eyebrow-color); margin-bottom: 6px;
  }
  .detail-lgu-name { font-size: 22px; font-weight: 600; color: var(--lgu-name-color); line-height: 1.2; margin-bottom: 4px; }
  .detail-region   { font-size: 12px; color: var(--region-color); }
  #detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  #detail-body::-webkit-scrollbar { width: 3px; }
  #detail-body::-webkit-scrollbar-thumb { background: var(--scroll-thumb); }

  /* ── Data field rows ── */
  .data-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 1px solid var(--panel-divider);
    gap: 12px;
  }
  .data-row:last-child { border-bottom: none; }
  .data-label { font: 10px 'IBM Plex Mono', monospace; letter-spacing: 0.8px; text-transform: uppercase; color: var(--data-label-color); flex-shrink: 0; }
  .data-value { font-size: 13px; color: var(--data-value-color); text-align: right; }

  .no-findings { text-align: center; padding: 40px 0; color: var(--no-data-color); font-size: 13px; line-height: 1.8; }
  .section-head { font: 10px 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase; color: var(--section-color); margin: 16px 0 8px; }

  /* ── Legend ── */
  .legend-bar { height: 10px; border-radius: 2px; margin: 6px 0 4px; }
  .legend-ends { display: flex; justify-content: space-between; font: 10px 'IBM Plex Mono', monospace; color: var(--data-label-color); }

  #metric-toggle {
    position: fixed; top: 58px; left: 50%; transform: translateX(-50%);
    z-index: 11;
    background: rgba(255,255,255,0.92);
    border-radius: 20px; padding: 4px;
    display: flex; flex-wrap: nowrap; gap: 4px;
    align-items: center; justify-content: center;
    width: fit-content;
    max-width: calc(100vw - 24px);
    overflow-x: auto;
    overflow-y: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    font-size: 12px; user-select: none;
  }
  #metric-toggle:empty { display: none; }
  #metric-toggle::-webkit-scrollbar { display: none; }
  #metric-toggle input[type=radio] { display: none; }
  #metric-toggle label {
    padding: 5px 14px; border-radius: 16px; cursor: pointer;
    color: var(--text-color); white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  #metric-toggle label:has(input:checked) {
    background: var(--hover-stroke); color: #fff;
  }
  #metric-select-wrap {
    display: none;
    width: 100%;
  }
  #metric-select {
    width: 100%;
    background: rgba(255,255,255,0.96);
    border: 1px solid var(--btn-border);
    border-radius: 12px;
    color: var(--btn-color);
    font: 11px 'IBM Plex Mono', monospace;
    padding: 9px 12px;
    outline: none;
  }
  @media (max-width: 780px) {
    #metric-toggle {
      top: 56px;
      border-radius: 14px;
      padding: 8px;
    }
    #metric-toggle label {
      display: none;
    }
    #metric-select-wrap {
      display: block;
    }
  }

  /* ── Ranked list ── */
  .ranked-row {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 0; border-bottom: 1px solid var(--panel-divider);
  }
  .ranked-row:last-child { border-bottom: none; }
  .ranked-i { font: 10px 'IBM Plex Mono', monospace; color: var(--data-label-color); min-width: 20px; text-align: right; flex-shrink: 0; }
  .ranked-swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ranked-name { flex: 1; font-size: 12px; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .ranked-row.is-active .ranked-name { color: var(--lgu-name-color); font-weight: 600; }
  .ranked-val { font: 11px 'IBM Plex Mono', monospace; color: var(--data-value-color); flex-shrink: 0; }
  .ranked-row.is-active .ranked-val { color: var(--lgu-name-color); }
</style>
</head>
<body>
<svg id="map"></svg>
<button id="back-btn">← Back</button>
<button id="info-btn">ℹ Details</button>
<div id="status">Loading…</div>
<div id="metric-toggle"></div>
<div id="detail">
  <div id="detail-header">
    <div id="detail-header-row">
      <div class="detail-eyebrow" id="detail-eyebrow">—</div>
      <button id="detail-close">✕</button>
    </div>
    <div class="detail-lgu-name" id="detail-lgu-name">—</div>
    <div class="detail-region"   id="detail-region">—</div>
  </div>
  <div id="detail-body"></div>
</div>

<script>
const status   = document.getElementById('status');
const backBtn  = document.getElementById('back-btn');
const infoBtn  = document.getElementById('info-btn');
const metricToggle = document.getElementById('metric-toggle');
const svgEl    = document.getElementById('map');
const svg      = d3.select('#map');
const detail   = document.getElementById('detail');
svg.insert('rect', ':first-child').attr('class', 'svg-bg').attr('width', '100%').attr('height', '100%').style('pointer-events', 'none');
const g        = svg.append('g');

let activeTab = 'map';
let chartsReady = false;
let chartsContainer = null;
let tablesReady = false;
let tablesContainer = null;
let insightsReady = false;
let insightsContainer = null;

(function initTabbedLayout() {
  const tabBar = document.createElement('div');
  tabBar.id = 'tab-bar';
  tabBar.innerHTML = `
    <button class="tab-btn active" data-tab="map">Maps</button>
    <button class="tab-btn" data-tab="charts">Charts</button>
    <button class="tab-btn" data-tab="tables">Data Tables</button>
    <button class="tab-btn" data-tab="insights">Insights</button>
  `;

  const mapPanel = document.createElement('div');
  mapPanel.id = 'tab-map';
  mapPanel.className = 'tab-panel active';

  const chartsPanel = document.createElement('div');
  chartsPanel.id = 'tab-charts';
  chartsPanel.className = 'tab-panel';

  const insightsPanel = document.createElement('div');
  insightsPanel.id = 'tab-insights';
  insightsPanel.className = 'tab-panel';

  chartsContainer = document.createElement('div');
  chartsContainer.id = 'charts-container';
  chartsPanel.appendChild(chartsContainer);

  const tablesPanel = document.createElement('div');
  tablesPanel.id = 'tab-tables';
  tablesPanel.className = 'tab-panel';

  tablesContainer = document.createElement('div');
  tablesContainer.id = 'tables-container';
  tablesPanel.appendChild(tablesContainer);

  insightsContainer = document.createElement('div');
  insightsContainer.id = 'insights-container';
  insightsPanel.appendChild(insightsContainer);

  [svgEl, backBtn, infoBtn, status, metricToggle, detail].forEach(node => mapPanel.appendChild(node));

  document.body.insertBefore(tabBar, document.body.firstChild);
  document.body.insertBefore(mapPanel, tabBar.nextSibling);
  document.body.insertBefore(chartsPanel, mapPanel.nextSibling);
  document.body.insertBefore(tablesPanel, chartsPanel.nextSibling);
  document.body.insertBefore(insightsPanel, tablesPanel.nextSibling);

  tabBar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab, false, true));
  });
})();

function switchTab(tab, replace = false, syncHash = true) {
  activeTab = tab === 'charts' ? 'charts' : tab === 'tables' ? 'tables' : tab === 'insights' ? 'insights' : 'map';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === activeTab));
  document.getElementById('tab-map').classList.toggle('active', activeTab === 'map');
  document.getElementById('tab-charts').classList.toggle('active', activeTab === 'charts');
  document.getElementById('tab-tables').classList.toggle('active', activeTab === 'tables');
  document.getElementById('tab-insights').classList.toggle('active', activeTab === 'insights');
  if (activeTab === 'charts' && config.chartData && !chartsReady) {
    renderCharts(config.chartData);
    chartsReady = true;
  }
  if (activeTab === 'tables' && config.tableData && !tablesReady) {
    renderTables(config.tableData);
    tablesReady = true;
  }
  if (activeTab === 'insights' && config.insights && !insightsReady) {
    renderInsights(config.insights);
    insightsReady = true;
  }
  if (syncHash) {
    const current = parseStateHash(parseHash());
    pushURL(buildStateHash(current.viewHash), replace);
  }
}

// ── Config & data ─────────────────────────────────────────────────────────────
let config = {};
let dataByLevel = { region: {}, province: {}, municity: {} };
let colorScale  = null;
let GEO_BASE    = './philippines-json-maps';

// PSGC → display name, populated from psgc-index.json at boot + GeoJSON lazily
const nameRegistry = {};
// child PSGC (string) → parent PSGC (string): province→region, municity→province
const parentMap = {};
// province PSGCs (strings) that have at least one municity data record — gates drill-down
let provincesWithMunicity = new Set();

function registerNames(features, psgcKey, nameKey) {
  for (const f of (features || [])) {
    const p = f.properties;
    if (p[psgcKey] != null && p[nameKey]) nameRegistry[String(p[psgcKey])] = p[nameKey];
  }
}

async function loadConfig() {
  try {
    config = await d3.json('./data.json');
  } catch(e) {
    config = {};
  }

  GEO_BASE = config.geoBasePath || './philippines-json-maps';

  // Build PSGC-keyed lookup maps for each geographic level
  if (config.data) {
    for (const level of ['region', 'province', 'municity']) {
      dataByLevel[level] = {};
      for (const record of (config.data[level] || [])) {
        if (record.psgc != null) dataByLevel[level][String(record.psgc)] = record;
      }
    }
  }

  // Build D3 color scale if config specifies one
  if (config.colorField && config.colorDomain && config.colorScheme && d3[config.colorScheme]) {
    colorScale = d3.scaleSequential(d3[config.colorScheme]).domain(config.colorDomain);
  }

  // Pre-populate name registry and parent map from psgc-index.json (optional; graceful fallback if absent)
  try {
    const idx = await d3.json('./psgc-index.json');
    for (const r of [...(idx.regions?.nir || []), ...(idx.regions?.standard || [])]) {
      if (r.psgc && r.name) nameRegistry[String(r.psgc)] = r.name;
    }
    for (const p of (idx.provinces || [])) {
      if (p.psgc && p.name) nameRegistry[String(p.psgc)] = p.name;
      if (p.psgc && p.region_psgc) parentMap[String(p.psgc)] = String(p.region_psgc);
    }
    for (const m of (idx.municities || [])) {
      if (m.psgc && m.name) nameRegistry[String(m.psgc)] = m.name;
      // If this municity is stored in data.province (HUC city), its ranked-list parent is the region.
      // Otherwise it's a regular municity whose parent is its province.
      if (m.psgc) {
        if (dataByLevel.province[String(m.psgc)]) {
          parentMap[String(m.psgc)] = String(m.region_psgc);
        } else if (m.region_psgc === 1300000000) {
          parentMap[String(m.psgc)] = String(m.region_psgc);
        } else {
          parentMap[String(m.psgc)] = String(m.province_psgc);
        }
      }
    }
    // Compute which provinces have at least one municity data record (gates drill-down)
    provincesWithMunicity = new Set(
      Object.values(dataByLevel.municity)
        .map(r => parentMap[String(r.psgc)])
        .filter(Boolean)
    );
  } catch(e) { /* psgc-index.json absent — names populated lazily from GeoJSON */ }
}

function renderMetricControls() {
  const options = config.metricOptions || [];
  if (!options.length) {
    metricToggle.innerHTML = '';
    return;
  }

  const radios = options.map(option => {
    const checked = option.key === config.colorField ? ' checked' : '';
    return `<label><input type="radio" name="metric" value="${option.key}"${checked}><span>${option.label}</span></label>`;
  }).join('');

  const selectOptions = options.map(option => {
    const selected = option.key === config.colorField ? ' selected' : '';
    return `<option value="${option.key}"${selected}>${option.label}</option>`;
  }).join('');

  metricToggle.innerHTML =
    radios +
    `<div id="metric-select-wrap"><select id="metric-select" aria-label="Select map metric">${selectOptions}</select></div>`;

  metricToggle.querySelectorAll('input[name="metric"]').forEach(radio => {
    radio.addEventListener('change', function () {
      if (this.checked) applyMetric(this.value, true);
    });
  });

  const metricSelect = document.getElementById('metric-select');
  if (metricSelect) {
    metricSelect.addEventListener('change', function () {
      applyMetric(this.value, true);
    });
  }
}

function applyMetric(field, syncControls = false, updateURL = true) {
  const domain = (config.colorDomains || {})[field] || config.colorDomain;
  config.colorField = field;
  config.colorDomain = domain;

  if (config.colorScheme && d3[config.colorScheme]) {
    colorScale = d3.scaleSequential(d3[config.colorScheme]).domain(domain);
  }

  if (syncControls) {
    const radio = metricToggle.querySelector(`input[name="metric"][value="${field}"]`);
    if (radio) radio.checked = true;

    const metricSelect = document.getElementById('metric-select');
    if (metricSelect) metricSelect.value = field;
  }

  d3.selectAll('path.region').style('fill', d => getFill('region', d.properties.adm1_psgc));

  if (detail.classList.contains('open')) {
    if (currentContext) {
      populateDetail(currentContext.name, currentContext.parentName, currentContext.psgc, currentContext.type);
    } else {
      openWelcome();
    }
  }
  if (updateURL) {
    const current = parseStateHash(parseHash());
    pushURL(buildStateHash(current.viewHash), true);
  }
}

// Returns a fill color for a given level + PSGC, or null to fall back to CSS
function getFill(level, psgc) {
  if (!colorScale || !config.colorField) return null;
  const record = dataByLevel[level][String(psgc)];
  if (record && record[config.colorField] != null) return colorScale(record[config.colorField]);
  return null;
}

function renderTables(tableData) {
  if (!tablesContainer) return;
  tablesContainer.innerHTML = '';

  function el(tag, cls) {
    const node = document.createElement(tag);
    if (cls) node.className = cls;
    return node;
  }

  function appendTextWithNote(node, text, noteRef) {
    node.textContent = text;
    if (!noteRef) return;
    const sup = document.createElement('sup');
    sup.style.cssText = 'font-size:9px;margin-left:1px';
    sup.textContent = noteRef;
    node.appendChild(sup);
  }

  function labelCell(text, noteRef) {
    const cell = document.createElement('td');
    appendTextWithNote(cell, text, noteRef);
    return cell;
  }

  function applyYearClasses(node, group, groupIndex, colIndex) {
    if (group && String(group.label || '').trim() === '2022') node.classList.add('year-2022');
    if (groupIndex > 0 && colIndex === 0) node.classList.add('year-break');
  }

  function valueCell(value, group, groupIndex, colIndex) {
    const cell = document.createElement('td');
    applyYearClasses(cell, group, groupIndex, colIndex);
    if (value == null || value === 'NA') {
      cell.textContent = 'N/A';
      cell.className = 'na';
      applyYearClasses(cell, group, groupIndex, colIndex);
      return cell;
    }
    cell.textContent = String(value);
    return cell;
  }

  function valuesFromRegionRecord(record) {
    return (tableData.colGroups || []).flatMap(group =>
      (group.cols || []).map(col => {
        const displayKey = col.displayKey || `${col.key}_display`;
        if (record[displayKey] != null) return String(record[displayKey]);
        if (record[col.key] == null) return 'NA';
        return String(record[col.key]);
      })
    );
  }

  function buildGroupedTable(rows, totalClass = false) {
    const wrap = el('div', 'dt-table-wrap');
    const table = el('table', 'dt-table');
    const thead = table.createTHead();
    const columnMeta = (tableData.colGroups || []).flatMap((group, groupIndex) =>
      (group.cols || []).map((col, colIndex) => ({ group, groupIndex, colIndex }))
    );

    const groupRow = thead.insertRow();
    const topLeft = document.createElement('th');
    topLeft.rowSpan = 2;
    groupRow.appendChild(topLeft);

    (tableData.colGroups || []).forEach((group, groupIndex) => {
      const th = document.createElement('th');
      th.className = 'col-group';
      applyYearClasses(th, group, groupIndex, 0);
      th.colSpan = (group.cols || []).length;
      th.textContent = group.label || '';
      groupRow.appendChild(th);
    });

    const subRow = thead.insertRow();
    subRow.className = 'sub-header';
    (tableData.colGroups || []).forEach((group, groupIndex) => {
      (group.cols || []).forEach((col, colIndex) => {
        const th = document.createElement('th');
        applyYearClasses(th, group, groupIndex, colIndex);
        appendTextWithNote(th, col.label || '', col.noteRef);
        subRow.appendChild(th);
      });
    });

    const tbody = table.createTBody();
    rows.forEach(row => {
      const tr = tbody.insertRow();
      if (totalClass || row.isTotal) tr.className = 'dt-total-row';
      tr.appendChild(labelCell(row.label || '', row.noteRef || null));
      (row.values || []).forEach((value, valueIndex) => {
        const meta = columnMeta[valueIndex] || {};
        tr.appendChild(valueCell(value, meta.group, meta.groupIndex || 0, meta.colIndex || 0));
      });
    });

    wrap.appendChild(table);
    return wrap;
  }

  const header = document.createElement('div');
  header.innerHTML = `
    <div class="dt-page-title">${tableData.title || config.title || ''}</div>
    <div class="dt-page-subtitle">${tableData.subtitle || ''}</div>
  `;
  tablesContainer.appendChild(header);

  if (tableData.total?.values?.length) {
    const card = el('section', 'dt-section');
    const title = el('div', 'dt-section-label');
    title.textContent = tableData.total.label || 'Total';
    card.appendChild(title);
    card.appendChild(buildGroupedTable([{
      label: tableData.total.label || 'Total',
      values: tableData.total.values,
      isTotal: true,
    }], true));
    tablesContainer.appendChild(card);
  }

  (tableData.sections || []).forEach(section => {
    const card = el('section', 'dt-section');
    const title = el('div', 'dt-section-label');
    title.textContent = section.title || '';
    card.appendChild(title);
    card.appendChild(buildGroupedTable(section.rows || []));
    tablesContainer.appendChild(card);
  });

  if (tableData.includeRegionTable && (config.data?.region || []).length) {
    const card = el('section', 'dt-section');
    const title = el('div', 'dt-section-label');
    title.textContent = tableData.regionSectionTitle || 'Region';
    card.appendChild(title);
    const rows = (config.data.region || []).map(record => ({
      label: nameRegistry[String(record.psgc)] || ('PSGC ' + record.psgc),
      noteRef: record.noteRef || null,
      values: valuesFromRegionRecord(record),
    }));
    card.appendChild(buildGroupedTable(rows));
    tablesContainer.appendChild(card);
  }

  if (tableData.footnotes?.length) {
    const foot = el('div', 'dt-footnotes');
    tableData.footnotes.forEach(note => {
      const row = el('div', 'dt-note');
      row.textContent = note;
      foot.appendChild(row);
    });
    tablesContainer.appendChild(foot);
  }

  if (tableData.source) {
    const src = el('div', 'dt-source');
    src.textContent = 'Source: ' + tableData.source;
    tablesContainer.appendChild(src);
  }
}

function getChartSeriesPalette(series, year) {
  const useLighter = String(year) === '2022';
  return series.map(item => {
    const base = d3.color(item.color);
    const displayColor = useLighter && base ? base.brighter(0.85).formatHex() : item.color;
    return { ...item, displayColor };
  });
}

function formatChartValue(row, key) {
  const displayKey = `${key}_display`;
  if (row[displayKey] != null) return String(row[displayKey]);
  if (row[key] == null) return 'NA';
  return String(row[key]);
}

function drawGroupedBars(container, chartData, block, series) {
  const rows = block.rows || [];
  const maxLabelLen = d3.max(rows, r => String(r.label || '').length) || 0;
  const VW = 620;
  const ML = Math.max(82, Math.min(116, 32 + maxLabelLen * 5));
  const MR = 16;
  const MT = 10;
  const MB = 36;
  const INNER_W = VW - ML - MR;
  const yMax = chartData.xMax || 100;
  const tickStep = yMax > 20 ? 10 : 5;
  const laneGap = 10;
  const groupGap = 24;
  const groupH = Math.max(series.length - 1, 0) * laneGap + 1;
  const INNER_H = rows.length
    ? rows.length * groupH + Math.max(rows.length - 1, 0) * groupGap
    : 40;
  const VH = MT + INNER_H + MB;

  const wrap = document.createElement('div');
  wrap.className = 'chart-svg-wrap';
  container.appendChild(wrap);

  const svgNode = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgNode.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  svgNode.setAttribute('preserveAspectRatio', 'xMinYMid meet');
  wrap.appendChild(svgNode);

  const chartSvg = d3.select(svgNode);
  const chart = chartSvg.append('g').attr('transform', `translate(${ML},${MT})`);
  const x = d3.scaleLinear().domain([0, yMax]).range([0, INNER_W - 8]);

  d3.range(0, yMax + 0.01, tickStep).forEach(tick => {
    const xx = x(tick);
    chart.append('line')
      .attr('x1', xx).attr('y1', 0)
      .attr('x2', xx).attr('y2', INNER_H)
      .attr('stroke', 'var(--panel-divider)')
      .attr('stroke-dasharray', tick === 0 ? null : '2,3');
    chart.append('text')
      .attr('x', xx).attr('y', INNER_H + 15)
      .attr('text-anchor', 'middle')
      .attr('font-size', 11)
      .attr('font-family', 'IBM Plex Mono, monospace')
      .attr('fill', 'var(--data-label-color)')
      .text(tick);
  });

  rows.forEach((row, rowIndex) => {
    const top = rowIndex * (groupH + groupGap);
    const midY = top + groupH / 2;
    chartSvg.append('text')
      .attr('x', ML - 10)
      .attr('y', MT + midY)
      .attr('text-anchor', 'end')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 12)
      .attr('font-family', 'Inter, sans-serif')
      .attr('fill', 'var(--text-color)')
      .text(row.label);

    series.forEach((s, si) => {
      const laneY = top + si * laneGap;
      const value = row[s.key];
      if (value == null) return;
      const endX = x(value);

      chart.append('line')
        .attr('x1', 0).attr('y1', laneY)
        .attr('x2', endX).attr('y2', laneY)
        .attr('stroke', s.displayColor)
        .attr('stroke-width', 2.4);
      chart.append('circle')
        .attr('cx', endX).attr('cy', laneY)
        .attr('r', 3.8)
        .attr('fill', s.displayColor);
      chart.append('text')
        .attr('x', endX + 4).attr('y', laneY)
        .attr('text-anchor', 'start')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', 9.5)
        .attr('font-family', 'IBM Plex Mono, monospace')
        .attr('fill', 'var(--data-label-color)')
        .text(formatChartValue(row, s.key));
    });
  });

  chartSvg.append('text')
    .attr('x', ML + INNER_W / 2)
    .attr('y', VH - 10)
    .attr('text-anchor', 'middle')
    .attr('font-size', 12)
    .attr('font-family', 'Inter, sans-serif')
    .attr('fill', 'var(--data-label-color)')
    .text(chartData.yLabel || 'Percentage');
}

const hucFeaturesByRegion   = {};

svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

// ── Zoom & pan ────────────────────────────────────────────────────────────────
const zoom = d3.zoom()
  .scaleExtent([0.5, 20])
  .on('zoom', event => { g.attr('transform', event.transform); });

svg.call(zoom);

function resetZoom(duration) {
  (duration ? svg.transition().duration(duration) : svg)
    .call(zoom.transform, d3.zoomIdentity);

const LON_MIN = 116.93, LON_MAX = 126.60;
const LAT_MIN = 4.64,   LAT_MAX = 20.84;
const PAD = 30;


const GEO_VER = '?v=4';
const NCR_PSGC = 1300000000;

let viewStack   = [];
let currentView = 'idle';
let nationalFeatures = [], nationalPath;

// ── Projection ────────────────────────────────────────────────────────────────
function makePathFn(lonMin, lonMax, latMin, latMax) {
  const lonSpan = lonMax - lonMin, latSpan = latMax - latMin;
  const scale   = Math.min((W - 2*PAD) / lonSpan, (H - 2*PAD) / latSpan);
  const offX    = (W - lonSpan * scale) / 2;
  const offY    = (H - latSpan * scale) / 2;
  const proj = d3.geoTransform({
    point: function(lon, lat) {
      this.stream.point(offX + (lon - lonMin) * scale, offY + (latMax - lat) * scale);
    }
  });
  return d3.geoPath().projection(proj);
}

function boundsFromFeatures(features) {
  const coords = features.flatMap(f => {
    const g = f.geometry;
    if (!g) return [];
    const polys = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
    return polys.flatMap(p => p.flatMap(r => r));
  });
  return {
    lonMin: d3.min(coords, c => c[0]), lonMax: d3.max(coords, c => c[0]),
    latMin: d3.min(coords, c => c[1]), latMax: d3.max(coords, c => c[1]),
  };
}

// ── Labels ────────────────────────────────────────────────────────────────────
function shortenName(name, nameKey) {
  if (!name) return '';
  // For region names like "Region I (Ilocos Region)" extract the parenthetical
  if (nameKey === 'adm1_en') {
    const m = name.match(/\(([^)]+)\)/);
    if (m) return m[1];   // e.g. "Ilocos Region", "NCR", "CAR"
    return name;          // e.g. "CARAGA", "MIMAROPA"
  }
  // For provinces / cities: truncate only if very long
  return name.length > 20 ? name.slice(0, 18) + '…' : name;
}

function addLabels(features, pathFn, nameKey, fontSize) {
  g.selectAll('text.map-label').remove();
  g.selectAll('text.map-label')
    .data(features)
    .join('text')
    .attr('class', 'map-label')
    .attr('font-size', fontSize)
    .attr('opacity', 0)
    .each(function(d) {
      const c = pathFn.centroid(d);
      if (!c || isNaN(c[0]) || isNaN(c[1])) return;
      const label = shortenName(d.properties[nameKey], nameKey);
      d3.select(this).attr('x', c[0]).attr('y', c[1]).text(label);
    })
    .transition().delay(350).duration(300)
    .attr('opacity', 1);
}

// ── Fade helpers ──────────────────────────────────────────────────────────────
function fadeIn(sel) {
  sel.attr('opacity', 0).transition().duration(400).ease(d3.easeCubicOut).attr('opacity', 1);
}

function zoomThenRender(pathFn, feature, callback) {
  const [[x0,y0],[x1,y1]] = pathFn.bounds(feature);
  const scale = 0.85 * Math.min(W / (x1 - x0), H / (y1 - y0));
  const tx = W/2 - scale*(x0+x1)/2, ty = H/2 - scale*(y0+y1)/2;
  g.transition().duration(700).ease(d3.easeCubicInOut)
    .attr('transform', `translate(${tx},${ty}) scale(${scale})`)
    .on('end', () => {
      zoom.transform(svg, d3.zoomIdentity); // sync zoom state before redraw
      callback();
    });
}

// ── URL routing ───────────────────────────────────────────────────────────────
function pushURL(hash, replace = false) {
  try { window.parent.postMessage({ type: 'child-hash', hash }, '*'); } catch (e) {}
  if (replace) {
    history.replaceState({ hash }, '', '#' + hash);
  } else {
    history.pushState({ hash }, '', '#' + hash);
  }
}

function parseHash() {
  return location.hash.replace(/^#/, '');
}

function metricToSlug(metric) {
  return String(metric || '').replace(/_(pct|rate)\b/g, '').replace(/_/g, '');
}

function slugToMetric(slug) {
  const fields = Object.keys(config.colorDomains || {});
  return fields.find(field => metricToSlug(field) === slug) || null;
}

function parseStateHash(hash = parseHash()) {
  const parts = String(hash || '').split('--').filter(Boolean);
  const tab = parts.includes('tinsights')
    ? 'insights'
    : parts.includes('ttables')
      ? 'tables'
      : parts.includes('tcharts') || parts.includes('tdata')
        ? 'charts'
        : 'map';
  const metricToken = parts.find(part => part.startsWith('m'));
  const viewToken = parts.find(part => part.startsWith('v'));
  return {
    tab,
    metric: metricToken ? slugToMetric(metricToken.slice(1)) : null,
    viewHash: viewToken ? '/' + viewToken.slice(1).split('-').filter(Boolean).join('/') : '/',
  };
}

function buildStateHash(viewHash = '/') {
  const metric = config.colorField || Object.keys(config.colorDomains || {})[0] || 'antenatal_care_pct';
  const tabToken = activeTab === 'insights'
    ? 'tinsights'
    : activeTab === 'tables'
      ? 'ttables'
      : activeTab === 'charts'
        ? 'tcharts'
        : 'tmap';
  const parts = [tabToken, 'm' + metricToSlug(metric)];
  const cleanView = String(viewHash || '/').replace(/^\/+/, '');
  if (cleanView && cleanView !== '/') parts.push('v' + cleanView.replace(/\//g, '-'));
  return parts.join('--');
}

window.addEventListener('popstate', e => {
  const hash = (e.state && e.state.hash) || '';
  restoreFromHash(hash);
});

async function restoreFromHash(hash) {
  const state = parseStateHash(hash);
  activeTab = state.tab;
  if (state.metric) {
    applyMetric(state.metric, true, false);
  }

  drawNational(false);

  const parts = state.viewHash === '/' ? [] : state.viewHash.replace(/^\/+/, '').split('/').filter(Boolean);
  if (parts[0] !== 'region' || !parts[1]) {
    switchTab(state.tab, true, false);
    return;
  }

  await ensureNational();
  const regionPsgc = parseInt(parts[1], 10);
  const regionFeature = nationalFeatures.find(f => f.properties.adm1_psgc === regionPsgc);
  if (!regionFeature) {
    switchTab(state.tab, true, false);
    return;
  }

  const name = regionFeature.properties.adm1_en;
  currentContext = { name, parentName: 'Philippines', psgc: regionPsgc, type: 'region' };
  openDetail(name, 'Philippines', regionPsgc, 'region');
  switchTab(state.tab, true, false);
}

async function ensureNational() {
  if (nationalFeatures.length) return;
  const [countryData, hucData] = await Promise.all([
    d3.json(`./geo-nir/country.0.001.json${GEO_VER}`),
    d3.json(`./huc-boundaries.json${GEO_VER}`).catch(() => ({ features: [] })),
  ]);
  nationalFeatures = countryData.features;
  registerNames(nationalFeatures, 'adm1_psgc', 'adm1_en');
  nationalPath = makePathFn(LON_MIN, LON_MAX, LAT_MIN, LAT_MAX);
  // Index HUC features by parent province and by region.
  // Use parentMap for region lookup so NIR-realigned provinces (e.g. Negros Occidental)
  // correctly map to NIR (1800000000) instead of their standard R6/R7 region.
  for (const f of hucData.features) {
    const prov = f.properties.parent_prov_psgc;
    const reg  = Number(parentMap[String(prov)]) || f.properties.adm1_psgc;
    if (!hucFeaturesByProvince[prov]) hucFeaturesByProvince[prov] = [];
    hucFeaturesByProvince[prov].push(f);
    if (!hucFeaturesByRegion[reg]) hucFeaturesByRegion[reg] = [];
    hucFeaturesByRegion[reg].push(f);
  }
}

function getHUCsForProvince(provPsgc) {
  return hucFeaturesByProvince[provPsgc] || [];
}

// ── Back ──────────────────────────────────────────────────────────────────────
function goBack() {
  if (viewStack.length < 2) return;
  currentView = 'idle';
  closeDetail();
  viewStack.pop();
  const prev = viewStack[viewStack.length - 1];
  g.selectAll('path').transition().duration(200).attr('opacity', 0)
    .on('end', function() {
      if (this !== g.selectAll('path').nodes().at(-1)) return;
      g.selectAll('*').remove();
      prev.render();
    });
  history.back();
}

backBtn.addEventListener('click', () => {
  if (currentView === 'idle') return;
  goBack();
});

// ── National ──────────────────────────────────────────────────────────────────
async function loadNational() {
  await ensureNational();
  viewStack = [{ render: drawNational }];
  const initHash = parseHash();
  if (initHash) {
    await restoreFromHash(initHash);
  } else {
    drawNational();
    if (isMobile) {
      // Peek the bottom sheet after a beat to hint it exists
      setTimeout(() => {
        detail.classList.add('peek');
        setTimeout(() => detail.classList.remove('peek'), 1600);
      }, 1400);
    }
  }
}

function openWelcome() {
  document.getElementById('detail-eyebrow').textContent  = config.sectionTitle || 'Philippines Map';
  document.getElementById('detail-lgu-name').textContent = config.title || 'Philippines Map';
  document.getElementById('detail-region').textContent   = config.maxDepth === 'region' ? '' : 'Select a region to begin';
  const desc = config.description
    ? `<p style="font-size:12px;color:var(--text-color);line-height:1.8;margin-top:8px">${config.description}</p>`
    : '';
  detailBody.innerHTML = `<div class="no-findings" style="text-align:left;padding:20px 0">${desc}</div>` + legendHTML() + rankedListHTML('region', null) + noteHTML();
  detail.classList.add('open');
  infoBtn.style.display = 'none';
}

function showInfoBtn() {
  infoBtn.style.display = 'block';
  if (isMobile && !infoBtnFirstShown) {
    infoBtnFirstShown = true;
    infoBtn.classList.add('ring');
    infoBtn.addEventListener('animationend', () => infoBtn.classList.remove('ring'), { once: true });
  }
}

function drawNational(updateURL = true) {
  currentView = 'national';
  currentContext = null;
  backBtn.style.display = 'none';
  setPageTitle(config.title || 'Philippines Map');
  if (isMobile) { closeDetail(); infoBtn.style.display = 'block'; } else openWelcome();
  resetZoom();
  g.selectAll('*').remove();

  g.selectAll('path')
    .data(nationalFeatures)
    .join('path')
    .attr('class', 'region')
    .attr('d', nationalPath)
    .style('fill', d => getFill('region', d.properties.adm1_psgc))
    .call(fadeIn)
    .on('click', (e, d) => {
      if (config.maxDepth === 'region') {
        const name = d.properties.adm1_en;
        const psgc = d.properties.adm1_psgc;
        currentContext = { name, parentName: 'Philippines', psgc, type: 'region' };
        openDetail(name, 'Philippines', psgc, 'region');
        pushURL(buildStateHash(`/region/${psgc}`));
      } else {
        drillRegion(d);
      }
    });

  addLabels(nationalFeatures, nationalPath, 'adm1_en', 10);
  queueMicrotask(() => {
    status.textContent = config.maxDepth === 'region'
      ? nationalFeatures.length + ' regions - click a region for details'
      : nationalFeatures.length + ' regions - click to drill in';
    if (updateURL) {
      pushURL(buildStateHash('/'), true);
    }
  });
  if (config.maxDepth === 'region') {
    queueMicrotask(() => {
      status.textContent = nationalFeatures.length + ' regions - click a region for details';
    });
  }
  status.textContent = nationalFeatures.length + ' regions — click to drill in';
}

// ── Region → provinces ────────────────────────────────────────────────────────
function drillRegion(regionFeature, skipAnimation, afterRender) {
  if (currentView === 'idle') return;
  currentView = 'idle';
  const psgc = regionFeature.properties.adm1_psgc;
  const name = regionFeature.properties.adm1_en;

  const loadAndRender = (features, nameKey, bgFeatures) => {
    const { lonMin, lonMax, latMin, latMax } = boundsFromFeatures(features);
    const lp  = (lonMax - lonMin) * 0.08, ltp = (latMax - latMin) * 0.08;
    const provPath = makePathFn(lonMin - lp, lonMax + lp, latMin - ltp, latMax + ltp);

    const renderFn = () => {
      currentView = 'region';
      currentContext = { name, parentName: 'Philippines', psgc, type: 'region' };
      backBtn.style.display = 'block';
      backBtn.textContent = '← Philippines';
      setPageTitle(name + ' — ' + config.title);
      showInfoBtn();
      if (detail.classList.contains('open')) populateDetail(name, 'Philippines', psgc, 'region');
      resetZoom();
      g.selectAll('*').remove();

      // Background fill layer (used for NCR to cover gaps between independently-simplified municipality polygons)
      if (bgFeatures && bgFeatures.length) {
        g.selectAll('path.region-bg')
          .data(bgFeatures)
          .join('path')
          .attr('class', 'region-bg')
          .attr('d', provPath)
          .style('fill', 'var(--poly-fill)')
          .attr('stroke', 'none')
          .style('pointer-events', 'none');
      }

      const isMunicity = nameKey === 'adm3_en';
      registerNames(features, isMunicity ? 'adm3_psgc' : 'adm2_psgc', nameKey);
      g.selectAll('path.mun-fg')
        .data(features)
        .join('path')
        .attr('class', d => {
          if (isMunicity) return 'municity mun-fg leaf';
          const canDrill = config.maxDepth !== 'province' && provincesWithMunicity.has(String(d.properties.adm2_psgc));
          return 'province mun-fg' + (canDrill ? '' : ' leaf');
        })
        .attr('d', provPath)
        .style('fill', d => isMunicity
          ? getFill('municity', d.properties.adm3_psgc)
          : getFill('province', d.properties.adm2_psgc))
        .call(fadeIn)
        .on('click', (e, d) => {
          if (!isMunicity && config.maxDepth !== 'province' && provincesWithMunicity.has(String(d.properties.adm2_psgc))) {
            drillProvince(d, provPath, nameKey);
          }
        });

      // HUC cities: overlay on province polygons in the region view, colored at province level
      if (!isMunicity) {
        const hucFeatures = hucFeaturesByRegion[psgc] || [];
        if (hucFeatures.length) {
          registerNames(hucFeatures, 'adm3_psgc', 'adm3_en');
          g.selectAll('path.huc-city.region-huc')
            .data(hucFeatures)
            .join('path')
            .attr('class', 'huc-city region-huc leaf')
            .attr('d', provPath)
            .style('fill', d => getFill('province', d.properties.adm3_psgc))
            .call(fadeIn);
        }
      }

      addLabels(features, provPath, nameKey, 9);

      // HUC labels added after addLabels so they aren't wiped by its .map-label cleanup
      if (!isMunicity) {
        const hucFeatures = hucFeaturesByRegion[psgc] || [];
        if (hucFeatures.length) {
          g.selectAll('text.huc-region-label')
            .data(hucFeatures)
            .join('text')
            .attr('class', 'map-label huc-region-label')
            .attr('font-size', 7)
            .attr('opacity', 0)
            .each(function(d) {
              const c = provPath.centroid(d);
              if (!c || isNaN(c[0]) || isNaN(c[1])) return;
              d3.select(this).attr('x', c[0]).attr('y', c[1]).text(d.properties.adm3_en || '');
            })
            .transition().delay(350).duration(300).attr('opacity', 1);
        }
      }

      const unit = isMunicity ? 'cities/municipalities' : 'provinces';
      status.textContent = `${name} — ${features.length} ${unit}`;

      if (afterRender) afterRender(provPath, features, nameKey);
    };

    viewStack.push({ render: renderFn });
    if (!skipAnimation) pushURL(`/region/${psgc}`);

    if (skipAnimation) {
      g.selectAll('*').remove();
      renderFn();
    } else {
      zoomThenRender(nationalPath, regionFeature, renderFn);
    }
  };

  if (psgc === NCR_PSGC) {
    // NCR skips the district level for UX. Uses medres municipality files for better
    // polygon fidelity, and uses the already-loaded NCR region feature as a background
    // fill to cover seams between independently-simplified municipality boundaries.
    const districtPsgcs = [1303900000, 1307400000, 1307500000, 1307600000];
    Promise.all(
      districtPsgcs.map(d => d3.json(`${GEO_BASE}/2023/geojson/provdists/medres/municities-provdist-${d}.0.01.json${GEO_VER}`))
    ).then(munDatas => {
      const munFeatures = munDatas.flatMap(d => d.features);
      loadAndRender(munFeatures, 'adm3_en', [regionFeature]);
    }).catch(err => { status.textContent = 'Error: ' + err; currentView = 'national'; });
  } else {
    // R6, R7, and NIR (1800000000) use geo-nir/ overrides in the NIR alignment
    const NIR_REGION_OVERRIDES = new Set([600000000, 700000000, 1800000000, ...(config.geoOverrides || [])]);
    const regionFileURL = NIR_REGION_OVERRIDES.has(psgc)
      ? `./geo-nir/provdists-region-${psgc}.0.001.json${GEO_VER}`
      : `${GEO_BASE}/2023/geojson/regions/lowres/provdists-region-${psgc}.0.001.json${GEO_VER}`;
    d3.json(regionFileURL)
      .then(data => loadAndRender(data.features, 'adm2_en'))
      .catch(err => { status.textContent = 'Error: ' + err; currentView = 'national'; });
  }
}

// ── Municipality → isolated city view ────────────────────────────────────────
function drillMunicity(munFeature, parentPathFn, parentName, skipAnimation) {
  if (currentView === 'idle') return;
  currentView = 'idle';

  const name    = munFeature.properties.adm3_en;
  const psgc    = munFeature.properties.adm3_psgc;
  const regPsgc = munFeature.properties.adm1_psgc;
  const provPsgc = munFeature.properties.adm2_psgc;

  const { lonMin, lonMax, latMin, latMax } = boundsFromFeatures([munFeature]);
  const lp  = Math.max((lonMax - lonMin) * 0.25, 0.02);
  const ltp = Math.max((latMax - latMin) * 0.25, 0.02);
  const munPath = makePathFn(lonMin - lp, lonMax + lp, latMin - ltp, latMax + ltp);

  const renderFn = () => {
    currentView = 'municity';
    currentContext = { name, parentName, psgc, type: 'municity' };
    backBtn.style.display = 'block';
    backBtn.textContent = '← ' + parentName;
    setPageTitle(name + ' — ' + config.title);
    showInfoBtn();
    resetZoom();
    g.selectAll('*').remove();

    g.selectAll('path')
      .data([munFeature])
      .join('path')
      .attr('class', 'municity')
      .attr('d', munPath)
      .style('fill', getFill('municity', psgc))
      .call(fadeIn)
      .on('click', () => openDetail(name, parentName, psgc, 'municity'));

    addLabels([munFeature], munPath, 'adm3_en', 13);
    status.textContent = name;
    openDetail(name, parentName, psgc, 'municity');
  };

  viewStack.push({ render: renderFn });
  if (provPsgc) {
    pushURL(`/region/${regPsgc}/province/${provPsgc}/municity/${psgc}`);
  } else {
    pushURL(`/region/${regPsgc}/municity/${psgc}`);
  }

  if (skipAnimation) {
    g.selectAll('*').remove();
    renderFn();
  } else {
    zoomThenRender(parentPathFn, munFeature, renderFn);
  }
}

// ── Province → municipalities ─────────────────────────────────────────────────
function drillProvince(provFeature, provPath, parentNameKey, skipAnimation, afterRender) {
  if (currentView === 'idle') return;
  currentView = 'idle';

  const psgc    = provFeature.properties.adm2_psgc;
  const regPsgc = provFeature.properties.adm1_psgc;
  const name    = provFeature.properties[parentNameKey] || provFeature.properties.adm2_en;

  d3.json(`${GEO_BASE}/2023/geojson/provdists/lowres/municities-provdist-${psgc}.0.001.json${GEO_VER}`)
  .then(data => {
      const munFeatures = data.features.filter(f => f.geometry != null);
      const hucFeatures = getHUCsForProvince(psgc);
      registerNames(munFeatures, 'adm3_psgc', 'adm3_en');
      registerNames(hucFeatures, 'adm3_psgc', 'adm3_en');
      const { lonMin, lonMax, latMin, latMax } = boundsFromFeatures([...munFeatures, ...hucFeatures]);
      const lp = (lonMax - lonMin) * 0.08, ltp = (latMax - latMin) * 0.08;
      const munPath = makePathFn(lonMin - lp, lonMax + lp, latMin - ltp, latMax + ltp);

      const renderFn = () => {
        currentView = 'province';
        const regionName = currentContext ? currentContext.name : '';
        currentContext = { name, parentName: regionName, psgc, type: 'province' };
        backBtn.style.display = 'block';
        backBtn.textContent = '← ' + regionName;
        setPageTitle(name + ' — ' + config.title);
        showInfoBtn();
        if (detail.classList.contains('open')) populateDetail(name, regionName, psgc, 'province');
        resetZoom();
        g.selectAll('*').remove();

        // Municipality polygons
        g.selectAll('path.municity')
          .data(munFeatures)
          .join('path')
          .attr('class', 'municity')
          .attr('d', munPath)
          .style('fill', d => getFill('municity', d.properties.adm3_psgc))
          .call(fadeIn)
          .on('click', (e, d) => drillMunicity(d, munPath, name));

        // Municipality labels — pointer-events enabled so tiny polygons (e.g. islands)
        // are still clickable via their label even when the polygon itself is too small to hit
        g.selectAll('text.mun-label')
          .data(munFeatures)
          .join('text').attr('class', 'map-label mun-label').attr('font-size', 8).attr('opacity', 0)
          .style('pointer-events', 'auto').style('cursor', 'pointer')
          .each(function(d) {
            const c = munPath.centroid(d);
            if (!c || isNaN(c[0]) || isNaN(c[1])) return;
            d3.select(this).attr('x', c[0]).attr('y', c[1]).text(d.properties.adm3_en || '');
          })
          .on('click', (e, d) => drillMunicity(d, munPath, name))
          .transition().delay(350).duration(300).attr('opacity', 1);

        // HUC cities: proper polygon features from huc-boundaries.json,
        // rendered with the same munPath projection so they fill the geographic
        // voids left by the province municipality data.
        if (hucFeatures.length) {
          g.selectAll('path.huc-city')
            .data(hucFeatures)
            .join('path')
            .attr('class', 'huc-city')
            .attr('d', munPath)
            .style('fill', d => getFill('province', d.properties.adm3_psgc))
            .call(fadeIn)
            .on('click', (e, d) => drillMunicity(d, munPath, name));

          g.selectAll('text.huc-label')
            .data(hucFeatures)
            .join('text').attr('class', 'map-label huc-label').attr('font-size', 8).attr('opacity', 0)
            .style('pointer-events', 'auto').style('cursor', 'pointer')
            .each(function(d) {
              const c = munPath.centroid(d);
              if (!c || isNaN(c[0]) || isNaN(c[1])) return;
              d3.select(this).attr('x', c[0]).attr('y', c[1]).text(d.properties.adm3_en || '');
            })
            .on('click', (e, d) => drillMunicity(d, munPath, name))
            .transition().delay(350).duration(300).attr('opacity', 1);
        }

        status.textContent = `${name} — ${munFeatures.length} municipalities/cities (${data.features.length} total)${hucFeatures.length ? ' + ' + hucFeatures.length + ' HUC' + (hucFeatures.length > 1 ? 's' : '') : ''}`;
        if (afterRender) afterRender(munPath, munFeatures);
      };

      viewStack.push({ render: renderFn });
      if (!skipAnimation) pushURL(`/region/${regPsgc}/province/${psgc}`);

      if (skipAnimation) {
        g.selectAll('*').remove();
        renderFn();
      } else {
        zoomThenRender(provPath, provFeature, renderFn);
      }
    })
    .catch(() => {
      status.textContent = 'No municipality data for ' + name;
      currentView = 'region';
    });
}

// ── Detail panel ──────────────────────────────────────────────────────────────
const detailClose = document.getElementById('detail-close');
const detailBody  = document.getElementById('detail-body');
detailClose.addEventListener('click', closeDetail);

const LEVEL_LABEL = { region: 'Region', province: 'Province / District', municity: 'City / Municipality' };

function noteHTML() {
  const def = config.definitions?.[config.colorField];
  const metricNote = config.notes?.[config.colorField];
  const sharedNote = config.note;
  const style = 'font-size:11px;color:var(--data-label-color);line-height:1.6;margin:10px 0 4px';
  return (def ? `<p style="${style}">${def}</p>` : '')
       + (metricNote ? `<p style="${style}">${metricNote}</p>` : '')
       + (sharedNote ? `<p style="${style}">${sharedNote}</p>` : '');
}

function legendHTML() {
  if (!colorScale || !config.colorDomain) return '';
  const [lo, hi] = config.colorDomain;
  const N = 24;
  const stops = Array.from({length: N}, (_, i) => colorScale(lo + (hi - lo) * i / (N - 1))).join(',');
  const suffix = config.valueSuffix || '';
  const fieldLabel = config.detailFields?.find(f => f.key === config.colorField)?.label || config.colorField || '';
  return `<div class="section-head">${fieldLabel}</div>` +
    `<div class="legend-bar" style="background:linear-gradient(to right,${stops})"></div>` +
    `<div class="legend-ends"><span>${lo}${suffix}</span><span>${hi}${suffix}</span></div>`;
}

function rankedListHTML(level, activePsgc, filterParentPsgc) {
  let records = Object.values(dataByLevel[level] || {});
  if (!records.length || !config.colorField) return '';
  if (filterParentPsgc != null) {
    const fp = String(filterParentPsgc);
    records = records.filter(r => parentMap[String(r.psgc)] === fp);
  }
  const sorted = [...records]
    .filter(r => r[config.colorField] != null)
    .sort((a, b) => (b[config.colorField] ?? -Infinity) - (a[config.colorField] ?? -Infinity));
  if (!sorted.length) return '';
  const levelLabel = LEVEL_LABEL[level] || level;
  const displayField = config.colorField + '_display';
  const superscripts = ['¹','²','³','⁴','⁵','⁶','⁷','⁸','⁹'];
  const notedPsgcs = new Map();
  let noteCounter = 0;
  sorted.forEach(r => { if (r.psa_note) notedPsgcs.set(String(r.psgc), superscripts[noteCounter++] || String(noteCounter)); });
  const rows = sorted.map((r, i) => {
    const rawName = nameRegistry[String(r.psgc)] || ('PSGC ' + r.psgc);
    const sup  = notedPsgcs.get(String(r.psgc));
    const name = sup ? `${rawName}<sup style="font-size:9px">${sup}</sup>` : rawName;
    const val  = r[config.colorField];
    const fill = colorScale ? colorScale(val) : 'transparent';
    const active = activePsgc != null && String(r.psgc) === String(activePsgc);
    const display = r[displayField] ?? (val == null ? '-' : String(val));
    return `<div class="ranked-row${active ? ' is-active' : ''}">` +
      `<span class="ranked-i">${i + 1}</span>` +
      `<span class="ranked-swatch" style="background:${fill}"></span>` +
      `<span class="ranked-name">${name}</span>` +
      `<span class="ranked-val">${display}</span>` +
      `</div>`;
  }).join('');
  const notes = [...notedPsgcs.entries()].map(([psgc, sup]) => {
    const rec = sorted.find(r => String(r.psgc) === psgc);
    return `<p style="font-size:11px;line-height:1.6;color:var(--data-label-color);margin:10px 0 0">${sup} ${rec.psa_note}</p>`;
  }).join('');
  const heading = filterParentPsgc != null
    ? `${levelLabel}s in ${nameRegistry[String(filterParentPsgc)] || ''}`
    : `All ${levelLabel}s`;
  return `<div class="section-head">${heading}</div><div>${rows}</div>${notes}`;
}

function populateDetail(lguName, parentName, psgc, type = 'municity') {
  document.getElementById('detail-eyebrow').textContent  = LEVEL_LABEL[type] || type;
  document.getElementById('detail-lgu-name').textContent = lguName;
  document.getElementById('detail-region').textContent   = parentName;

  const record = dataByLevel[type]?.[String(psgc)];
  const fields  = config.detailFields || [];

  let dataHTML = '';
  if (record && fields.length) {
    const rows = fields
      .filter(f => f.key in record)
      .map(f => {
        const val = record[f.key];
        if (f.key === 'psa_note') {
          return val != null
            ? `<p style="font-size:11px;line-height:1.6;color:var(--data-label-color);margin:8px 0 0">${val}</p>`
            : '';
        }
        const display = record[f.key + '_display'] ?? (val == null ? '-' : val);
        return `<div class="data-row"><span class="data-label">${f.label}</span><span class="data-value">${display}</span></div>`;
      })
      .join('');
    dataHTML = rows || `<div class="no-findings">No data for this area.</div>`;
  } else {
    dataHTML = `<div class="no-findings">No data for this area.</div>`;
  }
  let listHTML = '';
  if (type === 'region') {
    listHTML = rankedListHTML('province', null, psgc) || rankedListHTML('municity', null, psgc);
  } else if (type === 'province') {
    listHTML = rankedListHTML('municity', null, psgc);
  } else {
    listHTML = rankedListHTML('municity', psgc, parentMap[String(psgc)]);
  }
  detailBody.innerHTML = dataHTML + legendHTML() + listHTML + noteHTML();
}

function openDetail(lguName, parentName, psgc, type = 'municity') {
  populateDetail(lguName, parentName, psgc, type);
  detail.classList.remove('peek');
  detail.classList.add('open');
  infoBtn.style.display = 'none';
}

function closeDetail() {
  detail.classList.remove('open');
  infoBtn.style.display = 'block';
  if (config.maxDepth === 'region' && currentView === 'national' && currentContext) {
    currentContext = null;
    pushURL(buildStateHash('/'), true);
  }
}

infoBtn.addEventListener('click', () => {
  if (currentContext) {
    openDetail(currentContext.name, currentContext.parentName, currentContext.psgc, currentContext.type);
    if (config.maxDepth === 'region' && currentContext.type === 'region') {
      pushURL(buildStateHash(`/region/${currentContext.psgc}`), true);
    }
  } else {
    openWelcome();
  }
});

// ── Page title ────────────────────────────────────────────────────────────────
const TITLE_SUFFIX = ' | 2025 NDHS Key Indicators';
function setPageTitle(title) {
  const fullTitle = title + TITLE_SUFFIX;
  document.title = fullTitle;
  try { window.parent.document.title = fullTitle; } catch(e) {}
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  await loadConfig();
  renderMetricControls();
  setPageTitle(config.title || 'Philippines Map');
  await loadNational();
}
boot();
</script>
