<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Source of Modern Contraception Methods</title>
<style>
  :root {
    --bg:               #edf1f7;
    --panel-bg:         #ffffff;
    --panel-border:     rgba(0,0,0,0.09);
    --panel-divider:    rgba(0,0,0,0.07);
    --btn-bg:           rgba(0,0,0,0.06);
    --btn-border:       rgba(0,0,0,0.18);
    --btn-color:        #1a2840;
    --btn-hover-bg:     rgba(0,0,0,0.11);
    --scroll-thumb:     rgba(0,0,0,0.1);
    --section-color:    rgba(0,0,0,0.28);
    --region-color:     rgba(0,0,0,0.48);
    --text-color:       rgba(0,0,0,0.68);
    --title-color:      #1a2840;
    --data-label-color: rgba(0,0,0,0.42);
    --no-data-color:    rgba(0,0,0,0.28);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    min-height: 100%;
    background: var(--bg);
    color: var(--text-color);
    font-family: 'Inter', system-ui, sans-serif;
  }

  #tab-bar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--panel-divider);
  }

  .tab-btn {
    flex-shrink: 0;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-color);
    font: 11px 'IBM Plex Mono', monospace;
    padding: 5px 13px;
    letter-spacing: 0.4px;
    white-space: nowrap;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .tab-btn.active {
    background: var(--btn-hover-bg);
    border-color: rgba(0,0,0,0.36);
  }
  .tab-btn:hover { background: var(--btn-hover-bg); }

  .tab-panel {
    padding: 28px 28px 56px;
  }

  #charts-container,
  #tables-container {
    max-width: 1480px;
    margin: 0 auto;
  }

  .page-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--title-color);
    line-height: 1.25;
    margin-bottom: 4px;
  }

  .page-subtitle {
    font-size: 12px;
    color: var(--region-color);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .chart-intro {
    max-width: 860px;
    font-size: 13px;
    color: var(--text-color);
    line-height: 1.7;
    margin-bottom: 22px;
  }

  .dt-section {
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px;
  }

  /* Waffle stack layout */

  .chart-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
  }

  @media (max-width: 900px) {
    .chart-grid {
      grid-template-columns: 1fr !important;
    }
  }

  .chart-block {
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px 16px 14px;
  }

  .chart-block-title {
    font: 10px/1 'IBM Plex Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--section-color);
    margin-bottom: 12px;
  }

  .waffle-stack {
    display: flex;
    flex-direction: column;
  }

  .waffle-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 16px;
    align-items: start;
    padding: 8px 0;
    border-top: 1px solid var(--panel-divider);
  }

  .waffle-row:first-child {
    border-top: none;
  }

  .waffle-row--all {
    padding-bottom: 12px;
    border-bottom: 1px solid var(--panel-divider);
    margin-bottom: 4px;
  }

  .waffle-label-col {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding-top: 4px;
  }

  .waffle-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--title-color);
    line-height: 1.3;
  }

  .waffle-row--all .waffle-title {
    font-size: 14px;
  }

  .waffle-share {
    font: 10px/1.2 'IBM Plex Mono', monospace;
    color: var(--data-label-color);
  }

  .waffle-hbar {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    padding: 0;
  }

  .waffle-cell {
    width: 7px;
    height: 7px;
    flex: none;
  }

  /* Shared legend */

  .waffle-legend {
    border-top: 1px solid var(--panel-divider);
    padding-top: 14px;
    margin-top: 14px;
  }

  .waffle-legend-title {
    font: 10px/1 'IBM Plex Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--section-color);
    margin-bottom: 14px;
  }

  .waffle-legend-sectors {
    display: flex;
    flex-wrap: wrap;
    gap: 20px 36px;
  }

  .waffle-legend-sector-label {
    font: 10px/1 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--section-color);
    margin-bottom: 8px;
  }

  .waffle-legend-items {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .waffle-legend-item {
    display: flex;
    align-items: baseline;
    gap: 7px;
    font-size: 12px;
    color: var(--title-color);
    line-height: 1.4;
  }

  .waffle-legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex: none;
    margin-top: 2px;
  }

  .chart-footnotes,
  .dt-footnotes {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--panel-divider);
  }

  .chart-note,
  .dt-note {
    font-size: 11px;
    color: var(--data-label-color);
    line-height: 1.7;
    margin-bottom: 2px;
  }

  .chart-source,
  .dt-source {
    font-size: 11px;
    color: var(--data-label-color);
    margin-top: 10px;
    font-style: italic;
  }

  .dt-section {
    margin-bottom: 24px;
  }

  .dt-section-label {
    font: 10px/1 'IBM Plex Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--section-color);
    margin-bottom: 8px;
  }

  .dt-section-subtitle {
    font-size: 12px;
    color: var(--region-color);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .dt-table-wrap {
    overflow-x: auto;
  }

  .dt-table-wrap::-webkit-scrollbar { height: 6px; }

  .dt-table-wrap::-webkit-scrollbar-thumb {
    background: var(--scroll-thumb);
    border-radius: 3px;
  }

  .dt-table {
    width: 100%;
    min-width: 1380px;
    border-collapse: collapse;
    font-size: 12px;
  }

  .dt-table thead th {
    font: 10px/1.3 'IBM Plex Mono', monospace;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--data-label-color);
    padding: 6px 10px 8px;
    text-align: right;
    vertical-align: bottom;
    border-bottom: 2px solid var(--panel-border);
    white-space: nowrap;
  }

  .dt-table thead th:first-child {
    text-align: left;
    min-width: 260px;
    white-space: normal;
  }

  .dt-table thead th.col-group {
    text-align: center;
    border-bottom: 1px solid var(--panel-border);
    border-right: 1px solid var(--panel-divider);
    padding-bottom: 4px;
    letter-spacing: 1px;
  }

  .dt-table thead th.col-group:last-child { border-right: none; }

  .dt-table th.year-2022,
  .dt-table td.year-2022 {
    background: rgba(26,40,64,0.035);
  }

  .dt-table th.year-break,
  .dt-table td.year-break {
    border-left: 2px solid rgba(26,40,64,0.12);
  }

  .dt-table thead tr.sub-header th {
    border-bottom: 2px solid var(--panel-border);
    border-right: 1px solid var(--panel-divider);
    text-transform: none;
    line-height: 1.4;
    white-space: normal;
    min-width: 92px;
  }

  .dt-table thead tr.sub-header th:last-child { border-right: none; }

  .dt-table tbody tr { border-bottom: 1px solid var(--panel-divider); }
  .dt-table tbody tr:last-child { border-bottom: none; }

  .dt-table tbody td {
    padding: 7px 10px;
    color: var(--text-color);
    text-align: right;
    border-right: 1px solid var(--panel-divider);
    white-space: nowrap;
  }

  .dt-table tbody td:last-child { border-right: none; }

  .dt-table tbody td:first-child {
    text-align: left;
    color: var(--title-color);
    white-space: normal;
  }

  .dt-table td.na {
    color: var(--no-data-color);
    font-style: italic;
  }

  .dt-table tbody tr.dt-total-row td {
    font-weight: 600;
    border-top: 2px solid var(--panel-border);
  }

  .dt-table tbody tr.dt-summary-row td {
    font-weight: 600;
    border-top: 1px solid var(--panel-border);
  }

  .inline-sup {
    font-size: 9px;
    margin-left: 1px;
  }

  @media (max-width: 720px) {
    .tab-panel {
      padding: 20px 16px 40px;
    }

    .waffle-row {
      grid-template-columns: 120px 1fr;
    }
  }
</style>
</head>
<body>
<div id="tab-bar">
  <button class="tab-btn active" type="button" data-tab="charts">Charts</button>
  <button class="tab-btn" type="button" data-tab="tables">Data Tables</button>
</div>
<main id="tab-charts" class="tab-panel">
  <div id="charts-container"></div>
</main>
<main id="tab-tables" class="tab-panel" hidden>
  <div id="tables-container"></div>
</main>
<script>
let config = {};

const CHART_HASH = 'tcharts';
const TABLE_HASH = 'ttables';
const LEGACY_TABLE_HASH = 'tdata';

const chartsContainer = document.getElementById('charts-container');
const tablesContainer = document.getElementById('tables-container');
const panels = {
  charts: document.getElementById('tab-charts'),
  tables: document.getElementById('tab-tables'),
};
const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));

function normalizeText(value) {
  return String(value ?? '')
    .replace(/Â(?=[¹²³⁴⁵⁶⁷⁸⁹⁰])/g, '')
    .trim();
}

function appendTextWithNote(container, label, noteRef) {
  container.appendChild(document.createTextNode(normalizeText(label || '')));
  if (noteRef) {
    const sup = document.createElement('sup');
    sup.className = 'inline-sup';
    sup.textContent = normalizeText(noteRef);
    container.appendChild(sup);
  }
}

function createPageHeader(title, subtitle) {
  const header = document.createElement('div');

  const titleNode = document.createElement('div');
  titleNode.className = 'page-title';
  titleNode.textContent = normalizeText(title || config.title || '');
  header.appendChild(titleNode);

  if (subtitle) {
    const subtitleNode = document.createElement('div');
    subtitleNode.className = 'page-subtitle';
    subtitleNode.textContent = normalizeText(subtitle);
    header.appendChild(subtitleNode);
  }

  return header;
}

function buildValueCell(value) {
  const cell = document.createElement('td');
  const display = value == null ? 'NA' : String(value);
  cell.textContent = normalizeText(display);
  if (display === 'NA' || display === '*') cell.className = 'na';
  return cell;
}

function applyYearClasses(node, group, groupIndex, colIndex) {
  if (group && String(group.label || '').trim() === '2022') node.classList.add('year-2022');
  if (groupIndex > 0 && colIndex === 0) node.classList.add('year-break');
}

function createTableSection(sectionConfig) {
  const section = document.createElement('section');
  section.className = 'dt-section';

  const label = document.createElement('div');
  label.className = 'dt-section-label';
  appendTextWithNote(label, sectionConfig.title || '', sectionConfig.titleNoteRef);
  section.appendChild(label);

  if (sectionConfig.subtitle) {
    const subtitle = document.createElement('div');
    subtitle.className = 'dt-section-subtitle';
    subtitle.textContent = normalizeText(sectionConfig.subtitle);
    section.appendChild(subtitle);
  }

  const wrap = document.createElement('div');
  wrap.className = 'dt-table-wrap';
  section.appendChild(wrap);

  const table = document.createElement('table');
  table.className = 'dt-table';
  wrap.appendChild(table);

  const columnMeta = (sectionConfig.colGroups || []).flatMap((group, groupIndex) =>
    (group.cols || []).map((col, colIndex) => ({ group, groupIndex, colIndex }))
  );

  const thead = table.createTHead();
  const groupRow = thead.insertRow();
  groupRow.appendChild(document.createElement('th'));

  (sectionConfig.colGroups || []).forEach((group, groupIndex) => {
    const th = document.createElement('th');
    th.className = 'col-group';
    th.colSpan = (group.cols || []).length;
    applyYearClasses(th, group, groupIndex, 0);
    th.textContent = normalizeText(group.label || '');
    groupRow.appendChild(th);
  });

  const subRow = thead.insertRow();
  subRow.className = 'sub-header';
  subRow.appendChild(document.createElement('th'));

  (sectionConfig.colGroups || []).forEach((group, groupIndex) => {
    (group.cols || []).forEach((col, colIndex) => {
      const th = document.createElement('th');
      applyYearClasses(th, group, groupIndex, colIndex);
      appendTextWithNote(th, col.label || '', col.noteRef);
      subRow.appendChild(th);
    });
  });

  const tbody = table.createTBody();
  (sectionConfig.rows || []).forEach(row => {
    const tr = tbody.insertRow();
    if (row.rowClass) tr.className = row.rowClass;

    const labelCell = document.createElement('td');
    appendTextWithNote(labelCell, row.label || '', row.noteRef);
    tr.appendChild(labelCell);

    (row.values || []).forEach((value, valueIndex) => {
      const meta = columnMeta[valueIndex] || {};
      const cell = buildValueCell(value);
      applyYearClasses(cell, meta.group, meta.groupIndex || 0, meta.colIndex || 0);
      tr.appendChild(cell);
    });
  });

  if (sectionConfig.footnotes?.length || sectionConfig.source) {
    const foot = document.createElement('div');
    foot.className = 'dt-footnotes';

    (sectionConfig.footnotes || []).forEach(note => {
      const row = document.createElement('div');
      row.className = 'dt-note';
      row.textContent = normalizeText(note);
      foot.appendChild(row);
    });

    if (sectionConfig.source) {
      const source = document.createElement('div');
      source.className = 'dt-source';
      source.textContent = `Source: ${normalizeText(sectionConfig.source)}`;
      foot.appendChild(source);
    }

    section.appendChild(foot);
  }

  tablesContainer.appendChild(section);
}

function buildHorizontalCells(method) {
  const N = Math.round((method.totalShare || 0) * 10);
  const cells = [];
  const sources = (method.sources || []).filter(s => s.pct > 0);
  let cumulative = 0;
  sources.forEach(source => {
    cumulative += source.pct;
    const target = Math.round(cumulative * N / 100);
    while (cells.length < target) {
      cells.push({ color: source.color, label: source.label, pct: source.pct });
    }
  });
  while (cells.length < N) cells.push({ color: 'rgba(0,0,0,0.06)', label: '' });
  return cells.slice(0, N);
}

function createWaffleRow(method) {
  const row = document.createElement('section');
  row.className = method.key === 'total' ? 'waffle-row waffle-row--all' : 'waffle-row';

  const labelCol = document.createElement('div');
  labelCol.className = 'waffle-label-col';

  const title = document.createElement('div');
  title.className = 'waffle-title';
  appendTextWithNote(title, method.label || '', method.noteRef);
  labelCol.appendChild(title);

  const share = document.createElement('div');
  share.className = 'waffle-share';
  share.textContent = `${normalizeText(method.totalShareLabel)}%`;
  labelCol.appendChild(share);

  row.appendChild(labelCol);

  const hbar = document.createElement('div');
  hbar.className = 'waffle-hbar';

  buildHorizontalCells(method).forEach(cell => {
    const node = document.createElement('div');
    node.className = 'waffle-cell';
    node.style.background = cell.color || 'rgba(0,0,0,0.06)';
    if (cell.label && cell.pct != null) {
      node.title = `${normalizeText(cell.label)} - ${Number(cell.pct).toFixed(1)}%`;
    }
    hbar.appendChild(node);
  });

  row.appendChild(hbar);
  return row;
}

function buildSharedLegend(methods) {
  const sectorMap = new Map();

  methods.forEach(method => {
    (method.sources || []).forEach(source => {
      if (!sectorMap.has(source.sectorKey)) {
        sectorMap.set(source.sectorKey, { label: source.sectorLabel, items: new Map() });
      }
      const sector = sectorMap.get(source.sectorKey);
      if (!sector.items.has(source.key)) {
        sector.items.set(source.key, source);
      }
    });
  });

  const legend = document.createElement('div');
  legend.className = 'waffle-legend';

  const legendTitle = document.createElement('div');
  legendTitle.className = 'waffle-legend-title';
  legendTitle.textContent = 'Source';
  legend.appendChild(legendTitle);

  const sectorsEl = document.createElement('div');
  sectorsEl.className = 'waffle-legend-sectors';

  sectorMap.forEach(sector => {
    const col = document.createElement('div');

    const sectorLabel = document.createElement('div');
    sectorLabel.className = 'waffle-legend-sector-label';
    sectorLabel.textContent = normalizeText(sector.label);
    col.appendChild(sectorLabel);

    const items = document.createElement('div');
    items.className = 'waffle-legend-items';

    sector.items.forEach(source => {
      const item = document.createElement('div');
      item.className = 'waffle-legend-item';

      const swatch = document.createElement('span');
      swatch.className = 'waffle-legend-swatch';
      swatch.style.background = source.color;
      item.appendChild(swatch);

      const label = document.createElement('span');
      appendTextWithNote(label, source.label || '', source.noteRef);
      item.appendChild(label);

      items.appendChild(item);
    });

    col.appendChild(items);
    sectorsEl.appendChild(col);
  });

  legend.appendChild(sectorsEl);
  return legend;
}

function renderCharts() {
  if (!chartsContainer || !config.chartData) return;
  chartsContainer.innerHTML = '';

  const chartData = config.chartData;
  chartsContainer.appendChild(createPageHeader(chartData.title || config.title, chartData.subtitle || ''));

  const grid = document.createElement('div');
  grid.className = 'chart-grid';
  chartsContainer.appendChild(grid);

  (chartData.blocks || []).forEach(block => {
    const card = document.createElement('section');
    card.className = 'chart-block';

    const title = document.createElement('div');
    title.className = 'chart-block-title';
    title.textContent = block.year || '';
    card.appendChild(title);

    const stack = document.createElement('div');
    stack.className = 'waffle-stack';

    (block.methods || []).forEach(method => {
      const row = document.createElement('div');
      row.className = method.key === 'total' ? 'waffle-row waffle-row--all' : 'waffle-row';

      const labelCol = document.createElement('div');
      labelCol.className = 'waffle-label-col';

      const titleEl = document.createElement('div');
      titleEl.className = 'waffle-title';
      appendTextWithNote(titleEl, method.label || '', method.noteRef);
      labelCol.appendChild(titleEl);

      const share = document.createElement('div');
      share.className = 'waffle-share';
      share.textContent = `${normalizeText(method.totalShareLabel)}%`;
      labelCol.appendChild(share);

      row.appendChild(labelCol);

      const hbar = document.createElement('div');
      hbar.className = 'waffle-hbar';

      buildHorizontalCells(method).forEach(cell => {
        const node = document.createElement('div');
        node.className = 'waffle-cell';
        node.style.background = cell.color || 'rgba(0,0,0,0.06)';
        if (cell.label && cell.pct != null) {
          node.title = `${normalizeText(cell.label)} - ${Number(cell.pct).toFixed(1)}%`;
        }
        hbar.appendChild(node);
      });

      row.appendChild(hbar);
      stack.appendChild(row);
    });

    card.appendChild(stack);
    card.appendChild(buildSharedLegend(block.methods || []));
    grid.appendChild(card);
  });

  if (chartData.notes?.length || chartData.source) {
    const foot = document.createElement('div');
    foot.className = 'chart-footnotes';

    (chartData.notes || []).forEach(note => {
      const row = document.createElement('div');
      row.className = 'chart-note';
      row.textContent = normalizeText(note);
      foot.appendChild(row);
    });

    if (chartData.source) {
      const source = document.createElement('div');
      source.className = 'chart-source';
      source.textContent = `Source: ${normalizeText(chartData.source)}`;
      foot.appendChild(source);
    }

    chartsContainer.appendChild(foot);
  }
}

function renderTables() {
  if (!tablesContainer || !config.tableData) return;
  tablesContainer.innerHTML = '';

  const tableData = config.tableData;
  tablesContainer.appendChild(createPageHeader(tableData.title || config.title, tableData.subtitle || ''));
  (tableData.tables || []).forEach(createTableSection);
}

function parseTabHash() {
  const hash = String(window.location.hash || '').replace(/^#/, '').trim();
  if (hash === TABLE_HASH || hash === LEGACY_TABLE_HASH) return 'tables';
  return 'charts';
}

function buildTabHash(tab) {
  return tab === 'tables' ? `#${TABLE_HASH}` : `#${CHART_HASH}`;
}

function showTab(tab, push) {
  const activeTab = tab === 'tables' ? 'tables' : 'charts';

  Object.entries(panels).forEach(([key, panel]) => {
    panel.hidden = key !== activeTab;
  });

  tabButtons.forEach(button => {
    button.classList.toggle('active', button.dataset.tab === activeTab);
  });

  if (push) {
    const nextHash = buildTabHash(activeTab);
    if (window.location.hash !== nextHash) {
      history.replaceState(null, '', nextHash);
    }
  }
}

tabButtons.forEach(button => {
  button.addEventListener('click', () => showTab(button.dataset.tab, true));
});

window.addEventListener('hashchange', () => {
  showTab(parseTabHash(), false);
});

async function loadPage() {
  try {
    config = await fetch('./data.json').then(response => response.json());
    if (config.title) document.title = config.title;
    renderCharts();
    renderTables();
    showTab(parseTabHash(), !window.location.hash);
  } catch (error) {
    chartsContainer.innerHTML = '<div class="page-subtitle">Unable to load chart data.</div>';
    tablesContainer.innerHTML = '<div class="page-subtitle">Unable to load data tables.</div>';
    console.error(error);
  }
}

loadPage();
</script>
</body>
</html>
