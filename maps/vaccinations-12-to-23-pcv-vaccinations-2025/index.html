п»ї<!DOCTYPE html>
<html lang="en">
<head>

<title>Philippines Map</title>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<style>
  /* ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ Theme variables ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ */
  :root {
    --bg:               #edf1f7;
    --panel-bg:         #ffffff;
    --panel-border:     rgba(0,0,0,0.09);
    --panel-divider:    rgba(0,0,0,0.07);

    --hover-stroke:     #2a3f60;
    --label-fill:       #1a2840;
    --label-stroke:     rgba(237,241,247,0.92);
    --btn-bg:           rgba(0,0,0,0.06);
    --btn-border:       rgba(0,0,0,0.18);
    --btn-color:        #1a2840;
    --btn-hover-bg:     rgba(0,0,0,0.11);
    --status-color:     #556;
    --status-bg:        rgba(255,255,255,0.88);
    --close-color:      rgba(0,0,0,0.35);
    --close-hover:      #000;
    --eyebrow-color:    rgba(0,0,0,0.38);
    --lgu-name-color:   #1a2840;
    --region-color:     rgba(0,0,0,0.48);
    --scroll-thumb:     rgba(0,0,0,0.1);
    --card-bg:          rgba(0,0,0,0.03);
    --card-border:      rgba(0,0,0,0.08);
    --year-color:       rgba(0,0,0,0.45);
    --year-bg:          rgba(0,0,0,0.05);
    --text-color:       rgba(0,0,0,0.68);
    --expand-color:     rgba(0,0,0,0.35);
    --expand-hover:     #000;
    --no-data-color:    rgba(0,0,0,0.28);
    --section-color:    rgba(0,0,0,0.28);
    --drag-handle:      rgba(0,0,0,0.12);
    --mobile-border:    rgba(0,0,0,0.1);
    --ring-color:       rgba(0,0,0,0.3);
    --strong-color:     rgba(0,0,0,0.65);
    --data-label-color: rgba(0,0,0,0.42);
    --data-value-color: rgba(0,0,0,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden;
    transition: background 0.25s;
    font-family: 'Inter', system-ui, sans-serif;
  }
  svg { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  svg:active { cursor: grabbing; }

  #tab-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: 6px;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--panel-divider);
    overflow-x: auto; white-space: nowrap;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-color); font: 11px 'IBM Plex Mono', monospace;
    padding: 5px 13px; cursor: pointer;
    letter-spacing: 0.4px;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--btn-hover-bg);
    border-color: rgba(0,0,0,0.36);
  }
  .tab-btn:hover { background: var(--btn-hover-bg); }

  .tab-panel {
    display: none;
    position: fixed; top: 46px; left: 0; right: 0; bottom: 0;
  }
  .tab-panel.active { display: block; }
  #tab-map { overflow: hidden; }
  #tab-charts {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-charts::-webkit-scrollbar { width: 4px; }
  
  #charts-container {
    max-width: 1480px;
    margin: 0 auto;
  }
#tab-tables {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-tables::-webkit-scrollbar { width: 4px; }
  #tab-tables::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }
  #tables-container {
    max-width: 1480px;
    margin: 0 auto;
  }
  .chart-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .chart-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 24px; line-height: 1.6;
  }
  .chart-group-header {
    font-size: 15px; font-weight: 600; color: var(--lgu-name-color);
    margin: 36px 0 2px;
  }
  .chart-group-header:first-of-type { margin-top: 0; }
  .chart-group-subtitle {
    font-size: 12px; color: var(--region-color); line-height: 1.6;
    margin-bottom: 16px;
  }
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }
  @media (min-width: 1080px) {
    .chart-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
  @media (max-width: 900px) {
    .chart-grid {
      grid-template-columns: 1fr !important;
      grid-template-rows: unset !important;
      grid-auto-flow: row !important;
    }
  }
  .chart-block {
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px 16px 14px;
  }
  .chart-block-title {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 8px;
  }
  .chart-block-subtitle {
    font-size: 12px; color: var(--region-color); line-height: 1.55;
    margin-bottom: 14px;
  }
  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
    margin-top: 12px;
    font: 11px 'IBM Plex Mono', monospace;
    color: var(--data-label-color);
    align-items: center;
  }
  .legend-swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }
  /* Waffle chart layout */
  .waffle-stack { display: flex; flex-direction: column; }
  .waffle-inner-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 16px;
    align-items: start;
    padding: 8px 0;
    border-top: 1px solid var(--panel-divider);
  }
  .waffle-inner-row:first-child { border-top: none; }
  .waffle-cat-label {
    font-size: 13px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.3; padding-top: 4px;
  }
  .waffle-pct-text {
    font: 10px/1.2 'IBM Plex Mono', monospace; color: var(--data-label-color); margin-top: 5px;
  }
  .waffle-hbar { display: flex; flex-wrap: wrap; gap: 1px; padding: 0; }
  .waffle-cell { width: 7px; height: 7px; flex: none; }
  .waffle-legend {
    border-top: 1px solid var(--panel-divider);
    padding-top: 14px; margin-top: 14px;
  }
  .waffle-legend-title {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 10px;
  }
  .waffle-legend-items-row { display: flex; flex-wrap: wrap; gap: 10px 24px; }
  .waffle-legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--lgu-name-color); }
  .waffle-legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex: none; }
  .chart-footnotes {
    margin-top: 28px; padding-top: 16px;
    border-top: 1px solid var(--panel-divider);
  }
  .chart-note {
    font-size: 11px; color: var(--data-label-color); line-height: 1.7;
    margin-bottom: 4px;
  }
  .chart-source {
    font-size: 11px;
    color: var(--data-label-color);
    margin-top: 10px;
    font-style: italic;
  }
  .dt-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .dt-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 28px; line-height: 1.6;
  }
  .dt-section {
    margin-bottom: 24px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px;
  }
  .dt-section-label {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 8px;
  }
  .dt-section-subtitle {
    font-size: 12px; color: var(--region-color); line-height: 1.6;
    margin-bottom: 14px;
  }
  .dt-table-wrap {
    overflow-x: auto;
  }
  .dt-table-wrap::-webkit-scrollbar { height: 6px; }
  .dt-table-wrap::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 3px; }
  .dt-table {
    width: 100%;
    min-width: 1120px;
    border-collapse: collapse;
    font-size: 12px;
  }
  .dt-table thead th {
    font: 10px/1.3 'IBM Plex Mono', monospace; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--data-label-color);
    padding: 6px 10px 8px; text-align: right; vertical-align: bottom;
    border-bottom: 2px solid var(--panel-border);
    white-space: nowrap;
  }
  .dt-table thead th:first-child {
    text-align: left;
    min-width: 220px;
    white-space: normal;
  }
  .dt-table thead th.col-group {
    text-align: center;
    border-bottom: 1px solid var(--panel-border);
    border-right: 1px solid var(--panel-divider);
    padding-bottom: 4px;
    letter-spacing: 1px;
  }
  .dt-table thead th.col-group:last-child { border-right: none; }
  .dt-table th.year-2022,
  .dt-table td.year-2022 {
    background: rgba(26,40,64,0.035);
  }
  .dt-table th.year-break,
  .dt-table td.year-break {
    border-left: 2px solid rgba(26,40,64,0.12);
  }
  .dt-table thead tr.sub-header th {
    border-bottom: 2px solid var(--panel-border);
    border-right: 1px solid var(--panel-divider);
    text-transform: none;
    line-height: 1.4;
    white-space: normal;
    min-width: 92px;
  }
  .dt-table thead tr.sub-header th:last-child { border-right: none; }
  .dt-table tbody tr { border-bottom: 1px solid var(--panel-divider); }
  .dt-table tbody tr:last-child { border-bottom: none; }
  .dt-table tbody td {
    padding: 7px 10px; color: var(--text-color); text-align: right;
    border-right: 1px solid var(--panel-divider);
    white-space: nowrap;
  }
  .dt-table tbody td:last-child { border-right: none; }
  .dt-table tbody td:first-child {
    text-align: left;
    color: var(--lgu-name-color);
    white-space: normal;
  }
  .dt-table td.na { color: var(--no-data-color); font-style: italic; }
  .dt-footnotes {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--panel-divider);
  }
  .dt-note {
    font-size: 11px; color: var(--data-label-color); line-height: 1.7;
    margin-bottom: 2px;
  }
  .dt-source {
    font-size: 11px; color: var(--data-label-color); margin-top: 10px; font-style: italic;
  }
  .dt-inline-sup {
    font-size: 9px;
    margin-left: 1px;
  }
  .dt-group-header {
    font-size: 15px; font-weight: 600; color: var(--lgu-name-color);
    margin: 36px 0 2px;
    padding: 0;
  }
  .dt-group-header:first-of-type { margin-top: 0; }
  .dt-group-subtitle {
    font-size: 12px; color: var(--region-color); line-height: 1.6;
    margin-bottom: 16px;
  }
  .data-table-wrap {
    margin-top: 4px;
    overflow-x: auto;
    border: 1px solid var(--panel-divider);
  }
  .data-table-wrap::-webkit-scrollbar { height: 6px; }
  .data-table-wrap::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 999px; }
  .data-table {
    width: 100%;
    border-collapse: collapse;
  }
  .data-table th,
  .data-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--panel-divider);
    white-space: nowrap;
  }
  .data-table th {
    font: 10px 'IBM Plex Mono', monospace;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--data-label-color);
    text-align: right;
    background: rgba(0,0,0,0.03);
    vertical-align: bottom;
  }
  .data-table td {
    font-size: 12px;
    color: var(--data-value-color);
    text-align: right;
  }
  .data-table th:first-child,
  .data-table td:first-child {
    position: sticky;
    left: 0;
    text-align: left;
  }
  .data-table th:first-child {
    z-index: 2;
    background: #f4f7fb;
  }
  .data-table td:first-child {
    z-index: 1;
    color: var(--text-color);
    background: #fbfcfe;
  }
  .data-table tbody tr:nth-child(even) td {
    background: rgba(0,0,0,0.015);
  }
  .data-table tbody tr:nth-child(even) td:first-child {
    background: #f6f9fd;
  }
  .data-table tbody tr:last-child td {
    border-bottom: none;
  }
  #tab-insights {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-insights::-webkit-scrollbar { width: 4px; }
  #tab-insights::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }
  #insights-container {
    max-width: 920px;
    margin: 0 auto;
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 24px 24px 20px;
  }
  .insights-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .insights-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 24px; line-height: 1.6;
  }
  .insight-card {
    padding: 0;
    margin-bottom: 22px;
  }
  .insight-heading {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 10px;
  }
  .insight-text {
    font-size: 13px; color: var(--text-color); line-height: 1.75;
  }
  .insight-takeaways {
    display: grid;
    gap: 10px;
  }
  .insight-takeaway {
    font-size: 13px; color: var(--text-color); line-height: 1.7;
    padding-left: 14px;
    position: relative;
  }
  .insight-takeaway::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(0,0,0,0.28);
  }
  .region   { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.8; cursor: pointer; }
  .region:hover   { opacity: 0.8; stroke: var(--hover-stroke); stroke-width: 1.5; }
  .province { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.5; cursor: pointer; }
  .province:hover { opacity: 0.8; stroke: var(--hover-stroke); stroke-width: 1; }
  .huc-city { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.3; cursor: pointer; }
  .huc-city:hover { opacity: 0.8; stroke: var(--hover-stroke); stroke-width: 0.8; }
  .huc-label { cursor: pointer; }
  .municity { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.3; cursor: pointer; }
  .region-bg { fill: var(--poly-fill); pointer-events: none; }
  .municity:hover { opacity: 0.8; stroke: var(--hover-stroke); stroke-width: 0.8; }
  .leaf { cursor: default; }
  .leaf:hover { opacity: 1; stroke: var(--poly-stroke); stroke-width: inherit; }
  .svg-bg    { fill: var(--bg); }

  .map-label {
    fill: var(--label-fill);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    letter-spacing: 0.3px;
  }

  /* ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ Overlay buttons ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ */
  #back-btn, #info-btn {
    position: fixed;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-color); font: 13px 'IBM Plex Mono', monospace;
    padding: 6px 14px; cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    z-index: 10;
    display: none;
  }
  #back-btn { top: 62px; right: 16px; }
  #info-btn { bottom: 16px; right: 16px; font-size: 15px; padding: 6px 12px; }
  #back-btn:hover, #info-btn:hover { background: var(--btn-hover-bg); }

  #status {
    position: fixed; bottom: 8px; left: 12px;
    color: var(--status-color); font: 11px 'IBM Plex Mono', monospace;
    background: var(--status-bg); padding: 3px 8px;
    pointer-events: none; z-index: 10;
    transition: color 0.25s, background 0.25s;
  }

  /* ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ Detail panel ГѓВўГўвЂљВ¬Гўв‚¬Вќ desktop ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ */
  #detail {
    position: fixed; top: 46px; right: -380px; bottom: 0; width: 360px;
    background: var(--panel-bg); border-left: 1px solid var(--panel-border);
    display: flex; flex-direction: column;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1),
                background 0.25s, border-color 0.25s;
    z-index: 20; overflow: hidden;
  }
  #detail.open { right: 0; }
  #detail.peek { right: -285px; }

  /* ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ Detail panel ГѓВўГўвЂљВ¬Гўв‚¬Вќ mobile ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ */
  @media (pointer: coarse) {
    #detail {
      width: 100%; right: 0; top: auto; bottom: 0; height: 55vh;
      border-left: none; border-top: 1px solid var(--mobile-border);
      border-radius: 14px 14px 0 0;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1),
                  background 0.25s;
    }
    #detail.open  { right: 0; transform: translateY(0); }
    #detail.peek  { right: 0; transform: translateY(calc(100% - 56px)); }
    #detail-header { padding-top: 22px; }
  }

  #detail::before {
    content: ''; display: none;
    width: 36px; height: 4px;
    background: var(--drag-handle);
    border-radius: 2px;
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  }
  @media (pointer: coarse) { #detail::before { display: block; } }

  @keyframes info-ring {
    0%   { box-shadow: 0 0 0 0 var(--ring-color); }
    100% { box-shadow: 0 0 0 12px transparent; }
  }
  #info-btn.ring { animation: info-ring 0.7s ease-out 3; }

  #detail-close {
    background: none; border: none;
    color: var(--close-color); font-size: 18px; cursor: pointer;
    transition: color 0.15s; line-height: 1;
  }
  #detail-close:hover { color: var(--close-hover); }
  #detail-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--panel-divider); flex-shrink: 0;
  }
  #detail-header-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .detail-eyebrow {
    font: 10px/1 'IBM Plex Mono', monospace; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--eyebrow-color); margin-bottom: 6px;
  }
  .detail-lgu-name { font-size: 22px; font-weight: 600; color: var(--lgu-name-color); line-height: 1.2; margin-bottom: 4px; }
  .detail-region   { font-size: 12px; color: var(--region-color); }
  #detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  #detail-body::-webkit-scrollbar { width: 3px; }
  #detail-body::-webkit-scrollbar-thumb { background: var(--scroll-thumb); }

  /* ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ Data field rows ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ */
  .data-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 1px solid var(--panel-divider);
    gap: 12px;
  }

<script>

const backBtn  = document.getElementById('back-btn');

let activeTab = 'map';

let tablesReady = false;

let insightsReady = false;

(function initTabbedLayout() {

  document.body.insertBefore(tabBar, document.body.firstChild);

function switchTab(tab, replace = false, syncHash = true) {
  activeTab = tab === 'charts' ? 'charts' : tab === 'tables' ? 'tables' : tab === 'insights' ? 'insights' : 'map';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === activeTab));
  document.getElementById('tab-map').classList.toggle('active', activeTab === 'map');
  document.getElementById('tab-charts').classList.toggle('active', activeTab === 'charts');
  document.getElementById('tab-tables').classList.toggle('active', activeTab === 'tables');
  document.getElementById('tab-insights').classList.toggle('active', activeTab === 'insights');
  if (activeTab === 'charts' && (config.chartData || config.tableData) && !chartsReady) {
    renderCharts(config.chartData || config.tableData);
    chartsReady = true;
  }
  if (activeTab === 'tables' && config.tableData && !tablesReady) {
    renderTables(config.tableData);
    tablesReady = true;
  }
  if (activeTab === 'insights' && config.insights && !insightsReady) {
    renderInsights(config.insights);
    insightsReady = true;
  }
  if (syncHash) {
    const current = parseStateHash(parseHash());
    pushURL(buildStateHash(current.viewHash), replace);
  }
}

// ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ Config & data ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬ГѓВўГўв‚¬ВќГўвЂљВ¬
let config = {};
let dataByLevel = { region: {}, province: {}, municity: {} };
let colorScale  = null;
let GEO_BASE    = './philippines-json-maps';

// PSGC ГѓВўГўв‚¬В Гўв‚¬в„ў display name, populated from psgc-index.json at boot + GeoJSON lazily
const nameRegistry = {};
// child PSGC (string) ГѓВўГўв‚¬В Гўв‚¬в„ў parent PSGC (string): provinceГѓВўГўв‚¬В Гўв‚¬в„ўregion, municityГѓВўГўв‚¬В Гўв‚¬в„ўprovince
const parentMap = {};
// province PSGCs (strings) that have at least one municity data record ГѓВўГўвЂљВ¬Гўв‚¬Вќ gates drill-down
let provincesWithMunicity = new Set();

function toAsciiText(value) {
  return String(value ?? '')
    .normalize('NFKD')
    .replace(/[^\x20-\x7E]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function cleanMetricLabel(label) {
  return toAsciiText(label).replace(/([A-Za-z\)])(\d+)$/, '$1').trim();
}

function metricKeyFromLabel(label, fallbackIndex) {
  let key = cleanMetricLabel(label).toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
  if (!key) key = `metric_${fallbackIndex + 1}`;
  if (/^\d/.test(key)) key = `m_${key}`;
  return key;
}

function regionPsgcFromLabel(rawLabel) {
  const label = toAsciiText(rawLabel).toLowerCase();
  if (!label) return null;
  if (label.includes('national capital region')) return 1300000000;
  if (label.includes('cordillera administrative region')) return 1400000000;
  if (label.includes('mimaropa')) return 1700000000;
  if (label.includes('negros island region')) return 1800000000;
  if (label.includes('bangsamoro autonomous region in muslim mindanao')) return 1900000000;

  const roman = {
    i: 100000000,
    ii: 200000000,
    iii: 300000000,
    iva: 400000000,
    v: 500000000,
    vi: 600000000,
    vii: 700000000,
    viii: 800000000,
    ix: 900000000,
    x: 1000000000,
    xi: 1100000000,
    xii: 1200000000,
    xiii: 1600000000,
  };
  const match = label.match(/^([ivx]+a?)\s*-/);
  if (match && roman[match[1]]) return roman[match[1]];
  return null;
}

function parseMetricValue(rawValue) {
  const text = String(rawValue ?? '').trim();
  if (!text || text === 'NA') return { value: null, display: 'NA' };
  if (text === '*') return { value: null, display: '*' };

  const parenMatch = text.match(/^\((-?\d+(?:\.\d+)?)\)$/);
  if (parenMatch) return { value: Number(parenMatch[1]), display: text };

  const num = Number(text);
  if (Number.isFinite(num)) {
    return text.includes('.0') ? { value: num, display: text } : { value: num };
  }
  return { value: null, display: text };
}

function ensureRegionMapConfigFromTableData(cfg) {
  if ((cfg?.data?.region || []).length && (cfg?.metricOptions || []).length) return;
  const tables = cfg?.tableData?.tables || [];
  const regionTable = tables.find(t => toAsciiText(t?.title).toLowerCase() === 'region');
  if (!regionTable) return;

  const groups = regionTable.colGroups || [];
  if (groups.length < 2) return;
  const cols2025 = groups[0]?.cols || [];
  const cols2022 = groups[1]?.cols || [];
  if (!cols2025.length || cols2025.length !== cols2022.length) return;

  const metrics = cols2025.map((col, idx) => {
    const label = cleanMetricLabel(col?.label || '');
    return { key: metricKeyFromLabel(label, idx), label };
  });

  const regionIxNote = (cfg?.tableData?.footnotes || []).find(n =>
    String(n || '').includes('Region IX includes the province of Sulu in 2025')
  );

  const records = (regionTable.rows || []).map(row => {
    const psgc = regionPsgcFromLabel(row?.label || '');
    if (!psgc) return null;
    const rec = { psgc };
    const values = row?.values || [];

    metrics.forEach((metric, idx) => {
      const v25 = parseMetricValue(values[idx]);
      const v22 = parseMetricValue(values[idx + metrics.length]);

      rec[metric.key] = v25.value;
      if (v25.display != null) rec[`${metric.key}_display`] = v25.display;

      rec[`${metric.key}_2022`] = v22.value;
      if (v22.display != null) rec[`${metric.key}_2022_display`] = v22.display;
    });

    if (psgc === 900000000 && regionIxNote) rec.psa_note = regionIxNote;
    return rec;
  }).filter(Boolean);

  if (!records.length) return;

  cfg.maxDepth = 'region';
  cfg.colorScheme = cfg.colorScheme || 'interpolateYlGnBu';
  cfg.colorField = metrics[0].key;
  cfg.colorDomain = [0, 100];
  cfg.colorDomains = Object.fromEntries(metrics.map(m => [m.key, [0, 100]]));
  cfg.metricOptions = metrics.map(m => ({ key: m.key, label: m.label }));
  cfg.detailFields = [
    ...metrics.map(m => ({ key: m.key, label: `${m.label} (2025)` })),
    { key: 'psa_note', label: 'Note' },
  ];
  cfg.data = { region: records, province: [], municity: [] };
}

function registerNames(features, psgcKey, nameKey) {
  for (const f of (features || [])) {
    const p = f.properties;
    if (p[psgcKey] != null && p[nameKey]) nameRegistry[String(p[psgcKey])] = p[nameKey];
  }
}

async function loadConfig() {
  try {
    config = await d3.json('./data.json');
  } catch(e) {
    config = {};
  }

  ensureRegionMapConfigFromTableData(config);

  GEO_BASE = config.geoBasePath || './philippines-json-maps';

  // Build PSGC-keyed lookup maps for each geographic level
  if (config.data) {
    for (const level of ['region', 'province', 'municity']) {
      dataByLevel[level] = {};
      for (const record of (config.data[level] || [])) {
        if (record.psgc != null) dataByLevel[level][String(record.psgc)] = record;
      }
    }
  }

  // Build D3 color scale if config specifies one
  if (config.colorField && config.colorDomain && config.colorScheme && d3[config.colorScheme]) {
    colorScale = d3.scaleSequential(d3[config.colorScheme]).domain(config.colorDomain);
  }

  // Pre-populate name registry and parent map from psgc-index.json (optional; graceful fallback if absent)
  try {
    const idx = await d3.json('./psgc-index.json');
    for (const r of [...(idx.regions?.nir || []), ...(idx.regions?.standard || [])]) {
      if (r.psgc && r.name) nameRegistry[String(r.psgc)] = r.name;
    }
    for (const p of (idx.provinces || [])) {
      if (p.psgc && p.name) nameRegistry[String(p.psgc)] = p.name;
      if (p.psgc && p.region_psgc) parentMap[String(p.psgc)] = String(p.region_psgc);
    }
    for (const m of (idx.municities || [])) {
      if (m.psgc && m.name) nameRegistry[String(m.psgc)] = m.name;
      // If this municity is stored in data.province (HUC city), its ranked-list parent is the region.
      // Otherwise it's a regular municity whose parent is its province.
      if (m.psgc) {
        if (dataByLevel.province[String(m.psgc)]) {
          parentMap[String(m.psgc)] = String(m.region_psgc);
        } else if (m.region_psgc === 1300000000) {
          parentMap[String(m.psgc)] = String(m.region_psgc);
        } else {
          parentMap[String(m.psgc)] = String(m.province_psgc);
        }
      }
    }
    // Compute which provinces have at least one municity data record (gates drill-down)
    provincesWithMunicity = new Set(
      Object.values(dataByLevel.municity)
        .map(r => parentMap[String(r.psgc)])
        .filter(Boolean)
    );
  } catch(e) { /* psgc-index.json absent ГѓВўГўвЂљВ¬Гўв‚¬Вќ names populated lazily from GeoJSON */ }
}

function renderMetricControls() {
  const options = config.metricOptions || [];
  if (!options.length) {
    metricToggle.innerHTML = '';
    return;
  }

  const radios = options.map(option => {
    const checked = option.key === config.colorField ? ' checked' : '';
    return `<label><input type="radio" name="metric" value="${option.key}"${checked}><span>${option.label}</span></label>`;
  }).join('');

  const selectOptions = options.map(option => {
    const selected = option.key === config.colorField ? ' selected' : '';
    return `<option value="${option.key}"${selected}>${option.label}</option>`;
  }).join('');

  metricToggle.innerHTML =
    radios +
    `<div id="metric-select-wrap"><select id="metric-select" aria-label="Select map metric">${selectOptions}</select></div>`;

  metricToggle.querySelectorAll('input[name="metric"]').forEach(radio => {
    radio.addEventListener('change', function () {
      if (this.checked) applyMetric(this.value, true);
    });
  });

  const metricSelect = document.getElementById('metric-select');
  if (metricSelect) {
    metricSelect.addEventListener('change', function () {
      applyMetric(this.value, true);
    });
  }
}

function applyMetric(field, syncControls = false, updateURL = true) {
  const domain = (config.colorDomains || {})[field] || config.colorDomain;
  config.colorField = field;
  config.colorDomain = domain;

  if (config.colorScheme && d3[config.colorScheme]) {
    colorScale = d3.scaleSequential(d3[config.colorScheme]).domain(domain);
  }

  if (syncControls) {
    const radio = metricToggle.querySelector(`input[name="metric"][value="${field}"]`);
    if (radio) radio.checked = true;

    const metricSelect = document.getElementById('metric-select');
    if (metricSelect) metricSelect.value = field;
  }

  d3.selectAll('path.region').style('fill', d => getFill('region', d.properties.adm1_psgc));

  if (detail.classList.contains('open')) {
    if (currentContext) {
      populateDetail(currentContext.name, currentContext.parentName, currentContext.psgc, currentContext.type);
    } else {
      openWelcome();
    }
  }
  if (updateURL) {
    const current = parseStateHash(parseHash());
    pushURL(buildStateHash(current.viewHash), true);
  }
}

// Returns a fill color for a given level + PSGC, or null to fall back to CSS
function getFill(level, psgc) {
  if (!colorScale || !config.colorField) return null;
  const record = dataByLevel[level][String(psgc)];
  if (record && record[config.colorField] != null) return colorScale(record[config.colorField]);
  return null;
}

const CHART_PALETTE = [
  '#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f',
  '#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac'
];

function renderCharts(chartInput) {
  const tableData = (chartInput && chartInput.tables) ? chartInput : (config.tableData || chartInput || {});
  if (!chartsContainer) return;
  chartsContainer.innerHTML = '';

  function normalizeText(value) {
    return String(value || '').replace(/ГѓЖ’Гўв‚¬ЕЎ([ГѓвЂљГ‚В№ГѓвЂљГ‚ВІГѓвЂљГ‚ВіГѓВўГ‚ВЃГ‚ВґГѓВўГ‚ВЃГ‚ВµГѓВўГ‚ВЃГ‚В¶ГѓВўГ‚ВЃГ‚В·ГѓВўГ‚ВЃГ‚ВёГѓВўГ‚ВЃГ‚В№ГѓВўГ‚ВЃГ‚В°])/g, '$1').trim();
  }

  function parseChartValue(rawValue) {
    const text = String(rawValue ?? '').trim();
    if (!text || text === 'NA') return { value: null, display: 'NA' };
    if (text === '*') return { value: null, display: '*' };
    const parenMatch = text.match(/^\((-?\d+(?:\.\d+)?)\)$/);
    if (parenMatch) return { value: Number(parenMatch[1]), display: text };
    const num = Number(text);
    if (Number.isFinite(num)) {
      return text.includes('.0') ? { value: num, display: text } : { value: num };
    }
    return { value: null, display: text };
  }

  function formatChartValue(row, key) {
    const displayKey = `${key}_display`;
    if (row[displayKey] != null) return String(row[displayKey]);
    if (row[key] == null) return 'NA';
    return String(row[key]);
  }

  function getSeriesPalette(series, year) {
    const useLighter = String(year) === '2022';
    return series.map(item => {
      const base = d3.color(item.color);
      const displayColor = useLighter && base ? base.brighter(0.85).formatHex() : item.color;
      return { ...item, displayColor };
    });
  }

  function buildSectionsFromTables() {
    const sections = [];
    const sourceTables = (tableData.tables || []).filter(section =>
      normalizeText(section.title || '').toLowerCase() !== 'region'
    );

    sourceTables.forEach((section, sectionIndex) => {
      const groups = section.colGroups || [];
      if (groups.length < 2) return;
      const cols2025 = groups[0]?.cols || [];
      const cols2022 = groups[1]?.cols || [];
      if (!cols2025.length || cols2025.length !== cols2022.length) return;

      const includeIndices = cols2025
        .map((col, i) => ({ i, label: normalizeText(col?.label || '') }))
        .filter(entry => !/^total number of children aged\b/i.test(entry.label))
        .map(entry => entry.i);
      if (!includeIndices.length) return;

      const series = includeIndices.map((colIdx, i) => ({
        key: `m${i}`,
        label: normalizeText(cols2025[colIdx]?.label || ''),
        color: CHART_PALETTE[i % CHART_PALETTE.length],
        colIdx
      }));

      const makeRows = (yearIndex) => (section.rows || []).map(row => {
        const out = { label: normalizeText(row.label || '') };
        const yearOffset = yearIndex * cols2025.length;
        series.forEach(s => {
          const parsed = parseChartValue((row.values || [])[yearOffset + s.colIdx]);
          out[s.key] = parsed.value;
          if (parsed.display != null) out[`${s.key}_display`] = parsed.display;
        });
        return out;
      });

      sections.push({
        order: sectionIndex,
        title: normalizeText(section.title || ''),
        subtitle: normalizeText(section.subtitle || ''),
        series,
        blocks: [
          { title: normalizeText(section.title || ''), year: '2025', rows: makeRows(0) },
          { title: normalizeText(section.title || ''), year: '2022', rows: makeRows(1) }
        ]
      });
    });

    return sections;
  }

  function deriveXMax(sections) {
    let maxValue = 0;
    sections.forEach(section => {
      section.blocks.forEach(block => {
        (block.rows || []).forEach(row => {
          section.series.forEach(s => {
            const v = row[s.key];
            if (typeof v === 'number' && Number.isFinite(v)) maxValue = Math.max(maxValue, v);
          });
        });
      });
    });
    if (maxValue <= 0) return 100;
    return Math.min(100, Math.ceil(maxValue / 10) * 10);
  }

  function drawGroupedLollipops(container, chartCfg, block, series) {
    const rows = block.rows || [];
    const maxLabelLen = d3.max(rows, r => String(r.label || '').length) || 0;
    const isSmallScreen = window.matchMedia('(max-width: 760px)').matches;
    const VW = isSmallScreen ? 380 : 620;
    const ML = isSmallScreen
      ? Math.max(118, Math.min(190, 36 + maxLabelLen * 6.3))
      : Math.max(140, Math.min(228, 48 + maxLabelLen * 7));
    const MR = 16;
    const mobileChartScale = isSmallScreen ? 2.4 : 1;
    const MT = 10 * mobileChartScale;
    const MB = 40 * mobileChartScale;
    const INNER_W = VW - ML - MR;
    const yMax = chartCfg.xMax || 100;
    const tickStep = yMax > 20 ? 10 : 5;
    const laneGap = 10 * mobileChartScale;
    const groupGap = 24 * mobileChartScale;
    const markerScale = mobileChartScale > 1 ? 1.7 : 1;
    const axisFontSize = mobileChartScale > 1 ? 13 : 11;
    const rowLabelFontSize = mobileChartScale > 1 ? 13 : 12;
    const valueFontSize = mobileChartScale > 1 ? 13 : 9.5;
    const axisLabelFontSize = mobileChartScale > 1 ? 13 : 12;
    const valuePad = mobileChartScale > 1 ? 10 : 4;
    const axisGap = mobileChartScale > 1 ? 22 : 12;
    const groupH = Math.max(series.length - 1, 0) * laneGap + 1;
    const INNER_H = rows.length
      ? rows.length * groupH + Math.max(rows.length - 1, 0) * groupGap
      : 40;
    const axisY = INNER_H + axisGap;
    const axisLabelOffset = mobileChartScale > 1 ? 44 : 36;
    const VH = MT + INNER_H + MB;

    const wrap = document.createElement('div');
    wrap.style.width = '100%';
    container.appendChild(wrap);

    const svgNode = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgNode.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
    svgNode.setAttribute('preserveAspectRatio', 'xMinYMid meet');
    svgNode.style.display = 'block';
    svgNode.style.width = '100%';
    svgNode.style.height = 'auto';
    svgNode.style.overflow = 'visible';
    wrap.appendChild(svgNode);

    const chartSvg = d3.select(svgNode);
    const chart = chartSvg.append('g').attr('transform', `translate(${ML},${MT})`);
    const x = d3.scaleLinear().domain([0, yMax]).range([0, INNER_W - 8]);

    chart.append('line')
      .attr('x1', 0).attr('y1', axisY)
      .attr('x2', INNER_W).attr('y2', axisY)
      .attr('stroke', 'var(--panel-divider)');

    d3.range(0, yMax + 0.01, tickStep).forEach(tick => {
      const xx = x(tick);
      chart.append('line')
        .attr('x1', xx).attr('y1', 0)
        .attr('x2', xx).attr('y2', INNER_H)
        .attr('stroke', 'var(--panel-divider)')
        .attr('stroke-dasharray', tick === 0 ? null : '2,3');
      chart.append('line')
        .attr('x1', xx).attr('y1', axisY)
        .attr('x2', xx).attr('y2', axisY + 6)
        .attr('stroke', 'var(--panel-divider)');
      chart.append('text')
        .attr('x', xx).attr('y', axisY + 18)
        .attr('text-anchor', 'middle')
        .attr('font-size', axisFontSize)
        .attr('font-family', 'IBM Plex Mono, monospace')
        .attr('fill', 'var(--data-label-color)')
        .text(tick);
    });

    rows.forEach((row, rowIndex) => {
      const top = rowIndex * (groupH + groupGap);
      const midY = top + groupH / 2;
      chartSvg.append('text')
        .attr('x', ML - 12)
        .attr('y', MT + midY)
        .attr('text-anchor', 'end')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', rowLabelFontSize)
        .attr('font-family', 'Inter, sans-serif')
        .attr('fill', 'var(--text-color)')
        .text(row.label);

      series.forEach((s, si) => {
        const laneY = top + si * laneGap;
        const value = row[s.key];
        if (value == null) {
          const display = formatChartValue(row, s.key);
          if (display === '*') {
            chart.append('text')
              .attr('x', valuePad).attr('y', laneY)
              .attr('text-anchor', 'start')
              .attr('dominant-baseline', 'middle')
              .attr('font-size', valueFontSize)
              .attr('font-family', 'IBM Plex Mono, monospace')
              .attr('fill', 'var(--data-label-color)')
              .text('*');
          }
          return;
        }
        const endX = x(value);

        chart.append('line')
          .attr('x1', 0).attr('y1', laneY)
          .attr('x2', endX).attr('y2', laneY)
          .attr('stroke', s.displayColor)
          .attr('stroke-width', 2.4 * markerScale);
        chart.append('circle')
          .attr('cx', endX).attr('cy', laneY)
          .attr('r', 3.8 * markerScale)
          .attr('fill', s.displayColor);
        chart.append('text')
          .attr('x', endX + valuePad).attr('y', laneY)
          .attr('text-anchor', 'start')
          .attr('dominant-baseline', 'middle')
          .attr('font-size', valueFontSize)
          .attr('font-family', 'IBM Plex Mono, monospace')
          .attr('fill', 'var(--data-label-color)')
          .text(formatChartValue(row, s.key));
      });
    });

    chartSvg.append('text')
      .attr('x', ML + INNER_W / 2)
      .attr('y', MT + axisY + axisLabelOffset)
      .attr('text-anchor', 'middle')
      .attr('font-size', axisLabelFontSize)
      .attr('font-family', 'Inter, sans-serif')
      .attr('fill', 'var(--data-label-color)')
      .text((chartCfg.xLabel && String(chartCfg.xLabel).trim() !== '-') ? chartCfg.xLabel : 'Percentage');
  }

  const sections = buildSectionsFromTables();
  if (!sections.length) {
    const empty = document.createElement('div');
    empty.className = 'chart-page-subtitle';
    empty.textContent = 'Charts are not yet available for this page.';
    chartsContainer.appendChild(empty);
    return;
  }

  const chartCfg = {
    title: normalizeText(tableData.title || config.title),
    subtitle: normalizeText(tableData.subtitle || ''),
    xLabel: normalizeText(tableData.xLabel || 'Percentage'),
    xMax: tableData.xMax || deriveXMax(sections),
    notes: tableData.notes || [],
    source: tableData.source || ''
  };

  const header = document.createElement('div');
  header.innerHTML = `
    <div class="chart-page-title">${chartCfg.title}</div>
    <div class="chart-page-subtitle">${chartCfg.subtitle}</div>
  `;
  chartsContainer.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'chart-grid';
  chartsContainer.appendChild(grid);

  sections.forEach(section => {
    section.blocks.forEach(block => {
      const card = document.createElement('section');
      card.className = 'chart-block';

      const title = document.createElement('div');
      title.className = 'chart-block-title';
      title.textContent = `${normalizeText(block.title)} - ${block.year}`;
      card.appendChild(title);

      if (section.subtitle) {
        const subtitle = document.createElement('div');
        subtitle.className = 'chart-block-subtitle';
        subtitle.textContent = section.subtitle;
        card.appendChild(subtitle);
      }

      const palette = getSeriesPalette(section.series, block.year);
      drawGroupedLollipops(card, chartCfg, block, palette);

      const legend = document.createElement('div');
      legend.className = 'chart-legend';
      legend.innerHTML = palette.map(s =>
        `<span><span class="legend-swatch" style="background:${s.displayColor}"></span>${normalizeText(s.label)}</span>`
      ).join('');
      card.appendChild(legend);

      grid.appendChild(card);
    });
  });

  const combinedNotes = [...(tableData.notes || []), ...(tableData.footnotes || [])]
    .filter(note => !String(note || '').includes('Region IX includes the province of Sulu in 2025'));
  if (combinedNotes.length || chartCfg.source) {
    const foot = document.createElement('div');
    foot.className = 'chart-footnotes';
    combinedNotes.forEach(note => {
      const row = document.createElement('div');
      row.className = 'chart-note';
      row.textContent = normalizeText(note);
      foot.appendChild(row);
    });
    if (chartCfg.source) {
      const source = document.createElement('div');
      source.className = 'chart-source';
      source.textContent = `Source: ${normalizeText(chartCfg.source)}`;
      foot.appendChild(source);
    }
    chartsContainer.appendChild(foot);
  }
}

function renderTables(tableData) {
  if (!tablesContainer || !tableData) return;
  tablesContainer.innerHTML = '';

  function normalizeText(value) {
    return String(value || '').replace(/ГѓЖ’Гўв‚¬ЕЎ([ГѓвЂљГ‚В№ГѓвЂљГ‚ВІГѓвЂљГ‚ВіГѓВўГ‚ВЃГ‚ВґГѓВўГ‚ВЃГ‚ВµГѓВўГ‚ВЃГ‚В¶ГѓВўГ‚ВЃГ‚В·ГѓВўГ‚ВЃГ‚ВёГѓВўГ‚ВЃГ‚В№ГѓВўГ‚ВЃГ‚В°])/g, '$1').trim();
  }

  function splitNoteRef(label) {
    const normalized = normalizeText(label);
    const match = normalized.match(/^(.*?)([ГѓвЂљГ‚В№ГѓвЂљГ‚ВІГѓвЂљГ‚ВіГѓВўГ‚ВЃГ‚ВґГѓВўГ‚ВЃГ‚ВµГѓВўГ‚ВЃГ‚В¶ГѓВўГ‚ВЃГ‚В·ГѓВўГ‚ВЃГ‚ВёГѓВўГ‚ВЃГ‚В№ГѓВўГ‚ВЃГ‚В°]+)$/);
    return match
      ? { text: match[1].trim(), noteRef: match[2] }
      : { text: normalized, noteRef: '' };
  }

  function appendTextWithNote(container, label, noteRef) {
    const parsed = splitNoteRef(label);
    container.appendChild(document.createTextNode(parsed.text || ''));
    if (parsed.noteRef || noteRef) {
      const sup = document.createElement('sup');
      sup.className = 'dt-inline-sup';
      sup.textContent = normalizeText(parsed.noteRef || noteRef);
      container.appendChild(sup);
    }
  }

  function buildValueCell(value) {
    const cell = document.createElement('td');
    const display = value == null ? 'NA' : String(value);
    cell.textContent = display;
    if (display === 'NA' || display === '*') cell.className = 'na';
    return cell;
  }

  function applyYearClasses(node, group, groupIndex, colIndex) {
    if (group && String(group.label || '').trim() === '2022') node.classList.add('year-2022');
    if (groupIndex > 0 && colIndex === 0) node.classList.add('year-break');
  }

  function recordValue(record, field) {
    const displayKey = `${field}_display`;
    if (record?.[displayKey] != null) return String(record[displayKey]);
    if (record?.[field] == null) return 'NA';
    return String(record[field]);
  }

  function createTableSection(sectionConfig) {
    const section = document.createElement('section');
    section.className = 'dt-section';
    if (sectionConfig.id) section.dataset.tableId = sectionConfig.id;

    const label = document.createElement('div');
    label.className = 'dt-section-label';
    appendTextWithNote(label, sectionConfig.title || '', sectionConfig.titleNoteRef);
    section.appendChild(label);

    if (sectionConfig.subtitle) {
      const subtitle = document.createElement('div');
      subtitle.className = 'dt-section-subtitle';
      subtitle.textContent = normalizeText(sectionConfig.subtitle);
      section.appendChild(subtitle);
    }

    const wrap = document.createElement('div');
    wrap.className = 'dt-table-wrap';
    section.appendChild(wrap);

    const table = document.createElement('table');
    table.className = 'dt-table';
    wrap.appendChild(table);

    const columnMeta = (sectionConfig.colGroups || []).flatMap((group, groupIndex) =>
      (group.cols || []).map((col, colIndex) => ({ group, groupIndex, colIndex }))
    );

    const thead = table.createTHead();
    const groupRow = thead.insertRow();
    groupRow.appendChild(document.createElement('th'));

    (sectionConfig.colGroups || []).forEach((group, groupIndex) => {
      const th = document.createElement('th');
      th.className = 'col-group';
      th.colSpan = (group.cols || []).length;
      applyYearClasses(th, group, groupIndex, 0);
      th.textContent = normalizeText(group.label || '');
      groupRow.appendChild(th);
    });

    const subRow = thead.insertRow();
    subRow.className = 'sub-header';
    subRow.appendChild(document.createElement('th'));

    (sectionConfig.colGroups || []).forEach((group, groupIndex) => {
      (group.cols || []).forEach((col, colIndex) => {
        const th = document.createElement('th');
        applyYearClasses(th, group, groupIndex, colIndex);
        appendTextWithNote(th, col.label || '', col.noteRef);
        subRow.appendChild(th);
      });
    });

    const tbody = table.createTBody();
    (sectionConfig.rows || []).forEach(row => {
      const tr = tbody.insertRow();
      const labelCell = document.createElement('td');
      appendTextWithNote(labelCell, row.label || '', row.noteRef);
      tr.appendChild(labelCell);

      (row.values || []).forEach((value, valueIndex) => {
        const meta = columnMeta[valueIndex] || {};
        const cell = buildValueCell(value);
        applyYearClasses(cell, meta.group, meta.groupIndex || 0, meta.colIndex || 0);
        tr.appendChild(cell);
      });
    });

    tablesContainer.appendChild(section);
  }

  function buildGroupedSections(blocks) {
    const sections = [];
    const grouped = new Map();

    (blocks || tableData.blocks || []).forEach(block => {
      const key = String(block.title || '');
      if (!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push(block);
    });

    grouped.forEach((blocks, title) => {
      const blockOrder = ['2025', '2022']
        .map(year => blocks.find(block => String(block.year) === year))
        .filter(Boolean);
      const rowOrder = [];
      const rowKeys = new Set();
      const rowsByYear = Object.fromEntries(blockOrder.map(block => [String(block.year), new Map()]));

      blockOrder.forEach(block => {
        (block.rows || []).forEach(row => {
          const key = String(row.label || '');
          if (!rowKeys.has(key)) {
            rowKeys.add(key);
            rowOrder.push(key);
          }
          rowsByYear[String(block.year)].set(key, row);
        });
      });

      sections.push({
        title,
        subtitle: blockOrder[0]?.subtitle || tableData.blockSubtitle || '',
        colGroups: blockOrder.map(block => ({
          label: String(block.year || ''),
          cols: (tableData.series || []).map(series => ({ label: series.label, field: series.key })),
        })),
        rows: rowOrder.map(label => ({
          label,
          values: blockOrder.flatMap(block => {
            const row = rowsByYear[String(block.year)].get(label);
            return (tableData.series || []).map(series => recordValue(row, series.key));
          }),
        })),
      });
    });

    return sections;
  }

  function buildRegionSection() {
    const regionRecords = config.data?.region || [];
    if (!regionRecords.length) return null;

    return {
      id: 'region',
      title: 'Region',
      subtitle: tableData.regionSubtitle || 'Currently married women aged 15 to 49 years.',
      colGroups: [
        {
          label: '2025',
          cols: [
            ...(tableData.series || []).map(series => ({ label: series.label, field: series.key })),
            { label: 'Total women', field: 'women_total' },
          ],
        },
        {
          label: '2022',
          cols: [
            ...(tableData.series || []).map(series => ({ label: series.label, field: `${series.key}_2022` })),
            { label: 'Total women', field: 'women_total_2022' },
          ],
        },
      ],
      rows: regionRecords.map(record => ({
        label: nameRegistry[String(record.psgc)] || ('PSGC ' + record.psgc),
        noteRef: record.noteRef || '',
        values: [
          ...(tableData.series || []).map(series => recordValue(record, series.key)),
          recordValue(record, 'women_total'),
          ...(tableData.series || []).map(series => recordValue(record, `${series.key}_2022`)),
          recordValue(record, 'women_total_2022'),
        ],
      })),
    };
  }

  function extractSourceText() {
    const match = String(config.description || '').match(/\bSource:\s*(.+)$/i);
    return normalizeText(match ? match[1] : '');
  }

  const header = document.createElement('div');
  header.innerHTML = `
    <div class="dt-page-title">${normalizeText(tableData.title || config.title)}</div>
    <div class="dt-page-subtitle">${normalizeText(tableData.subtitle || '')}</div>
  `;
  tablesContainer.appendChild(header);

  if (Array.isArray(tableData.tables) && tableData.tables.length) {
    tableData.tables.forEach(createTableSection);

    if ((tableData.footnotes && tableData.footnotes.length) || tableData.source) {
      const foot = document.createElement('div');
      foot.className = 'dt-footnotes';
      (tableData.footnotes || []).forEach(note => {
        const row = document.createElement('div');
        row.className = 'dt-note';
        row.textContent = normalizeText(note);
        foot.appendChild(row);
      });
      if (tableData.source) {
        const source = document.createElement('div');
        source.className = 'dt-source';
        source.textContent = `Source: ${normalizeText(tableData.source)}`;
        foot.appendChild(source);
      }
      tablesContainer.appendChild(foot);
    }
    return;
  }

  if (tableData.groups && tableData.groups.length) {
    tableData.groups.forEach((group, groupIdx) => {
      const h = document.createElement('div');
      h.className = 'dt-group-header';
      h.textContent = normalizeText(group.groupTitle || '');
      tablesContainer.appendChild(h);
      buildGroupedSections(group.blocks).forEach(createTableSection);
      if (groupIdx === 0) {
        const regionSection = buildRegionSection();
        if (regionSection) createTableSection(regionSection);
      }
    });
  } else {
    const sections = buildGroupedSections(tableData.blocks);
    const regionSection = buildRegionSection();
    if (regionSection) sections.push(regionSection);
    sections.forEach(createTableSection);
  }

  const notes = [];
  const seen = new Set();
  const pushNote = (note) => {
    const text = normalizeText(note);
    if (!text || seen.has(text)) return;
    seen.add(text);
    notes.push(text);
  };

  (tableData.notes || []).forEach(pushNote);
  (config.data?.region || []).forEach(record => {
    if (record.psa_note) {
      pushNote(record.noteRef ? `${record.noteRef} ${record.psa_note}` : record.psa_note);
    }
  });

  const sourceText = extractSourceText();
  if (notes.length || sourceText) {
    const foot = document.createElement('div');
    foot.className = 'dt-footnotes';
    notes.forEach(note => {
      const row = document.createElement('div');
      row.className = 'dt-note';
      row.textContent = note;
      foot.appendChild(row);
    });
    if (sourceText) {
      const source = document.createElement('div');
      source.className = 'dt-source';
      source.textContent = `Source: ${sourceText}`;
      foot.appendChild(source);
    }
    tablesContainer.appendChild(foot);
  }
}

function renderInsights(insights) {
  if (!insightsContainer) return;
  insightsContainer.innerHTML = '';

  const header = document.createElement('div');
  header.innerHTML = `
    <div class="insights-page-title">${insights.title || config.title}</div>

function formatChartValue(row, key) {
  const displayKey = `${key}_display`;
  if (row[displayKey] != null) return String(row[displayKey]);
  if (row[key] == null) return 'NA';
  return String(row[key]);
}

function buildWaffleCells(row, indivSeries, totalCells, totalPct) {
  const cells = [];
  let cumulative = 0;
  indivSeries.forEach(s => {
    const pct = row[s.key] || 0;
    if (!pct) return;
    cumulative += pct;
    const target = totalPct > 0 ? Math.round(cumulative / totalPct * totalCells) : 0;
    while (cells.length < target) cells.push({ color: s.color, label: s.label, pct });
  });
  while (cells.length < totalCells) cells.push({ color: 'rgba(0,0,0,0.06)', label: '', pct: 0 });
  return cells.slice(0, totalCells);
}

function buildWaffleStack(block, indivSeries, totalKey, overallWomen) {
  const stack = document.createElement('div');
  stack.className = 'waffle-stack';

  (block.rows || []).forEach(row => {
    const totalPct = row[totalKey] || 0;
    let N, pctLabel;
    if (overallWomen > 0) {
      const weight = (row._chartWeight != null)
        ? Number(row._chartWeight || 0)
        : (Number(String(row.women_total || '0').replace(/,/g, '')) || 0);
      const share = weight / overallWomen * 100;
      N = Math.round(share * 10);
      pctLabel = `${share.toFixed(1)}%`;
    } else if (totalKey) {
      N = Math.round(totalPct * 10);
      pctLabel = `${formatChartValue(row, totalKey)}%`;
    } else {
      N = 1000;
      pctLabel = '';
    }

    const wRow = document.createElement('div');
    wRow.className = 'waffle-inner-row';

    const labelCol = document.createElement('div');

    const catLabel = document.createElement('div');
    catLabel.className = 'waffle-cat-label';
    catLabel.textContent = row.label;
    labelCol.appendChild(catLabel);

    const pctText = document.createElement('div');
    pctText.className = 'waffle-pct-text';
    pctText.textContent = pctLabel;
    labelCol.appendChild(pctText);

    wRow.appendChild(labelCol);

    const hbar = document.createElement('div');
    hbar.className = 'waffle-hbar';

    if (N > 0) {
      buildWaffleCells(row, indivSeries, N, totalPct).forEach(cell => {
        const node = document.createElement('div');
        node.className = 'waffle-cell';
        node.style.background = cell.color;
        if (cell.label && cell.pct) node.title = `${cell.label}: ${Number(cell.pct).toFixed(1)}%`;
        hbar.appendChild(node);
      });
    }

    wRow.appendChild(hbar);
    stack.appendChild(wRow);
  });

  return stack;
}

function buildWaffleLegend(indivSeries) {
  const legend = document.createElement('div');
  legend.className = 'waffle-legend';

  const title = document.createElement('div');
  title.className = 'waffle-legend-title';
  title.textContent = 'Method';
  legend.appendChild(title);

  const itemsRow = document.createElement('div');
  itemsRow.className = 'waffle-legend-items-row';

  indivSeries.forEach(s => {
    const item = document.createElement('div');
    item.className = 'waffle-legend-item';

    const swatch = document.createElement('span');
    swatch.className = 'waffle-legend-swatch';
    swatch.style.background = s.color;
    item.appendChild(swatch);

    item.appendChild(document.createTextNode(s.label));
    itemsRow.appendChild(item);
  });

  legend.appendChild(itemsRow);
  return legend;
}

function makePathFn(lonMin, lonMax, latMin, latMax) {
  const lonSpan = lonMax - lonMin, latSpan = latMax - latMin;
  const scale   = Math.min((W - 2*PAD) / lonSpan, (H - 2*PAD) / latSpan);
  const offX    = (W - lonSpan * scale) / 2;
  const offY    = (H - latSpan * scale) / 2;
  const proj = d3.geoTransform({
    point: function(lon, lat) {
      this.stream.point(offX + (lon - lonMin) * scale, offY + (latMax - lat) * scale);
    }
  });
  return d3.geoPath().projection(proj);
}

function boundsFromFeatures(features) {
  const coords = features.flatMap(f => {
    const g = f.geometry;
    if (!g) return [];
    const polys = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
    return polys.flatMap(p => p.flatMap(r => r));
  });
  return {
    lonMin: d3.min(coords, c => c[0]), lonMax: d3.max(coords, c => c[0]),
    latMin: d3.min(coords, c => c[1]), latMax: d3.max(coords, c => c[1]),
  };
}

function shortenName(name, nameKey) {
  if (!name) return '';
  // For region names like "Region I (Ilocos Region)" extract the parenthetical
  if (nameKey === 'adm1_en') {
    const m = name.match(/\(([^)]+)\)/);
    if (m) return m[1];   // e.g. "Ilocos Region", "NCR", "CAR"
    return name;          // e.g. "CARAGA", "MIMAROPA"
  }
  // For provinces / cities: truncate only if very long
  return name.length > 20 ? name.slice(0, 18) + '...' : name;
}

function addLabels(features, pathFn, nameKey, fontSize) {
  g.selectAll('text.map-label').remove();
  g.selectAll('text.map-label')
    .data(features)
    .join('text')
    .attr('class', 'map-label')
    .attr('font-size', fontSize)
    .attr('opacity', 0)
    .each(function(d) {
      const c = pathFn.centroid(d);
      if (!c || isNaN(c[0]) || isNaN(c[1])) return;
      const label = shortenName(d.properties[nameKey], nameKey);
      d3.select(this).attr('x', c[0]).attr('y', c[1]).text(label);
    })
    .transition().delay(350).duration(300)
    .attr('opacity', 1);
}

function fadeIn(sel) {
  sel.attr('opacity', 0).transition().duration(400).ease(d3.easeCubicOut).attr('opacity', 1);
}

function zoomThenRender(pathFn, feature, callback) {
  const [[x0,y0],[x1,y1]] = pathFn.bounds(feature);
  const scale = 0.85 * Math.min(W / (x1 - x0), H / (y1 - y0));
  const tx = W/2 - scale*(x0+x1)/2, ty = H/2 - scale*(y0+y1)/2;
  g.transition().duration(700).ease(d3.easeCubicInOut)
    .attr('transform', `translate(${tx},${ty}) scale(${scale})`)
    .on('end', () => {
      zoom.transform(svg, d3.zoomIdentity); // sync zoom state before redraw
      callback();
    });
}

function pushURL(hash, replace = false) {
  try { window.parent.postMessage({ type: 'child-hash', hash }, '*'); } catch (e) {}
  if (replace) {
    history.replaceState({ hash }, '', '#' + hash);
  } else {
    history.pushState({ hash }, '', '#' + hash);
  }
}

function parseHash() {
  return location.hash.replace(/^#/, '');
}

function metricToSlug(metric) {
  return String(metric || '').replace(/_(pct|rate)\b/g, '').replace(/_/g, '');
}

function slugToMetric(slug) {
  const fields = Object.keys(config.colorDomains || {});
  return fields.find(field => metricToSlug(field) === slug) || null;
}

function parseStateHash(hash = parseHash()) {
  const parts = String(hash || '').split('--').filter(Boolean);
  const tab = parts.includes('tinsights')
    ? 'insights'
    : parts.includes('ttables')
      ? 'tables'
      : (parts.includes('tcharts') || parts.includes('tdata'))
        ? 'charts'
        : 'map';
  const metricToken = parts.find(part => part.startsWith('m'));
  const viewToken = parts.find(part => part.startsWith('v'));
  return {
    tab,
    metric: metricToken ? slugToMetric(metricToken.slice(1)) : null,
    viewHash: viewToken ? '/' + viewToken.slice(1).split('-').filter(Boolean).join('/') : '/',
  };
}

function buildStateHash(viewHash = '/') {
  const metric = config.colorField || Object.keys(config.colorDomains || {})[0] || 'any_method_pct';
  const tabToken = activeTab === 'tables'
    ? 'ttables'
    : activeTab === 'charts'
      ? 'tcharts'
      : activeTab === 'insights'
        ? 'tinsights'
        : 'tmap';
  const parts = [tabToken, 'm' + metricToSlug(metric)];
  const cleanView = String(viewHash || '/').replace(/^\/+/, '');
  if (cleanView && cleanView !== '/') parts.push('v' + cleanView.replace(/\//g, '-'));
  return parts.join('--');
}

window.addEventListener('popstate', e => {
  const hash = (e.state && e.state.hash) || '';
  restoreFromHash(hash);
});

async function restoreFromHash(hash) {
  const state = parseStateHash(hash);
  activeTab = state.tab;
  if (state.metric) {
    applyMetric(state.metric, true, false);
  }

  drawNational(false);

  const parts = state.viewHash === '/' ? [] : state.viewHash.replace(/^\/+/, '').split('/').filter(Boolean);
  if (parts[0] !== 'region' || !parts[1]) {
    switchTab(state.tab, true, false);
    return;
  }

  await ensureNational();
  const regionPsgc = parseInt(parts[1], 10);
  const regionFeature = nationalFeatures.find(f => f.properties.adm1_psgc === regionPsgc);
  if (!regionFeature) {
    switchTab(state.tab, true, false);
    return;
  }

  const name = regionFeature.properties.adm1_en;
  currentContext = { name, parentName: 'Philippines', psgc: regionPsgc, type: 'region' };
  openDetail(name, 'Philippines', regionPsgc, 'region');
  switchTab(state.tab, true, false);
}

async function ensureNational() {
  if (nationalFeatures.length) return;
  const [countryData, hucData] = await Promise.all([
    d3.json(`./geo-nir/country.0.001.json${GEO_VER}`),
    d3.json(`./huc-boundaries.json${GEO_VER}`).catch(() => ({ features: [] })),
  ]);
  nationalFeatures = countryData.features;
  registerNames(nationalFeatures, 'adm1_psgc', 'adm1_en');
  nationalPath = makePathFn(LON_MIN, LON_MAX, LAT_MIN, LAT_MAX);
  // Index HUC features by parent province and by region.
  // Use parentMap for region lookup so NIR-realigned provinces (e.g. Negros Occidental)
  // correctly map to NIR (1800000000) instead of their standard R6/R7 region.
  for (const f of hucData.features) {
    const prov = f.properties.parent_prov_psgc;
    const reg  = Number(parentMap[String(prov)]) || f.properties.adm1_psgc;
    if (!hucFeaturesByProvince[prov]) hucFeaturesByProvince[prov] = [];
    hucFeaturesByProvince[prov].push(f);
    if (!hucFeaturesByRegion[reg]) hucFeaturesByRegion[reg] = [];
    hucFeaturesByRegion[reg].push(f);
  }
}

function getHUCsForProvince(provPsgc) {
  return hucFeaturesByProvince[provPsgc] || [];
}

function goBack() {
  if (viewStack.length < 2) return;
  currentView = 'idle';
  closeDetail();
  viewStack.pop();
  const prev = viewStack[viewStack.length - 1];
  g.selectAll('path').transition().duration(200).attr('opacity', 0)
    .on('end', function() {
      if (this !== g.selectAll('path').nodes().at(-1)) return;
      g.selectAll('*').remove();
      prev.render();
    });
  history.back();
}

backBtn.addEventListener('click', () => {

});

async function loadNational() {
  await ensureNational();
  viewStack = [{ render: drawNational }];
  const initHash = parseHash();
  if (initHash) {
    await restoreFromHash(initHash);
  } else {
    drawNational();
    if (isMobile) {
      // Peek the bottom sheet after a beat to hint it exists
      setTimeout(() => {
        detail.classList.add('peek');
        setTimeout(() => detail.classList.remove('peek'), 1600);
      }, 1400);
    }
  }
}

function openWelcome() {
  document.getElementById('detail-eyebrow').textContent  = config.sectionTitle || 'Philippines Map';
  document.getElementById('detail-lgu-name').textContent = config.title || 'Philippines Map';
  document.getElementById('detail-region').textContent   = config.maxDepth === 'region' ? '' : 'Select a region to begin';
  const desc = config.description
    ? `<p style="font-size:12px;color:var(--text-color);line-height:1.8;margin-top:8px">${config.description}</p>`
    : '';
  detailBody.innerHTML = `<div class="no-findings" style="text-align:left;padding:20px 0">${desc}</div>` + legendHTML() + rankedListHTML('region', null) + noteHTML();
  detail.classList.add('open');
  infoBtn.style.display = 'none';
}

function showInfoBtn() {
  infoBtn.style.display = 'block';
  if (isMobile && !infoBtnFirstShown) {
    infoBtnFirstShown = true;
    infoBtn.classList.add('ring');
    infoBtn.addEventListener('animationend', () => infoBtn.classList.remove('ring'), { once: true });
  }
}

function drawNational(updateURL = true) {
  currentView = 'national';
  currentContext = null;
  backBtn.style.display = 'none';
  setPageTitle(config.title || 'Philippines Map');
  if (isMobile) { closeDetail(); infoBtn.style.display = 'block'; } else openWelcome();
  resetZoom();
  g.selectAll('*').remove();

  g.selectAll('path')
    .data(nationalFeatures)
    .join('path')
    .attr('class', 'region')
    .attr('d', nationalPath)
    .style('fill', d => getFill('region', d.properties.adm1_psgc))
    .call(fadeIn)
    .on('click', (e, d) => {
      if (config.maxDepth === 'region') {
        const name = d.properties.adm1_en;
        const psgc = d.properties.adm1_psgc;
        currentContext = { name, parentName: 'Philippines', psgc, type: 'region' };
        openDetail(name, 'Philippines', psgc, 'region');
        pushURL(buildStateHash(`/region/${psgc}`));
      } else {
        drillRegion(d);
      }
    });

  addLabels(nationalFeatures, nationalPath, 'adm1_en', 10);
  queueMicrotask(() => {
    status.textContent = config.maxDepth === 'region'
      ? nationalFeatures.length + ' regions - click a region for details'
      : nationalFeatures.length + ' regions - click to drill in';
    if (updateURL) {
      pushURL(buildStateHash('/'), true);
    }
  });
  if (config.maxDepth === 'region') {
    queueMicrotask(() => {
      status.textContent = nationalFeatures.length + ' regions - click a region for details';
    });
  }
  status.textContent = nationalFeatures.length + ' regions - click to drill in';
}
