<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fertility Rate</title>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<style>
  /* ── Theme variables (matches map engine) ── */
  :root {
    --bg:               #eef5ef;
    --panel-bg:         #ffffff;
    --panel-border:     rgba(0,0,0,0.09);
    --panel-divider:    rgba(0,0,0,0.07);
    --poly-fill:        #c7dfbf;
    --poly-stroke:      rgba(49,91,58,0.32);
    --hover-stroke:     #2c5b36;
    --label-fill:       #18301f;
    --label-stroke:     rgba(238,245,239,0.92);
    --btn-bg:           rgba(44,91,54,0.08);
    --btn-border:       rgba(44,91,54,0.22);
    --btn-color:        #18301f;
    --btn-hover-bg:     rgba(44,91,54,0.14);
    --status-color:     #4f6454;
    --status-bg:        rgba(255,255,255,0.88);
    --close-color:      rgba(0,0,0,0.35);
    --close-hover:      #000;
    --eyebrow-color:    rgba(0,0,0,0.38);
    --lgu-name-color:   #18301f;
    --region-color:     rgba(0,0,0,0.48);
    --scroll-thumb:     rgba(0,0,0,0.1);
    --text-color:       rgba(0,0,0,0.68);
    --no-data-color:    rgba(0,0,0,0.28);
    --section-color:    rgba(0,0,0,0.28);
    --drag-handle:      rgba(0,0,0,0.12);
    --mobile-border:    rgba(0,0,0,0.1);
    --ring-color:       rgba(0,0,0,0.3);
    --data-label-color: rgba(0,0,0,0.42);
    --data-value-color: rgba(0,0,0,0.85);
    /* chart-specific */
    --bar-2025:         #3f8d49;
    --bar-2022:         #c6ddba;
    --chart-axis:       rgba(44,91,54,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }

  /* ── Tab bar ── */
  #tab-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: 6px;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--panel-divider);
    overflow-x: auto; white-space: nowrap;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-color); font: 12px monospace;
    padding: 5px 13px; cursor: pointer;
    letter-spacing: 0.4px;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--btn-hover-bg);
    border-color: rgba(0,0,0,0.36);
  }
  .tab-btn:hover { background: var(--btn-hover-bg); }

  /* ── Tab panels ── */
  .tab-panel {
    display: none;
    position: fixed; top: 46px; left: 0; right: 0; bottom: 0;
  }
  .tab-panel.active { display: block; }

  /* ══════════════════════════════════════════════
     Charts tab
  ══════════════════════════════════════════════ */
  #tab-charts {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #charts-container {
    max-width: 1680px;
    margin: 0 auto;
  }
  #tab-insights {
    overflow-y: auto;
    padding: 28px 28px 56px;
  }
  #tab-insights::-webkit-scrollbar { width: 4px; }
  #tab-insights::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }
  #insights-container {
    max-width: 920px;
    margin: 0 auto;
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 24px 24px 20px;
  }
  .insights-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .insights-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 24px; line-height: 1.6;
  }
  .insight-card {
    padding: 0;
    margin-bottom: 22px;
  }
  .insight-heading {
    font: 10px/1 monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 10px;
  }
  .insight-text {
    font-size: 13px; color: var(--text-color); line-height: 1.75;
  }
  .insight-takeaways {
    display: grid;
    gap: 10px;
  }
  .insight-takeaway {
    font-size: 13px; color: var(--text-color); line-height: 1.7;
    padding-left: 14px;
    position: relative;
  }
  .insight-takeaway::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(0,0,0,0.28);
  }
  #tab-charts::-webkit-scrollbar { width: 4px; }
  #tab-charts::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }

  .chart-page-title {
    font-size: 20px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.25; margin-bottom: 4px;
  }
  .chart-page-subtitle {
    font-size: 12px; color: var(--region-color); margin-bottom: 24px; line-height: 1.5;
  }
  .chart-section-title {
    grid-column: 1 / -1;
    font: 11px/1 monospace;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--section-color);
    padding-top: 8px;
    border-top: 1px solid var(--panel-divider);
  }
  .chart-section-desc {
    grid-column: 1 / -1;
    margin-top: -12px;
    margin-bottom: 4px;
    font-size: 12px;
    color: var(--region-color);
    line-height: 1.6;
  }
  .chart-legend {
    display: flex; gap: 14px; margin-top: 8px;
    font: 11px monospace; color: var(--data-label-color); align-items: center;
  }
  .legend-swatch {
    display: inline-block; width: 12px; height: 12px;
    border-radius: 2px; margin-right: 4px; vertical-align: middle;
  }
  .legend-swatch.s2022 { border: 1px solid rgba(0,0,0,0.15); }

  /* ── Chart grid ── */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (min-width: 980px) {
    .chart-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (min-width: 1380px) {
    .chart-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  .chart-block {
    background: var(--panel-bg);
    border: 1px solid var(--panel-divider);
    padding: 16px 16px 14px;
  }
  .chart-block.wide { grid-column: 1 / -1; }
  .chart-block-title {
    font: 10px/1 monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--section-color); margin-bottom: 8px;
  }
  .chart-block-subtitle {
    font-size: 12px; color: var(--region-color); line-height: 1.55;
    margin-bottom: 14px;
  }
  .mirror-side-labels {
    display: flex; justify-content: space-between; gap: 12px;
    font: 13px monospace; letter-spacing: 1px; text-transform: uppercase;
    color: var(--data-label-color); margin-bottom: 10px;
  }
  @media (min-width: 980px) {
    .mirror-side-labels { font-size: 15px; }
  }
  .chart-svg-wrap { width: 100%; }
  .chart-svg-wrap svg { display: block; width: 100%; overflow: visible; }
  .chart-block-notes {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--panel-divider);
  }
  .chart-block-note {
    font-size: 11px;
    color: var(--data-label-color);
    line-height: 1.7;
    margin-bottom: 2px;
  }
  .chart-section-notes {
    grid-column: 1 / -1;
    margin-top: -6px;
    padding: 14px 16px 0;
    border-top: 1px solid var(--panel-divider);
  }
  .chart-notes-head {
    font: 10px/1 monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--section-color);
    margin-bottom: 10px;
  }

  .chart-footnotes {
    margin-top: 32px; padding-top: 16px;
    border-top: 1px solid var(--panel-divider);
  }
  .chart-note {
    font-size: 11px; color: var(--data-label-color); line-height: 1.7;
    margin-bottom: 2px;
  }
  .source-line {
    font-size: 11px; color: var(--data-label-color); margin-top: 10px;
    font-style: italic;
  }

  /* ══════════════════════════════════════════════
     Map tab
  ══════════════════════════════════════════════ */
  #tab-map { overflow: hidden; }

  #map-svg { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  #map-svg:active { cursor: grabbing; }
  .svg-bg { fill: var(--bg); }

  .region     { fill: var(--poly-fill); stroke: var(--poly-stroke); stroke-width: 0.8; cursor: pointer; }
  .region:hover { opacity: 0.82; stroke: var(--hover-stroke); stroke-width: 1.5; }

  .map-label {
    fill: var(--label-fill); font-family: monospace; font-weight: 700;
    text-anchor: middle; dominant-baseline: middle;
    pointer-events: none; letter-spacing: 0.3px;
  }

  #map-status {
    position: absolute; bottom: 8px; left: 12px;
    color: var(--status-color); font: 11px monospace;
    background: var(--status-bg); padding: 3px 8px;
    pointer-events: none; z-index: 10;
  }
  #map-info-btn {
    position: absolute; bottom: 16px; right: 16px; font-size: 15px; padding: 6px 12px;
    background: var(--btn-bg); border: 1px solid var(--btn-border);
    color: var(--btn-color); font-family: monospace; cursor: pointer;
    transition: background 0.15s; z-index: 10; display: none;
  }
  #map-info-btn:hover { background: var(--btn-hover-bg); }

  /* Detail panel */
  #map-detail {
    position: absolute; top: 0; right: -380px; bottom: 0; width: 360px;
    background: var(--panel-bg); border-left: 1px solid var(--panel-border);
    display: flex; flex-direction: column;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 20; overflow: hidden;
  }
  #map-detail.open { right: 0; }

  @media (pointer: coarse) {
    #map-detail {
      width: 100%; right: 0; top: auto; bottom: 0; height: 55vh;
      border-left: none; border-top: 1px solid var(--mobile-border);
      border-radius: 14px 14px 0 0;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    }
    #map-detail.open { transform: translateY(0); }
    #map-detail.peek { transform: translateY(calc(100% - 56px)); }
    #map-detail-header { padding-top: 22px; }
    #map-detail::before {
      content: ''; display: block; width: 36px; height: 4px;
      background: var(--drag-handle); border-radius: 2px;
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    }
  }

  #map-detail-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--panel-divider); flex-shrink: 0;
  }
  #map-detail-header-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .detail-eyebrow {
    font: 10px/1 monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--eyebrow-color); margin-bottom: 6px;
  }
  .detail-lgu-name {
    font-size: 22px; font-weight: 600; color: var(--lgu-name-color);
    line-height: 1.2; margin-bottom: 4px;
  }
  .detail-region { font-size: 12px; color: var(--region-color); }
  #map-detail-close {
    background: none; border: none; color: var(--close-color);
    font-size: 18px; cursor: pointer; transition: color 0.15s; line-height: 1;
  }
  #map-detail-close:hover { color: var(--close-hover); }
  #map-detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  #map-detail-body::-webkit-scrollbar { width: 3px; }
  #map-detail-body::-webkit-scrollbar-thumb { background: var(--scroll-thumb); }

  .data-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 1px solid var(--panel-divider); gap: 12px;
  }
  .data-row:last-child { border-bottom: none; }
  .data-label { font: 10px monospace; letter-spacing: 0.8px; text-transform: uppercase; color: var(--data-label-color); flex-shrink: 0; }
  .data-value { font-size: 13px; color: var(--data-value-color); text-align: right; }
  .no-findings { text-align: center; padding: 40px 0; color: var(--no-data-color); font-size: 13px; line-height: 1.8; }
  .section-head { font: 10px monospace; letter-spacing: 1.5px; text-transform: uppercase; color: var(--section-color); margin: 16px 0 8px; }
  .legend-bar { height: 10px; border-radius: 2px; margin: 6px 0 4px; }
  .legend-ends { display: flex; justify-content: space-between; font: 10px monospace; color: var(--data-label-color); }
  .ranked-row {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 0; border-bottom: 1px solid var(--panel-divider);
  }
  .ranked-row:last-child { border-bottom: none; }
  .ranked-i   { font: 10px monospace; color: var(--data-label-color); min-width: 20px; text-align: right; flex-shrink: 0; }
  .ranked-swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ranked-name { flex: 1; font-size: 12px; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .ranked-row.is-active .ranked-name { color: var(--lgu-name-color); font-weight: 600; }
  .ranked-val { font: 12px monospace; color: var(--data-value-color); flex-shrink: 0; }
  .ranked-row.is-active .ranked-val { color: var(--lgu-name-color); }
</style>
</head>
<body>

<!-- ── Tab bar ── -->
<div id="tab-bar">
  <button class="tab-btn active" data-tab="map">Maps</button>
  <button class="tab-btn"        data-tab="charts">Charts</button>
  <button class="tab-btn"        data-tab="insights">Insights</button>
</div>

<!-- ══ Map panel ══ -->
<div id="tab-map" class="tab-panel active">

  <svg id="map-svg"><rect class="svg-bg" width="100%" height="100%"/></svg>
  <div id="map-status">Loading…</div>
  <button id="map-info-btn">ℹ Details</button>
  <div id="map-detail">
    <div id="map-detail-header">
      <div id="map-detail-header-row">
        <div class="detail-eyebrow" id="map-eyebrow">—</div>
        <button id="map-detail-close">✕</button>
      </div>
      <div class="detail-lgu-name" id="map-lgu-name">—</div>
      <div class="detail-region"   id="map-region-label">—</div>
    </div>
    <div id="map-detail-body"></div>
  </div>
</div>

<!-- ══ Charts panel ══ -->
<div id="tab-charts" class="tab-panel">
  <div id="charts-container"></div>
</div>

<div id="tab-insights" class="tab-panel">
  <div id="insights-container"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Shared state
// ─────────────────────────────────────────────────────────────────────────────
let appData       = null;
let mapReady      = false;
let chartsReady   = false;
let insightsReady = false;
let activeTab     = 'map';
const TITLE_SUFFIX = ' | 2025 NDHS Key Indicators';

function notifyParentHash(hash) {
  try { window.parent.postMessage({ type: 'child-hash', hash }, '*'); } catch (e) {}
}

function switchTab(tab, replace = false) {
  activeTab = tab === 'charts' ? 'charts' : tab === 'insights' ? 'insights' : 'map';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + activeTab));
  if (activeTab === 'charts' && appData && !chartsReady) {
    chartsReady = true;
    renderCharts(appData);
  }
  if (activeTab === 'insights' && appData && !insightsReady) {
    insightsReady = true;
    renderInsights(appData.insights);
  }
  const nextHash = '#' + activeTab;
  if (location.hash !== nextHash) {
    if (replace) history.replaceState(null, '', nextHash);
    else history.pushState(null, '', nextHash);
  }
  notifyParentHash(activeTab);
}

// ─────────────────────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    switchTab(btn.dataset.tab, false);
  });
});

window.addEventListener('hashchange', () => {
  switchTab(location.hash.replace(/^#/, '') || 'map', true);
});

// ─────────────────────────────────────────────────────────────────────────────
// Boot — map is the landing tab, so init it first
// ─────────────────────────────────────────────────────────────────────────────
d3.json('./data.json').then(d => {
  appData = d;
  document.title = d.title + TITLE_SUFFIX;
  mapReady = true;
  initMap(d.mapConfig);
  switchTab(location.hash.replace(/^#/, '') || 'map', true);
});

// ═════════════════════════════════════════════════════════════════════════════
// CHARTS
// ═════════════════════════════════════════════════════════════════════════════

function renderCharts(data) {
  const container = document.getElementById('charts-container');
  container.innerHTML = '';

  const hdr = el('div');
  hdr.innerHTML = `<div class="chart-page-title">${data.title}</div>`;
  if (data.subtitle) {
    const sub = el('div', 'chart-page-subtitle');
    sub.textContent = data.subtitle;
    hdr.appendChild(sub);
  }
  container.appendChild(hdr);

  const grid = el('div', 'chart-grid');
  container.appendChild(grid);

  let currentSection = null;
  let currentSectionMeta = null;

  function toSuperscriptDigits(text) {
    return String(text).replace(/[0-9]/g, d => ({ '0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴', '5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹' }[d]));
  }

  function appendSectionNotes(meta) {
    if (!meta || (!meta.sectionFootnotes?.length && !meta.sectionNotes?.length)) return;
    const wrap = el('div', 'chart-section-notes');
    if (meta.sectionFootnotes?.length) {
      meta.sectionFootnotes.forEach(note => {
        const noteEl = el('div', 'chart-block-note');
        noteEl.textContent = `${toSuperscriptDigits(note.ref)} ${note.text}`;
        wrap.appendChild(noteEl);
      });
    }
    if (meta.sectionNotes?.length) {
      const head = el('div', 'chart-notes-head');
      head.textContent = 'NOTES';
      wrap.appendChild(head);
      meta.sectionNotes.forEach(note => {
        const noteEl = el('div', 'chart-block-note');
        noteEl.textContent = note;
        wrap.appendChild(noteEl);
      });
    }
    grid.appendChild(wrap);
  }

  (data.chartBlocks || []).forEach(block => {
    if (block.section && block.section !== currentSection) {
      appendSectionNotes(currentSectionMeta);
      currentSection = block.section;
      currentSectionMeta = block;
      const sectionTitle = el('div', 'chart-section-title');
      sectionTitle.textContent = currentSection;
      grid.appendChild(sectionTitle);
      if (block.sectionDescription) {
        const sectionDesc = el('div', 'chart-section-desc');
        sectionDesc.textContent = block.sectionDescription;
        grid.appendChild(sectionDesc);
      }
    }

    const blockEl = el('section', `chart-block${block.layout === 'wide' ? ' wide' : ''}`);

    const titleEl = el('div', 'chart-block-title');
    titleEl.textContent = block.label;
    blockEl.appendChild(titleEl);

    if (block.subtitle) {
      const subtitleEl = el('div', 'chart-block-subtitle');
      subtitleEl.textContent = block.subtitle;
      blockEl.appendChild(subtitleEl);
    }

    if (block.type === 'mirrored-comparison') {
      const sides = el('div', 'mirror-side-labels');
      sides.innerHTML = `<span>${block.leftLabel}</span><span>${block.rightLabel}</span>`;
      blockEl.appendChild(sides);
      drawMirroredComparison(blockEl, block);
    } else if (block.type === 'vertical-comparison') {
      drawVerticalComparison(blockEl, block);
    } else {
      drawHorizontalComparison(blockEl, block);
    }

    const legend = el('div', 'chart-legend');
    legend.innerHTML =
      `<span><span class="legend-swatch s2022" style="background:var(--bar-2022)"></span>2022</span>` +
      `<span><span class="legend-swatch" style="background:var(--bar-2025)"></span>2025</span>`;
    blockEl.appendChild(legend);

    grid.appendChild(blockEl);
  });

  appendSectionNotes(currentSectionMeta);

  if (data.source) {
    const src = el('div', 'source-line');
    src.textContent = 'Source: ' + data.source;
    container.appendChild(src);
  }
}

function renderInsights(insights) {
  const container = document.getElementById('insights-container');
  if (!container || !insights) return;
  container.innerHTML = '';

  const header = el('div');
  header.innerHTML = `
    <div class="insights-page-title">${insights.title || appData.title}</div>
    <div class="insights-page-subtitle">${insights.subtitle || ''}</div>
  `;
  container.appendChild(header);

  if (insights.overview) {
    const block = el('section', 'insight-card');
    block.innerHTML = `
      <div class="insight-heading">Overview</div>
      <div class="insight-text">${insights.overview}</div>
    `;
    container.appendChild(block);
  }

  (insights.sections || []).forEach(section => {
    const block = el('section', 'insight-card');
    block.innerHTML = `
      <div class="insight-heading">${section.heading || ''}</div>
      <div class="insight-text">${section.body || ''}</div>
    `;
    container.appendChild(block);
  });

  if (insights.takeaways?.length) {
    const block = el('section', 'insight-card');
    block.innerHTML = `<div class="insight-heading">Key Takeaways</div>`;
    const wrap = el('div', 'insight-takeaways');
    insights.takeaways.forEach(item => {
      const row = el('div', 'insight-takeaway');
      row.textContent = item;
      wrap.appendChild(row);
    });
    block.appendChild(wrap);
    container.appendChild(block);
  }
}

function formatDisplay(display, fallback, suffix = '') {
  if (display != null && display !== '') return String(display);
  if (fallback == null) return 'NA';
  return `${fallback}${suffix}`;
}

function withNoteRef(label, row) {
  if (row.supRef) {
    const sup = String(row.supRef).replace(/[0-9]/g, d => ({ '0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴', '5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹' }[d]));
    return `${label}${sup}`;
  }
  return row.noteRef ? `${label} (${row.noteRef})` : label;
}

function drawHorizontalComparison(container, block) {
  const rows = block.rows || [];
  const VW = block.layout === 'wide' ? 860 : 640;
  const ML = block.layout === 'wide' ? 230 : 170;
  const MR = 76;
  const MT = 2;
  const MB = 4;
  const INNER_W = VW - ML - MR;
  const BAR_H = 14;
  const PAIR_GAP = 3;
  const CAT_GAP = 16;
  const PAIR_H = BAR_H * 2 + PAIR_GAP;
  const svgH = MT + rows.length * PAIR_H + Math.max(0, rows.length - 1) * CAT_GAP + MB;

  const allVals = rows.flatMap(r => [r.y2025, r.y2022].filter(v => v != null));
  const rawMax = allVals.length ? d3.max(allVals) : 5;
  const step = rawMax > 10 ? 5 : 0.5;
  const xMax = Math.max(step, Math.ceil((rawMax * 1.12) / step) * step);
  const x = d3.scaleLinear().domain([0, xMax]).range([0, INNER_W]);

  const wrap = el('div', 'chart-svg-wrap');
  container.appendChild(wrap);

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('viewBox', `0 0 ${VW} ${svgH}`);
  svgEl.setAttribute('preserveAspectRatio', 'xMinYMid meet');
  wrap.appendChild(svgEl);

  const svg = d3.select(svgEl);
  const g = svg.append('g').attr('transform', `translate(${ML},${MT})`);

  g.append('line')
    .attr('x1', 0).attr('y1', 0)
    .attr('x2', 0).attr('y2', svgH - MT - MB)
    .attr('stroke', 'var(--chart-axis)').attr('stroke-width', 1);

  rows.forEach((row, i) => {
    const yBase = i * (PAIR_H + CAT_GAP);
    const rg = g.append('g').attr('transform', `translate(0,${yBase})`);

    d3.select(svgEl).append('text')
      .attr('x', ML - 10)
      .attr('y', MT + yBase + PAIR_H / 2)
      .attr('text-anchor', 'end')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 12)
      .attr('font-family', 'sans-serif')
      .attr('fill', 'var(--text-color)')
      .text(withNoteRef(row.label, row));

    drawHorizontalLane(rg, 0, row.y2022, formatDisplay(row.y2022Display, row.y2022), x, 'var(--bar-2022)', 'var(--data-label-color)', true);
    drawHorizontalLane(rg, BAR_H + PAIR_GAP, row.y2025, formatDisplay(row.y2025Display, row.y2025), x, 'var(--bar-2025)', 'var(--data-value-color)');
  });
}

function drawHorizontalLane(group, y, value, display, scale, fill, textFill, stroked = false) {
  if (value != null) {
    const width = scale(value);
    group.append('rect')
      .attr('x', 0).attr('y', y)
      .attr('width', width).attr('height', 14)
      .attr('fill', fill)
      .attr('stroke', stroked ? 'rgba(0,0,0,0.12)' : 'none')
      .attr('stroke-width', stroked ? 0.5 : 0);
    group.append('text')
      .attr('x', width + 5).attr('y', y + 7)
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 11).attr('font-family', 'monospace')
      .attr('fill', textFill)
      .text(display);
  } else {
    group.append('text')
      .attr('x', 5).attr('y', y + 7)
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 11).attr('font-family', 'monospace')
      .attr('fill', 'var(--no-data-color)')
      .text(display || 'NA');
  }
}

function drawMirroredComparison(container, block) {
  const rows = block.rows || [];
  const VW = block.layout === 'wide' ? 920 : 640;
  const isWide = block.layout === 'wide';
  const ML = isWide ? 10 : 8;
  const MR = isWide ? 10 : 8;
  const MID_W = isWide ? 56 : 68;
  const SIDE_GAP = 3;
  const BAR_H = isWide ? 13 : 15;
  const PAIR_GAP = 4;
  const ROW_GAP = isWide ? 12 : 14;
  const leftWidth = (VW - ML - MR - MID_W - SIDE_GAP * 2) / 2;
  const rightWidth = leftWidth;
  const leftEdge = ML + leftWidth;
  const rightStart = leftEdge + MID_W;
  const leftInner = leftWidth - 4;
  const rightInner = rightWidth - 4;
  const MT = 2;
  const MB = 4;
  const PAIR_H = BAR_H * 2 + PAIR_GAP;
  const svgH = MT + rows.length * PAIR_H + Math.max(0, rows.length - 1) * ROW_GAP + MB;

  const allVals = rows.flatMap(r => [r.left2025, r.right2025, r.left2022, r.right2022].filter(v => v != null));
  const rawMax = allVals.length ? d3.max(allVals) : 5;
  const step = rawMax > 10 ? 5 : 0.5;
  const x = d3.scaleLinear()
    .domain([0, Math.max(step, Math.ceil((rawMax * 1.15) / step) * step)])
    .range([0, Math.min(leftInner, rightInner)]);

  const wrap = el('div', 'chart-svg-wrap');
  container.appendChild(wrap);

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('viewBox', `0 0 ${VW} ${svgH}`);
  svgEl.setAttribute('preserveAspectRatio', 'xMinYMid meet');
  wrap.appendChild(svgEl);

  const svg = d3.select(svgEl);
  svg.append('line')
    .attr('x1', leftEdge).attr('x2', leftEdge)
    .attr('y1', 0).attr('y2', svgH)
    .attr('stroke', 'var(--chart-axis)');
  svg.append('line')
    .attr('x1', rightStart).attr('x2', rightStart)
    .attr('y1', 0).attr('y2', svgH)
    .attr('stroke', 'var(--chart-axis)');

  rows.forEach((row, i) => {
    const yBase = MT + i * (PAIR_H + ROW_GAP);
    const centerY = yBase + PAIR_H / 2;
    const label = withNoteRef(row.label, row);
    let labelFontSize = isWide ? 14 : 15;
    if (label.length > 8) labelFontSize = isWide ? 11.5 : 12.5;
    if (label.length > 10) labelFontSize = isWide ? 9.5 : 10.5;
    if (label.length > 12) labelFontSize = isWide ? 8 : 9;
    if (label.length > 14) labelFontSize = isWide ? 7 : 8;

    svg.append('text')
      .attr('x', leftEdge + MID_W / 2)
      .attr('y', centerY)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', labelFontSize)
      .attr('font-family', 'sans-serif')
      .attr('fill', 'var(--text-color)')
      .text(label);

    drawMirroredLane(svg, leftEdge - SIDE_GAP, yBase, row.left2022, formatDisplay(row.left2022Display, row.left2022), x, true, 'var(--bar-2022)', 'var(--data-label-color)', true);
    drawMirroredLane(svg, rightStart + SIDE_GAP, yBase, row.right2022, formatDisplay(row.right2022Display, row.right2022), x, false, 'var(--bar-2022)', 'var(--data-label-color)', true);
    drawMirroredLane(svg, leftEdge - SIDE_GAP, yBase + BAR_H + PAIR_GAP, row.left2025, formatDisplay(row.left2025Display, row.left2025), x, true, 'var(--bar-2025)', 'var(--data-value-color)');
    drawMirroredLane(svg, rightStart + SIDE_GAP, yBase + BAR_H + PAIR_GAP, row.right2025, formatDisplay(row.right2025Display, row.right2025), x, false, 'var(--bar-2025)', 'var(--data-value-color)');
  });
}

function drawMirroredLane(svg, anchorX, y, value, display, scale, invert, fill, textFill, stroked = false) {
  if (value != null) {
    const width = scale(value);
    const x = invert ? anchorX - width : anchorX;
    svg.append('rect')
      .attr('x', x).attr('y', y)
      .attr('width', width).attr('height', 12)
      .attr('fill', fill)
      .attr('stroke', stroked ? 'rgba(0,0,0,0.12)' : 'none')
      .attr('stroke-width', stroked ? 0.5 : 0);
    svg.append('text')
      .attr('x', invert ? x - 5 : x + width + 5)
      .attr('y', y + 6)
      .attr('text-anchor', invert ? 'end' : 'start')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 13)
      .attr('font-family', 'monospace')
      .attr('fill', textFill)
      .text(display);
  } else {
    svg.append('text')
      .attr('x', invert ? anchorX - 5 : anchorX + 5)
      .attr('y', y + 6)
      .attr('text-anchor', invert ? 'end' : 'start')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 13)
      .attr('font-family', 'monospace')
      .attr('fill', 'var(--no-data-color)')
      .text(display || 'NA');
  }
}

function drawVerticalComparison(container, block) {
  const rows = block.rows || [];
  const wrap = el('div', 'chart-svg-wrap');
  container.appendChild(wrap);

  const VW = block.layout === 'wide' ? 860 : 640;
  const ML = block.layout === 'wide' ? 58 : 52;
  const MR = 16;
  const MT = 10;
  const MB = 90;
  const INNER_W = VW - ML - MR;
  const CH = 260;
  const BAR_W = Math.min(26, Math.max(16, Math.floor(INNER_W / Math.max(rows.length * 3, 1))));
  const GROUP_GAP = Math.max(18, Math.min(30, Math.floor(INNER_W / Math.max(rows.length, 1) / 3)));
  const groupWidth = BAR_W * 2 + 8;
  const groupStep = groupWidth + GROUP_GAP;
  const svgH = MT + CH + MB;

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('viewBox', `0 0 ${VW} ${svgH}`);
  svgEl.setAttribute('preserveAspectRatio', 'xMinYMid meet');
  wrap.appendChild(svgEl);

  const svg = d3.select(svgEl);
  const values = rows.flatMap(r => [r.y2025, r.y2022].filter(v => v != null));
  const rawMax = values.length ? d3.max(values) : 5;
  const tickStep = rawMax > 10 ? 5 : 0.5;
  const maxValue = Math.max(tickStep, Math.ceil((rawMax * 1.12) / tickStep) * tickStep);
  const y = d3.scaleLinear().domain([0, maxValue]).range([CH, 0]);
  const chart = svg.append('g').attr('transform', `translate(${ML},${MT})`);

  chart.append('line')
    .attr('x1', 0).attr('y1', CH)
    .attr('x2', INNER_W).attr('y2', CH)
    .attr('stroke', 'var(--chart-axis)');

  y.ticks(rawMax > 10 ? 5 : 6).forEach(tick => {
    const yy = y(tick);
    chart.append('line')
      .attr('x1', 0).attr('y1', yy)
      .attr('x2', INNER_W).attr('y2', yy)
      .attr('stroke', 'var(--chart-axis)')
      .attr('stroke-dasharray', '2,3');
    chart.append('text')
      .attr('x', -8).attr('y', yy)
      .attr('text-anchor', 'end')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', 10)
      .attr('font-family', 'monospace')
      .attr('fill', 'var(--data-label-color)')
      .text(tick.toFixed(maxValue > 10 ? 0 : 1).replace(/\.0$/, ''));
  });

  rows.forEach((row, i) => {
    const groupX = i * groupStep + GROUP_GAP / 2;
    const x2022 = groupX;
    const x2025 = groupX + BAR_W + 8;

    if (row.y2022 != null) {
      const h2022 = CH - y(row.y2022);
      chart.append('rect')
        .attr('x', x2022)
        .attr('y', y(row.y2022))
        .attr('width', BAR_W)
        .attr('height', h2022)
        .attr('fill', 'var(--bar-2022)')
        .attr('stroke', 'rgba(0,0,0,0.12)')
        .attr('stroke-width', 0.5);
      chart.append('text')
        .attr('x', x2022 + BAR_W / 2)
        .attr('y', y(row.y2022) - 6)
        .attr('text-anchor', 'middle')
        .attr('font-size', 10)
        .attr('font-family', 'monospace')
        .attr('fill', 'var(--data-label-color)')
        .text(formatDisplay(row.y2022Display, row.y2022));
    }

    if (row.y2025 != null) {
      const h2025 = CH - y(row.y2025);
      chart.append('rect')
        .attr('x', x2025)
        .attr('y', y(row.y2025))
        .attr('width', BAR_W)
        .attr('height', h2025)
        .attr('fill', 'var(--bar-2025)');
      chart.append('text')
        .attr('x', x2025 + BAR_W / 2)
        .attr('y', y(row.y2025) - 6)
        .attr('text-anchor', 'middle')
        .attr('font-size', 10)
        .attr('font-family', 'monospace')
        .attr('fill', 'var(--data-value-color)')
        .text(formatDisplay(row.y2025Display, row.y2025));
    }

    chart.append('text')
      .attr('x', groupX + groupWidth / 2)
      .attr('y', CH + 18)
      .attr('text-anchor', 'end')
      .attr('transform', `rotate(-35 ${groupX + groupWidth / 2} ${CH + 18})`)
      .attr('font-size', 11)
      .attr('font-family', 'sans-serif')
      .attr('fill', 'var(--text-color)')
      .text(withNoteRef(row.label, row));
  });
}

// MAP
// ═════════════════════════════════════════════════════════════════════════════

const nameRegistry = {};
let   mapColorScale = null;
let   mapDataByRegion = {};
let   mapCfg = null;

const mapSvgEl = document.getElementById('map-svg');
const mapSvg   = d3.select('#map-svg');
const mapG     = mapSvg.append('g');

const LON_MIN = 116.93, LON_MAX = 126.60;
const LAT_MIN = 4.64,   LAT_MAX = 20.84;
const PAD     = 30;

const zoom = d3.zoom()
  .scaleExtent([0.5, 20])
  .on('zoom', e => mapG.attr('transform', e.transform));
mapSvg.call(zoom);
mapSvg.on('dblclick.zoom', null);

function makePathFn(w, h) {
  const lonSpan = LON_MAX - LON_MIN, latSpan = LAT_MAX - LAT_MIN;
  const scale   = Math.min((w - 2*PAD) / lonSpan, (h - 2*PAD) / latSpan);
  const offX    = (w - lonSpan * scale) / 2;
  const offY    = (h - latSpan * scale) / 2;
  return d3.geoPath().projection(d3.geoTransform({
    point(lon, lat) {
      this.stream.point(offX + (lon - LON_MIN) * scale, offY + (LAT_MAX - lat) * scale);
    }
  }));
}

function shortenRegion(name) {
  if (!name) return '';
  const m = name.match(/\(([^)]+)\)/);
  return m ? m[1] : name;
}

function mapLegendHTML() {
  const cfg = mapCfg;
  const [lo, hi] = cfg.colorDomain;
  const N = 24;
  const stops = Array.from({length: N}, (_, i) => mapColorScale(lo + (hi - lo) * i / (N - 1))).join(',');
  const suf   = cfg.valueSuffix || '';
  const lbl   = cfg.detailFields?.[0]?.label || '';
  return `<div class="section-head">${lbl}</div>` +
    `<div class="legend-bar" style="background:linear-gradient(to right,${stops})"></div>` +
    `<div class="legend-ends"><span>${lo}${suf}</span><span>${hi}${suf}</span></div>`;
}

function mapRankedListHTML(activePsgc) {
  const cfg     = mapCfg;
  const records = Object.values(mapDataByRegion).filter(r => r[cfg.colorField] != null);
  const sorted  = [...records].sort((a, b) => (b[cfg.colorField] ?? -Infinity) - (a[cfg.colorField] ?? -Infinity));
  if (!sorted.length) return '';
  const suf  = cfg.valueSuffix || '';
  const sups = ['¹','²','³','⁴','⁵','⁶','⁷','⁸','⁹'];
  const noted = new Map();
  let nc = 0;
  sorted.forEach(r => { if (r.psa_note) noted.set(String(r.psgc), sups[nc++] || String(nc)); });
  const rows = sorted.map((r, i) => {
    const rawName = nameRegistry[String(r.psgc)] || ('PSGC ' + r.psgc);
    const sup     = noted.get(String(r.psgc));
    const name    = sup ? `${rawName}<sup style="font-size:9px">${sup}</sup>` : rawName;
    const val     = r[cfg.colorField];
    const fill    = mapColorScale(val);
    const active  = activePsgc != null && String(r.psgc) === String(activePsgc);
    return `<div class="ranked-row${active ? ' is-active' : ''}">` +
      `<span class="ranked-i">${i + 1}</span>` +
      `<span class="ranked-swatch" style="background:${fill}"></span>` +
      `<span class="ranked-name">${name}</span>` +
      `<span class="ranked-val">${val}${suf}</span>` +
      `</div>`;
  }).join('');
  const notes = [...noted.entries()].map(([psgc, sup]) => {
    const rec = sorted.find(r => String(r.psgc) === psgc);
    return `<p style="font-size:11px;line-height:1.6;color:var(--data-label-color);margin:10px 0 0">${sup} ${rec.psa_note}</p>`;
  }).join('');
  return `<div class="section-head">All Regions</div><div>${rows}</div>${notes}`;
}

function openMapWelcome() {
  document.getElementById('map-eyebrow').textContent    = 'Table 2';
  document.getElementById('map-lgu-name').textContent   = 'Philippines';
  document.getElementById('map-region-label').textContent = '';
  const desc = `<p style="font-size:12px;color:var(--text-color);line-height:1.8;margin-bottom:12px">` +
    `Distribution of survey respondents (women aged 15–49) by region. ` +
    `Darker shade = larger share of respondents. Select a region for details.</p>`;
  const cta = `<p style="font-size:11px;color:var(--data-label-color);line-height:1.8;margin-top:20px;` +
    `padding-top:14px;border-top:1px solid var(--panel-divider)">` +
    `Want a fuller picture? ` +
    `<a href="#" id="cta-data-tab" style="color:var(--btn-color);text-decoration:underline;cursor:pointer">` +
    `Explore background characteristics of respondents</a>` +
    ` — age, education, religion, and more.</p>`;
  document.getElementById('map-detail-body').innerHTML =
    desc + mapLegendHTML() + mapRankedListHTML(null) + cta;
  document.getElementById('map-detail').classList.add('open');
  document.getElementById('cta-data-tab').addEventListener('click', e => {
    e.preventDefault();
    document.querySelector('.tab-btn[data-tab="charts"]').click();
  });
}

function openMapDetail(name, psgc, rec) {
  const cfg = mapCfg;
  document.getElementById('map-eyebrow').textContent      = 'Region';
  document.getElementById('map-lgu-name').textContent     = name;
  document.getElementById('map-region-label').textContent = 'Philippines';

  let dataHTML = '';
  if (rec) {
    const suf = cfg.valueSuffix || '';
    dataHTML = (cfg.detailFields || []).filter(f => f.key in rec).map(f => {
      const val = rec[f.key];
      if (f.key === 'psa_note') {
        return val ? `<p style="font-size:11px;line-height:1.6;color:var(--data-label-color);margin:8px 0 0">${val}</p>` : '';
      }
      return `<div class="data-row"><span class="data-label">${f.label}</span>` +
        `<span class="data-value">${val != null ? val + suf : '—'}</span></div>`;
    }).join('');
  } else {
    dataHTML = `<div class="no-findings">No data for this region.</div>`;
  }

  document.getElementById('map-detail-body').innerHTML =
    dataHTML + mapLegendHTML() + mapRankedListHTML(psgc);
  document.getElementById('map-detail').classList.add('open');
}

async function initMap(cfg) {
  mapCfg = cfg;
  mapColorScale = d3.scaleSequential(d3[cfg.colorScheme]).domain(cfg.colorDomain);

  // Build region data lookup
  for (const rec of (cfg.data?.region || [])) {
    mapDataByRegion[String(rec.psgc)] = rec;
  }

  // Load PSGC index for name registry
  try {
    const idx = await d3.json('./psgc-index.json');
    for (const r of [...(idx.regions?.nir || []), ...(idx.regions?.standard || [])]) {
      if (r.psgc && r.name) nameRegistry[String(r.psgc)] = r.name;
    }
  } catch(e) {}

  // Load GeoJSON
  const w = mapSvgEl.clientWidth  || window.innerWidth;
  const h = mapSvgEl.clientHeight || (window.innerHeight - 46);
  mapSvgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);

  let countryData;
  try {
    countryData = await d3.json('./geo-nir/country.0.001.json?v=4');
  } catch(e) {
    document.getElementById('map-status').textContent = 'Error loading map data.';
    return;
  }

  const pathFn = makePathFn(w, h);
  const features = countryData.features;

  for (const f of features) {
    const p = f.properties;
    if (p.adm1_psgc && p.adm1_en) nameRegistry[String(p.adm1_psgc)] = p.adm1_en;
  }

  // Render regions
  mapG.selectAll('path.region')
    .data(features)
    .join('path')
    .attr('class', 'region')
    .attr('d', pathFn)
    .style('fill', d => {
      const rec = mapDataByRegion[String(d.properties.adm1_psgc)];
      return (rec && rec[cfg.colorField] != null) ? mapColorScale(rec[cfg.colorField]) : null;
    })
    .attr('opacity', 0)
    .on('click', (e, d) => {
      const psgc = d.properties.adm1_psgc;
      const name = nameRegistry[String(psgc)] || d.properties.adm1_en;
      openMapDetail(name, psgc, mapDataByRegion[String(psgc)]);
    })
    .transition().duration(400).attr('opacity', 1);

  // Labels
  mapG.selectAll('text.map-label')
    .data(features)
    .join('text')
    .attr('class', 'map-label')
    .attr('font-size', 10)
    .attr('opacity', 0)
    .each(function(d) {
      const c = pathFn.centroid(d);
      if (!c || isNaN(c[0]) || isNaN(c[1])) return;
      d3.select(this).attr('x', c[0]).attr('y', c[1]).text(shortenRegion(d.properties.adm1_en));
    })
    .transition().delay(350).duration(300).attr('opacity', 1);

  document.getElementById('map-status').textContent = '18 regions — click to view details';

  // Info button — always visible; reopens the welcome/overview panel
  const infoBtnEl = document.getElementById('map-info-btn');
  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  infoBtnEl.style.display = 'block';
  infoBtnEl.addEventListener('click', openMapWelcome);
  document.getElementById('map-detail-close').addEventListener('click', () => {
    document.getElementById('map-detail').classList.remove('open');
  });

  // Welcome state
  if (isMobile) {
    setTimeout(() => {
      const detail = document.getElementById('map-detail');
      detail.classList.add('peek');
      setTimeout(() => detail.classList.remove('peek'), 1600);
    }, 800);
  } else {
    openMapWelcome();
  }
}

function mapRankedListHTML(activePsgc) {
  const cfg = mapCfg;
  const records = Object.values(mapDataByRegion).filter(r => r[cfg.colorField] != null);
  const sorted = [...records].sort((a, b) => (b[cfg.colorField] ?? -Infinity) - (a[cfg.colorField] ?? -Infinity));
  if (!sorted.length) return '';
  const suffix = cfg.valueSuffix || '';
  const rows = sorted.map((r, i) => {
    const rawName = nameRegistry[String(r.psgc)] || ('PSGC ' + r.psgc);
    const name = r.note_ref ? `${rawName} (${r.note_ref})` : rawName;
    const fill = mapColorScale(r[cfg.colorField]);
    const active = activePsgc != null && String(r.psgc) === String(activePsgc);
    return `<div class="ranked-row${active ? ' is-active' : ''}">` +
      `<span class="ranked-i">${i + 1}</span>` +
      `<span class="ranked-swatch" style="background:${fill}"></span>` +
      `<span class="ranked-name">${name}</span>` +
      `<span class="ranked-val">${r[cfg.colorField]}${suffix}</span>` +
      `</div>`;
  }).join('');
  const notes = sorted
    .filter(r => r.psa_note && r.note_ref)
    .map(r => `<p style="font-size:11px;line-height:1.6;color:var(--data-label-color);margin:10px 0 0">(${r.note_ref}) ${r.psa_note}</p>`)
    .join('');
  return `<div class="section-head">All Regions</div><div>${rows}</div>${notes}`;
}

function openMapWelcome() {
  document.getElementById('map-eyebrow').textContent = 'Fertility';
  document.getElementById('map-lgu-name').textContent = 'Fertility Rate';
  document.getElementById('map-region-label').textContent = '';
  const desc = `<p style="font-size:12px;color:var(--text-color);line-height:1.8;margin-bottom:12px">` +
    `Regional total fertility rate for the 3 years preceding the survey. ` +
    `Darker shade = higher fertility rate. Select a region for 2025 and 2022 values.</p>`;
  const cta = `<p style="font-size:11px;color:var(--data-label-color);line-height:1.8;margin-top:20px;` +
    `padding-top:14px;border-top:1px solid var(--panel-divider)">` +
    `Want a fuller picture? ` +
    `<a href="#" id="cta-data-tab" style="color:var(--btn-color);text-decoration:underline;cursor:pointer">` +
    `Open the data tab</a>` +
    ` for age-specific fertility rates, residence splits, and background comparisons.</p>`;
  document.getElementById('map-detail-body').innerHTML = desc + mapLegendHTML() + mapRankedListHTML(null) + cta;
  document.getElementById('map-detail').classList.add('open');
  document.getElementById('cta-data-tab').addEventListener('click', e => {
    e.preventDefault();
    document.querySelector('.tab-btn[data-tab="charts"]').click();
  });
}

function openMapDetail(name, psgc, rec) {
  const cfg = mapCfg;
  document.getElementById('map-eyebrow').textContent = 'Region';
  document.getElementById('map-lgu-name').textContent = name;
  document.getElementById('map-region-label').textContent = 'Philippines';

  let dataHTML = '';
  if (rec) {
    dataHTML = (cfg.detailFields || []).filter(f => f.key in rec).map(f => {
      if (f.key === 'psa_note') {
        return rec.psa_note
          ? `<p style="font-size:11px;line-height:1.6;color:var(--data-label-color);margin:8px 0 0">${rec.psa_note}</p>`
          : '';
      }
      const value = rec[f.key];
      const display = f.displayKey && rec[f.displayKey] != null
        ? rec[f.displayKey]
        : (value != null ? `${value}${cfg.valueSuffix || ''}` : 'NA');
      return `<div class="data-row"><span class="data-label">${f.label}</span>` +
        `<span class="data-value">${display}</span></div>`;
    }).join('');
  } else {
    dataHTML = `<div class="no-findings">No data for this region.</div>`;
  }

  document.getElementById('map-detail-body').innerHTML = dataHTML + mapLegendHTML() + mapRankedListHTML(psgc);
  document.getElementById('map-detail').classList.add('open');
}

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
</script>
