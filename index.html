<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 NDHS Key Indicators — Philippines</title>
<style>
  :root {
    --bg:            #edf1f7;
    --nav-bg:        #ffffff;
    --nav-border:    rgba(0,0,0,0.09);
    --nav-divider:   rgba(0,0,0,0.06);
    --nav-w:         256px;
    --topbar-h:      0px;   /* desktop: no topbar */
    --btn-bg:        rgba(0,0,0,0.06);
    --btn-border:    rgba(0,0,0,0.18);
    --btn-color:     #1a2840;
    --btn-hover-bg:  rgba(0,0,0,0.10);
    --eyebrow:       rgba(0,0,0,0.36);
    --title-color:   #1a2840;
    --muted:         rgba(0,0,0,0.38);
    --text:          rgba(0,0,0,0.70);
    --active-bg:     rgba(42,95,143,0.08);
    --active-border: #2a5f8f;
    --disabled:      rgba(0,0,0,0.28);
    --tag-bg:        rgba(0,0,0,0.05);
    --tag-color:     rgba(0,0,0,0.40);
    --scroll-thumb:  rgba(0,0,0,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }

  /* ══ Desktop layout ══ */
  #nav {
    position: fixed; top: 0; left: 0; bottom: 0; width: var(--nav-w);
    background: var(--nav-bg); border-right: 1px solid var(--nav-border);
    display: flex; flex-direction: column; z-index: 20;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  #main {
    position: fixed; top: 0; left: var(--nav-w); right: 0; bottom: 0;
  }
  #main iframe {
    width: 100%; height: 100%; border: none; display: block;
  }

  /* ══ Nav header ══ */
  #nav-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--nav-divider);
    flex-shrink: 0;
  }
  #nav-title {
    font-size: 14px; font-weight: 700; color: var(--title-color);
    line-height: 1.35; margin-bottom: 5px;
  }
  #nav-subtitle {
    font: 9px/1 monospace; letter-spacing: 1.8px; text-transform: uppercase;
    color: var(--eyebrow);
  }

  /* ══ Nav list ══ */
  #nav-list {
    flex: 1; overflow-y: auto; padding: 8px 0 16px;
  }
  #nav-list::-webkit-scrollbar { width: 3px; }
  #nav-list::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }

  .nav-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 18px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.12s;
    text-decoration: none;
  }
  .nav-item:hover:not(.disabled) { background: var(--btn-hover-bg); }
  .nav-item.active {
    background: var(--active-bg);
    border-left-color: var(--active-border);
  }
  .nav-item.disabled { cursor: default; pointer-events: none; }

  .nav-num { display: none; }

  .nav-title-text {
    font-size: 12px; line-height: 1.4; color: var(--text);
  }
  .nav-item.active .nav-title-text { color: var(--title-color); font-weight: 600; }
  .nav-item.disabled .nav-title-text { color: var(--disabled); }

  .nav-section-head {
    font: 9px/1 monospace; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); padding: 14px 18px 6px; flex-shrink: 0;
  }

  /* ══ Mobile topbar ══ */
  @media (max-width: 680px) {
    :root { --topbar-h: 46px; }

    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
      background: var(--nav-bg); border-bottom: 1px solid var(--nav-border);
      display: flex; align-items: center; padding: 0 14px; gap: 12px; z-index: 30;
    }
    #hamburger {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; flex-direction: column; gap: 4px;
    }
    #hamburger span {
      display: block; width: 18px; height: 2px; background: var(--title-color);
      border-radius: 1px; transition: opacity 0.2s;
    }
    #topbar-title { font-size: 13px; font-weight: 600; color: var(--title-color); }

    #nav {
      top: var(--topbar-h); transform: translateX(-100%);
    }
    #nav.open { transform: translateX(0); }

    #main { top: var(--topbar-h); left: 0; }

    #nav-overlay {
      display: none; position: fixed; inset: 0; top: var(--topbar-h);
      background: rgba(0,0,0,0.3); z-index: 19;
    }
    #nav-overlay.visible { display: block; }
  }
  @media (min-width: 681px) {
    #topbar { display: none; }
    #nav-overlay { display: none !important; }
  }
</style>
</head>
<body>

<!-- Mobile topbar -->
<div id="topbar">
  <button id="hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <span id="topbar-title">2025 NDHS</span>
</div>
<div id="nav-overlay"></div>

<!-- Left nav -->
<nav id="nav">
  <div id="nav-header">
    <div id="nav-title">2025 National Demographic and Health Survey</div>
    <div id="nav-subtitle">Key Indicators</div>
  </div>
  <div id="nav-list">

    <div class="nav-section-head">Survey profile</div>

    <a class="nav-item" data-route="backgroundcharacteristics" data-src="./charts/table-2/" href="#backgroundcharacteristics">
      <span class="nav-num">Table 2</span>
      <span class="nav-title-text">Background characteristics</span>
    </a>

    <div class="nav-section-head">Fertility</div>

    <a class="nav-item active" data-route="fertilityrate" data-src="./charts/table-3/" href="#fertilityrate">
      <span class="nav-num">Table 3b</span>
      <span class="nav-title-text">Fertility Rate</span>
    </a>
    <a class="nav-item" data-route="teenage-pregnancy-2025" data-src="./maps/teenage-pregnancy-2025/" href="#teenage-pregnancy-2025">
      <span class="nav-num">Table 4</span>
      <span class="nav-title-text">Teenage pregnancy</span>
    </a>
    <a class="nav-item" data-route="contraceptive-use-2025" data-src="./maps/contraceptive-use-2025/" href="#contraceptive-use-2025">
      <span class="nav-num">Table 7a</span>
      <span class="nav-title-text">Contraceptive use</span>
    </a>

    <div class="nav-section-head">Child health</div>

    <a class="nav-item" data-route="childhood-mortality-2025" data-src="./maps/childhood-mortality-2025/" href="#childhood-mortality-2025">
      <span class="nav-num">Table 10c</span>
      <span class="nav-title-text">Childhood mortality rates</span>
    </a>

    <div class="nav-section-head">Child welfare</div>

    <a class="nav-item" data-route="child-discipline-2025" data-src="./maps/child-discipline-2025/" href="#child-discipline-2025">
      <span class="nav-num">Table 12</span>
      <span class="nav-title-text">Child discipline</span>
    </a>

  </div><!-- /nav-list -->
</nav>

<!-- Content iframe -->
<div id="main">
  <iframe id="content-frame" src="./charts/table-3/" title="NDHS Table View"></iframe>
</div>

<script>
const frame   = document.getElementById('content-frame');
const navList = document.getElementById('nav-list');
const navItems = Array.from(navList.querySelectorAll('.nav-item'));
let currentRoute = null;
let frameHashSyncWindow = null;

function findNavItem(route) {
  return navItems.find(item => item.dataset.route === route) || null;
}

function parseRouteHash() {
  const raw = location.hash.replace(/^#/, '');
  if (!raw) return { route: null, childHash: '' };
  const sep = raw.indexOf('--');
  return {
    route: sep === -1 ? raw : raw.slice(0, sep),
    childHash: sep === -1 ? '' : raw.slice(sep + 2),
  };
}

function buildRouteHash(route, childHash = '') {
  return '#' + route + (childHash ? '--' + childHash : '');
}

function setActiveNav(route) {
  navItems.forEach(item => item.classList.toggle('active', item.dataset.route === route));
}

function syncParentUrlFromValue(childHash, replace = false) {
  if (!currentRoute) return;
  const nextHash = buildRouteHash(currentRoute, childHash);
  if (location.hash === nextHash) return;
  if (replace) {
    history.replaceState({ route: currentRoute, childHash }, '', nextHash);
  } else {
    history.pushState({ route: currentRoute, childHash }, '', nextHash);
  }
}

function syncParentUrl(replace = false) {
  if (!currentRoute) return;
  let childHash = '';
  try {
    childHash = frame.contentWindow?.location?.hash?.replace(/^#/, '') || '';
  } catch (e) {}
  syncParentUrlFromValue(childHash, replace);
}

function onFrameHashChange() {
  syncParentUrl(false);
}

function onChildStateMessage(event) {
  if (event.source !== frame.contentWindow) return;
  if (!event.data || event.data.type !== 'child-hash') return;
  syncParentUrlFromValue(String(event.data.hash || ''), false);
}

function bindFrameHashSync() {
  try {
    const win = frame.contentWindow;
    if (!win) return;
    if (frameHashSyncWindow && frameHashSyncWindow !== win) {
      frameHashSyncWindow.removeEventListener('hashchange', onFrameHashChange);
    }
    frameHashSyncWindow = win;
    frameHashSyncWindow.removeEventListener('hashchange', onFrameHashChange);
    frameHashSyncWindow.addEventListener('hashchange', onFrameHashChange);
  } catch (e) {}
}

function navigateTo(route, childHash = '', historyMode = 'push') {
  const item = findNavItem(route);
  if (!item || item.classList.contains('disabled')) return;

  currentRoute = route;
  setActiveNav(route);

  const src = item.dataset.src + (childHash ? '#' + childHash : '');
  if (frame.getAttribute('src') !== src) {
    frame.src = src;
  }

  if (historyMode === 'replace') {
    history.replaceState({ route, childHash }, '', buildRouteHash(route, childHash));
  } else if (historyMode === 'push') {
    history.pushState({ route, childHash }, '', buildRouteHash(route, childHash));
  }

  closeNav();
}

function applyRouteFromUrl(replace = false) {
  const { route, childHash } = parseRouteHash();
  if (!route) {
    navigateTo('fertilityrate', '', replace ? 'replace' : 'push');
    return;
  }
  navigateTo(route, childHash, replace ? 'replace' : 'none');
}

// ── Nav item clicks ────────────────────────────────────────────────────────
navList.addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (!item || item.classList.contains('disabled')) return;
  e.preventDefault();
  navigateTo(item.dataset.route, '', 'push');
});

// ── Mobile nav toggle ──────────────────────────────────────────────────────
const nav      = document.getElementById('nav');
const overlay  = document.getElementById('nav-overlay');
const hamburger = document.getElementById('hamburger');

function openNav()  { nav.classList.add('open');     overlay.classList.add('visible'); }
function closeNav() { nav.classList.remove('open');  overlay.classList.remove('visible'); }

hamburger.addEventListener('click', () => nav.classList.contains('open') ? closeNav() : openNav());
overlay.addEventListener('click', closeNav);

frame.addEventListener('load', () => {
  bindFrameHashSync();
  syncParentUrl(true);
});

window.addEventListener('popstate', () => {
  applyRouteFromUrl(true);
});
window.addEventListener('message', onChildStateMessage);

applyRouteFromUrl(true);
</script>
</body>
</html>
