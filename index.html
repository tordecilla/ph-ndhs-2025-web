<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 National Demographic and Health Survey - Philippines</title>
<style>
  :root {
    --bg: #edf1f7;
    --nav-bg: #fff;
    --nav-border: rgba(0,0,0,0.09);
    --nav-divider: rgba(0,0,0,0.06);
    --nav-w: 256px;
    --topbar-h: 0px;
    --btn-hover-bg: rgba(0,0,0,0.10);
    --eyebrow: rgba(0,0,0,0.36);
    --title-color: #1a2840;
    --muted: rgba(0,0,0,0.38);
    --text: rgba(0,0,0,0.70);
    --active-bg: rgba(42,95,143,0.08);
    --active-border: #2a5f8f;
    --scroll-thumb: rgba(0,0,0,0.10);
    --nav-toggle-size: 38px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: Inter, system-ui, sans-serif;
  }

  #nav {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    z-index: 20;
    display: flex;
    width: var(--nav-w);
    flex-direction: column;
    background: var(--nav-bg);
    border-right: 1px solid var(--nav-border);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  #main {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: var(--nav-w);
    overflow: hidden;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  #main iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
  }

  body.home-active #nav,
  body.nav-collapsed #nav {
    transform: translateX(calc(-1 * var(--nav-w)));
  }

  body.home-active #main,
  body.nav-collapsed #main {
    left: 0;
  }

  body.home-active #nav-pin { display: none; }

  #home-view {
    position: absolute;
    inset: 0;
    display: none;
    overflow-y: auto;
    padding: 34px 30px 60px;
    background:
      radial-gradient(1200px 700px at 100% -10%, rgba(23,103,138,0.10), transparent 55%),
      radial-gradient(900px 500px at -10% 100%, rgba(17,80,143,0.08), transparent 55%),
      var(--bg);
  }

  #home-view.active { display: block; }
  #home-view::-webkit-scrollbar,
  #nav-list::-webkit-scrollbar { width: 4px; }
  #home-view::-webkit-scrollbar-thumb,
  #nav-list::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }

  .home-wrap {
    max-width: 1080px;
    margin: 0 auto;
  }

  .home-title {
    margin-bottom: 14px;
    color: var(--title-color);
    font-size: 18px;
    font-weight: 600;
    line-height: 1.35;
  }

  .home-rows {
    display: grid;
    gap: 10px;
  }

  .home-row {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 12px;
    align-items: start;
    padding: 10px 14px;
    background: rgba(255,255,255,0.75);
    border: 1px solid var(--nav-border);
    border-radius: 10px;
  }

  .home-row-left {
    display: flex;
    gap: 8px;
    align-items: center;
    min-width: 0;
  }

  .home-icon {
    width: 18px;
    height: 18px;
    color: #1e5174;
    opacity: 0.9;
    flex: none;
  }

  .home-section-title {
    color: rgba(0,0,0,0.52);
    font: 9px/1 "IBM Plex Mono", monospace;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .home-links-line {
    color: var(--text);
    font-size: 11px;
    line-height: 1.65;
  }

  .home-link {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }

  .home-link:hover {
    color: var(--title-color);
    border-bottom-color: var(--title-color);
  }

  .home-sep { color: rgba(0,0,0,0.32); }

  .home-intro,
  .home-changelog {
    max-width: 820px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.65;
  }

  .home-intro { margin-top: 18px; }
  .home-intro p + p { margin-top: 8px; }
  .home-intro a {
    color: var(--title-color);
    text-decoration: none;
    border-bottom: 1px solid rgba(26,40,64,0.35);
  }

  .home-changelog {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--nav-border);
  }

  .home-changelog-title {
    margin-bottom: 8px;
    color: rgba(0,0,0,0.52);
    font: 10px/1 "IBM Plex Mono", monospace;
    letter-spacing: 1.4px;
    text-transform: uppercase;
  }

  .home-changelog h3 {
    margin-bottom: 6px;
    color: var(--title-color);
    font-size: 13px;
    font-weight: 600;
  }

  .home-changelog ul {
    margin-left: 16px;
    font-size: 12px;
    line-height: 1.65;
  }

  #nav-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--nav-divider);
    flex-shrink: 0;
  }

  #nav-title {
    margin-bottom: 5px;
    color: var(--title-color);
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
  }

  #nav-subtitle {
    color: var(--eyebrow);
    font: 9px/1 "IBM Plex Mono", monospace;
    letter-spacing: 1.8px;
    text-transform: uppercase;
  }

  #nav-pin {
    position: fixed;
    top: 50%;
    left: calc(var(--nav-w) - (var(--nav-toggle-size) / 2));
    z-index: 31;
    display: flex;
    width: var(--nav-toggle-size);
    height: var(--nav-toggle-size);
    align-items: center;
    justify-content: center;
    border: 1px solid var(--nav-border);
    border-radius: 999px;
    background: var(--nav-bg);
    color: var(--title-color);
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    transform: translateY(-50%);
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1), background 0.2s;
  }

  #nav-pin:hover { background: #f5f7fb; }
  body.nav-collapsed #nav-pin { left: 14px; }
  #nav-pin::before {
    content: '\2039';
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }
  body.nav-collapsed #nav-pin::before { content: '\203A'; }

  #nav-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 16px;
  }

  .nav-section-head {
    padding: 14px 18px 6px;
    color: var(--muted);
    flex-shrink: 0;
    font: 9px/1 "IBM Plex Mono", monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .nav-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 9px 18px;
    border-left: 2px solid transparent;
    color: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.12s;
  }

  .nav-item:hover { background: var(--btn-hover-bg); }
  .nav-item.active {
    background: var(--active-bg);
    border-left-color: var(--active-border);
  }

  .nav-title-text {
    color: var(--text);
    font-size: 12px;
    line-height: 1.4;
  }

  .nav-item.active .nav-title-text {
    color: var(--title-color);
    font-weight: 600;
  }

  @media (max-width: 680px) {
    :root { --topbar-h: 46px; }
    #topbar {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      z-index: 30;
      display: flex;
      height: var(--topbar-h);
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
    }
    #hamburger {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px;
      border: 0;
      background: none;
      cursor: pointer;
    }
    #hamburger span {
      display: block;
      width: 18px;
      height: 2px;
      background: var(--title-color);
      border-radius: 1px;
    }
    #topbar-title {
      color: var(--title-color);
      font-size: 13px;
      font-weight: 600;
    }
    #nav {
      top: var(--topbar-h);
      transform: translateX(-100%);
    }
    #nav.open { transform: translateX(0); }
    #main {
      top: var(--topbar-h);
      left: 0;
    }
    body.nav-collapsed #nav { transform: translateX(-100%); }
    #nav-pin { display: none; }
    #nav-overlay {
      position: fixed;
      inset: var(--topbar-h) 0 0;
      z-index: 19;
      display: none;
      background: rgba(0,0,0,0.3);
    }
    #nav-overlay.visible { display: block; }
    body.home-active #hamburger,
    body.home-active #topbar { display: none; }
    body.home-active #main { top: 0; }
    .home-row {
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 10px 12px;
    }
    .home-links-line {
      font-size: 10px;
      line-height: 1.7;
    }
  }

  @media (min-width: 681px) {
    #topbar,
    #nav-overlay { display: none !important; }
  }
</style>
</head>
<body>
<div id="topbar">
  <button id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  <span id="topbar-title">2025 NDHS</span>
</div>
<div id="nav-overlay"></div>
<button id="nav-pin" aria-label="Toggle menu" aria-expanded="true" title="Toggle menu"></button>

<nav id="nav">
  <div id="nav-header">
    <div id="nav-title">2025 National Demographic and Health Survey</div>
    <div id="nav-subtitle">Key Indicators</div>
  </div>
  <div id="nav-list"></div>
</nav>

<div id="main">
  <div id="home-view"></div>
  <iframe id="content-frame" title="NDHS View"></iframe>
</div>

<script>
const frame = document.getElementById('content-frame');
const navList = document.getElementById('nav-list');
const homeView = document.getElementById('home-view');
const navTitle = document.getElementById('nav-title');
const topbarTitle = document.getElementById('topbar-title');
const nav = document.getElementById('nav');
const overlay = document.getElementById('nav-overlay');
const hamburger = document.getElementById('hamburger');
const navPin = document.getElementById('nav-pin');

const DEFAULT_TITLE = '2025 National Demographic and Health Survey - Philippines';
const HOME_TITLE = 'Home | 2025 National Demographic and Health Survey';
const HOME_ROUTE = 'home';
const ROUTE_ALIASES = {
  'background-characteristics-2025': 'backgroundcharacteristics',
  'fertility-rate-2025': 'fertilityrate',
};
const LEGACY_NAV_ENTRIES = [
  { slug: 'results-of-household-and-individual-interviews-2025', route: 'surveyprofile', sectionTitle: 'SURVEY PROFILE', title: 'Results of the Household and Individual Interviews' },
  { slug: 'background-characteristics-2025', route: 'backgroundcharacteristics', sectionTitle: 'SURVEY PROFILE', title: 'Background Characteristics' },
  { slug: 'fertility-rate-2025', route: 'fertilityrate', sectionTitle: 'Fertility', title: 'Fertility Rate' },
  { slug: 'teenage-pregnancy-2025', route: 'teenagepregnancy', sectionTitle: 'Fertility', title: 'Teenage Pregnancy' },
  { slug: 'fertility-preferences-2025', route: 'fertilitypreferences', sectionTitle: 'Fertility', title: 'Fertility Preferences' },
  { slug: 'desire-to-limit-childbearing-2025', route: 'desiretolimitchildbearing', sectionTitle: 'Fertility', title: 'Desire to Limit Childbearing' },
  { slug: 'antenatal-care-2025', route: 'antenatalcare', sectionTitle: 'Maternal Care', title: 'Antenatal Care' },
  { slug: 'birth-delivery-2025', route: 'birthdelivery', sectionTitle: 'Maternal Care', title: 'Birth Delivery' },
  { slug: 'postnatal-check-2025', route: 'postnatalcheck', sectionTitle: 'Maternal Care', title: 'Postnatal Check' },
  { slug: 'contraception-all-women-2025', route: 'contraceptionallwomen', sectionTitle: 'Contraception', title: 'Contraception Among All Women' },
  { slug: 'modern-contraception-all-women-2025', route: 'moderncontraceptionallwomen', sectionTitle: 'Contraception', title: 'Modern Contraception Among All Women' },
  { slug: 'traditional-contraception-all-women-2025', route: 'traditionalcontraceptionallwomen', sectionTitle: 'Contraception', title: 'Traditional Contraception Among All Women' },
  { slug: 'contraception-married-sexually-active-women-2025', route: 'contraceptionmarriedsexuallyactivewomen', sectionTitle: 'Contraception', title: 'Contraception Among Married and Sexually Active Women' },
  { slug: 'modern-contraception-married-sexually-active-women-2025', route: 'moderncontraceptionmarriedsexuallyactivewomen', sectionTitle: 'Contraception', title: 'Modern Contraception Among Married and Sexually Active Women' },
  { slug: 'traditional-contraception-married-sexually-active-women-2025', route: 'traditionalcontraceptionmarriedsexuallyactivewomen', sectionTitle: 'Contraception', title: 'Traditional Contraception Among Married and Sexually Active Women' },
  { slug: 'source-of-modern-contraception-methods-2025', route: 'sourceofmoderncontraceptionmethods', sectionTitle: 'Contraception', title: 'Source of Modern Contraception Methods' },
  { slug: 'family-planning-all-women-2025', route: 'familyplanningallwomen', sectionTitle: 'Contraception', title: 'Family Planning Among All Women' },
  { slug: 'family-planning-married-sexually-active-women-2025', route: 'familyplanningmarriedsexuallyactivewomen', sectionTitle: 'Contraception', title: 'Family Planning Among Married and Sexually Active Women' },
  { slug: 'early-childhood-mortality-rates-2025', route: 'earlychildhoodmortalityrates', sectionTitle: 'Child Mortality', title: 'Early Childhood Mortality Rates' },
  { slug: 'five-year-early-childhood-mortality-rates-2025', route: 'fiveyearearlychildhoodmortalityrates', sectionTitle: 'Child Mortality', title: 'Five-Year Early Childhood Mortality Rates' },
  { slug: 'ten-year-early-childhood-mortality-rates-2025', route: 'tenyearearlychildhoodmortalityrates', sectionTitle: 'Child Mortality', title: 'Ten-Year Early Childhood Mortality Rates' },
  { slug: 'vaccinations-12-to-23-vaccination-status-2025', route: 'vaccinationstatus', sectionTitle: 'Vaccinations', title: 'Children 12-23 Months: Vaccination Status' },
  { slug: 'vaccinations-12-to-23-bcg-hepb-mmr1-2025', route: 'bcghepbmmr1', sectionTitle: 'Vaccinations', title: 'Children 12-23 Months: BCG, HepB, MMR1' },
  { slug: 'vaccinations-12-to-23-polio-vaccinations-2025', route: 'poliovaccinations', sectionTitle: 'Vaccinations', title: 'Children 12-23 Months: Polio Vaccinations' },
  { slug: 'vaccinations-12-to-23-pcv-vaccinations-2025', route: 'pcvvaccinations', sectionTitle: 'Vaccinations', title: 'Children 12-23 Months: PCV Vaccinations' },
  { slug: 'vaccinations-24-to-35-mmr2-full-schedule-2025', route: 'mmr2fullschedule', sectionTitle: 'Vaccinations', title: 'Children 24-35 Months: MMR2 and Full Schedule' },
  { slug: 'child-discipline-2025', route: 'childdiscipline', sectionTitle: 'Discipline and Punishment', title: 'Child Discipline' },
  { slug: 'attitudes-toward-physical-punishment-2025', route: 'attitudestowardphysicalpunishment', sectionTitle: 'Discipline and Punishment', title: 'Attitudes Toward Physical Punishment' },
  { slug: 'early-childhood-development-index-2030-2025', route: 'earlychildhooddevelopmentindex2030', sectionTitle: 'Early Childhood Development', title: 'Early Childhood Development Index 2030' },
  { slug: 'intimate-partner-violence-2025', route: 'intimatepartnerviolence', sectionTitle: 'Violence', title: 'Intimate Partner Violence' },
];

let pages = [];
let navItems = [];
let currentRoute = null;
let frameHashSyncWindow = null;

function routeForPage(page) {
  return page.route || ROUTE_ALIASES[page.slug] || page.slug;
}

function findNavItem(route) {
  return navItems.find(item => item.dataset.route === route) || null;
}

function parseRouteHash() {
  const raw = location.hash.replace(/^#/, '');
  if (!raw) return { route: null, childHash: '' };
  const sep = raw.indexOf('--');
  return {
    route: sep === -1 ? raw : raw.slice(0, sep),
    childHash: sep === -1 ? '' : raw.slice(sep + 2),
  };
}

function buildRouteHash(route, childHash = '') {
  return '#' + route + (childHash ? '--' + childHash : '');
}

function getRouteTitle(route) {
  if (route === HOME_ROUTE) return HOME_TITLE;
  const item = findNavItem(route);
  if (!item) return DEFAULT_TITLE;
  const label = item.querySelector('.nav-title-text')?.textContent?.trim() || route;
  return `${label} | 2025 National Demographic and Health Survey`;
}

function setActiveNav(route) {
  navItems.forEach(item => item.classList.toggle('active', item.dataset.route === route));
  if (route === HOME_ROUTE) {
    topbarTitle.textContent = '2025 NDHS';
    document.title = HOME_TITLE;
    return;
  }
  const item = findNavItem(route);
  const label = item?.querySelector('.nav-title-text')?.textContent?.trim() || '2025 NDHS';
  topbarTitle.textContent = label;
  document.title = getRouteTitle(route);
}

function syncParentUrlFromValue(childHash, replace = false) {
  if (!currentRoute || currentRoute === HOME_ROUTE) return;
  const nextHash = buildRouteHash(currentRoute, childHash);
  if (location.hash === nextHash) return;
  if (replace) history.replaceState({ route: currentRoute, childHash }, '', nextHash);
  else history.pushState({ route: currentRoute, childHash }, '', nextHash);
}

function syncParentUrl(replace = false) {
  if (!currentRoute || currentRoute === HOME_ROUTE) return;
  let childHash = '';
  try {
    childHash = frame.contentWindow?.location?.hash?.replace(/^#/, '') || '';
  } catch (e) {}
  syncParentUrlFromValue(childHash, replace);
}

function onFrameHashChange() {
  syncParentUrl(false);
}

function onChildStateMessage(event) {
  if (event.source !== frame.contentWindow) return;
  if (!event.data || event.data.type !== 'child-hash') return;
  syncParentUrlFromValue(String(event.data.hash || ''), false);
}

function bindFrameHashSync() {
  try {
    const win = frame.contentWindow;
    if (!win) return;
    if (frameHashSyncWindow && frameHashSyncWindow !== win) {
      frameHashSyncWindow.removeEventListener('hashchange', onFrameHashChange);
    }
    frameHashSyncWindow = win;
    frameHashSyncWindow.removeEventListener('hashchange', onFrameHashChange);
    frameHashSyncWindow.addEventListener('hashchange', onFrameHashChange);
  } catch (e) {}
}

function showHomeView() {
  document.body.classList.add('home-active');
  homeView.classList.add('active');
  frame.style.display = 'none';
}

function hideHomeView() {
  document.body.classList.remove('home-active');
  homeView.classList.remove('active');
  frame.style.display = 'block';
}

function sectionIcon(title) {
  const key = String(title || '').toLowerCase();
  const svg = (paths) => `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" width="24" height="24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
  if (key.includes('survey profile')) {
    return svg('<circle cx="12" cy="8" r="3"></circle><path d="M5 19c1.6-3 4-4.5 7-4.5s5.4 1.5 7 4.5"></path>');
  }
  if (key.includes('fertility')) {
    return svg('<path d="M4 14c3.5 0 6.5-2.2 8-6 1.5 3.8 4.5 6 8 6"></path><path d="M12 8v12"></path><path d="M7 17h10"></path>');
  }
  if (key.includes('maternal care')) {
    return svg('<path d="M12 20s-6.8-4.2-6.8-9.1c0-2.1 1.7-3.8 3.8-3.8 1.3 0 2.4.6 3 1.7.6-1.1 1.7-1.7 3-1.7 2.1 0 3.8 1.7 3.8 3.8 0 4.9-6.8 9.1-6.8 9.1z"></path><path d="M10.6 12h2.8"></path><path d="M12 10.6v2.8"></path>');
  }
  if (key.includes('contraception')) {
    return svg('<circle cx="12" cy="12" r="7.5"></circle><path d="M7.2 16.8L16.8 7.2"></path><path d="M12 4.5v2.3"></path><path d="M12 17.2v2.3"></path>');
  }
  if (key.includes('family planning')) {
    return svg('<path d="M4 17h16"></path><path d="M6 15l3-3 2 2 4-4 3 2"></path>');
  }
  if (key.includes('child mortality')) {
    return svg('<path d="M6 18l9-9"></path><path d="M13.8 5.2l5 5"></path><path d="M5 19l2.8-.7L18 8.1l-2.4-2.4L5.7 15.6z"></path>');
  }
  if (key.includes('vaccinations')) {
    return svg('<path d="M6.2 8.2h8.2a3.6 3.6 0 1 1 0 7.2H9.4"></path><path d="M8 6.6l-2 1.6 2 1.6"></path><path d="M6.2 15.4h6.8"></path><path d="M6.2 18h4.8"></path>');
  }
  if (key.includes('discipline')) {
    return svg('<circle cx="9" cy="9" r="3"></circle><circle cx="15" cy="9" r="3"></circle><path d="M4.5 18c1.2-2.7 3-4 4.5-4s3.3 1.3 4.5 4"></path><path d="M10.5 18c1.1-2.5 2.6-3.6 4.5-3.6 1.7 0 3.2 1.1 4.5 3.6"></path>');
  }
  if (key.includes('violence')) {
    return svg('<path d="M12 3.8l8 14.2H4L12 3.8z"></path><path d="M12 9v4.8"></path><circle cx="12" cy="15.9" r="0.8" fill="currentColor" stroke="none"></circle>');
  }
  return svg('<circle cx="12" cy="12" r="7"></circle><path d="M12 9v6"></path><path d="M9 12h6"></path>');
}

function buildHomeView() {
  const grouped = groupPagesBySection();
  const rows = grouped.map(section => {
    const links = section.items.map(item =>
      `<a class="home-link" data-home-route="${routeForPage(item)}" href="#${routeForPage(item)}">${item.title}</a>`
    ).join('<span class="home-sep"> &bull; </span>');
    return `
      <section class="home-row">
        <div class="home-row-left">
          <div class="home-icon">${sectionIcon(section.title)}</div>
          <div class="home-section-title">${section.title}</div>
        </div>
        <div class="home-links-line">${links}</div>
      </section>
    `;
  }).join('');

  homeView.innerHTML = `
    <div class="home-wrap">
      <div class="home-title">2025 National Demographic and Health Survey</div>
      <div class="home-rows">${rows}</div>
      <div class="home-intro">
        <p>This is an independent digital dashboard companion to the 2025 National Demographic and Health Survey Key Indicators released by the Philippine Statistics Authority. Built by <strong><a href="https://www.linkedin.com/in/jaemark/" target="_blank" rel="noopener">Jaemark Tordecilla</a></strong> with help from coding agents, it turns the published statistical tables into interactive maps, charts, data tables, and short narrative insights for easier exploration and comparison across the Philippines.</p>
        <p>This is not an official Philippine Statistics Authority project. The original survey materials are available from the PSA: <a href="https://psa.gov.ph/statistics/national-demographic-health-survey" target="_blank" rel="noopener">National Demographic and Health Survey</a>.</p>
        <p>Some insights and summaries were generated with AI assistance and checked against the underlying NDHS data. They are intended to support exploration and interpretation, and should be read alongside the official PSA tables, notes, and publications.</p>
      </div>
      <section class="home-changelog" aria-label="Changelog">
        <div class="home-changelog-title">Changelog</div>
        <h3>Version 1.1</h3>
        <ul>
          <li>Improved the site's data handling.</li>
          <li>Regenerated AI insights with a fact-checking workflow.</li>
          <li>Added map views for 2025, 2022, and change over time.</li>
          <li>Updated map colors for clearer regional comparison.</li>
          <li>Standardized chart colors for clearer data comparisons.</li>
        </ul>
        <h3>Version 1.0</h3>
        <ul>
          <li>Initial public release.</li>
        </ul>
      </section>
    </div>
  `;
}

function groupPagesBySection() {
  const sections = [];
  pages.forEach(page => {
    const sectionTitle = page.sectionTitle || 'Other';
    let section = sections[sections.length - 1];
    if (!section || section.title !== sectionTitle) {
      section = { title: sectionTitle, items: [] };
      sections.push(section);
    }
    section.items.push(page);
  });
  return sections;
}

function renderNav() {
  navList.innerHTML = '';
  groupPagesBySection().forEach(section => {
    const head = document.createElement('div');
    head.className = 'nav-section-head';
    head.textContent = section.title;
    navList.appendChild(head);
    section.items.forEach(page => {
      const route = routeForPage(page);
      const item = document.createElement('a');
      item.className = 'nav-item';
      item.dataset.route = route;
      item.dataset.src = page.href || `./${page.slug}/`;
      item.href = '#' + route;
      const title = document.createElement('span');
      title.className = 'nav-title-text';
      title.textContent = page.title;
      item.appendChild(title);
      navList.appendChild(item);
    });
  });
  navItems = Array.from(navList.querySelectorAll('.nav-item'));
}

function navigateTo(route, childHash = '', historyMode = 'push') {
  if (route === HOME_ROUTE) {
    currentRoute = HOME_ROUTE;
    setActiveNav(HOME_ROUTE);
    showHomeView();
    if (historyMode === 'replace') history.replaceState({ route: HOME_ROUTE, childHash: '' }, '', buildRouteHash(HOME_ROUTE, ''));
    else if (historyMode === 'push') history.pushState({ route: HOME_ROUTE, childHash: '' }, '', buildRouteHash(HOME_ROUTE, ''));
    closeNav();
    return;
  }

  const item = findNavItem(route);
  if (!item) return;

  currentRoute = route;
  setActiveNav(route);
  hideHomeView();
  frame.src = item.dataset.src + (childHash ? '#' + childHash : '');

  if (historyMode === 'replace') history.replaceState({ route, childHash }, '', buildRouteHash(route, childHash));
  else if (historyMode === 'push') history.pushState({ route, childHash }, '', buildRouteHash(route, childHash));

  closeNav();
}

function applyRouteFromUrl(replace = false) {
  const { route, childHash } = parseRouteHash();
  if (!route) {
    navigateTo(HOME_ROUTE, '', replace ? 'replace' : 'push');
    return;
  }
  if (route === HOME_ROUTE) {
    navigateTo(HOME_ROUTE, '', replace ? 'replace' : 'none');
    return;
  }
  navigateTo(route, childHash, replace ? 'replace' : 'none');
}

navList.addEventListener('click', event => {
  const item = event.target.closest('.nav-item');
  if (!item) return;
  event.preventDefault();
  navigateTo(item.dataset.route, '', 'push');
});

homeView.addEventListener('click', event => {
  const link = event.target.closest('[data-home-route]');
  if (!link) return;
  event.preventDefault();
  navigateTo(link.dataset.homeRoute, '', 'push');
});

function openNav() { nav.classList.add('open'); overlay.classList.add('visible'); }
function closeNav() { nav.classList.remove('open'); overlay.classList.remove('visible'); }
function toggleDesktopNav() {
  document.body.classList.toggle('nav-collapsed');
  navPin.setAttribute('aria-expanded', String(!document.body.classList.contains('nav-collapsed')));
}

hamburger.addEventListener('click', () => nav.classList.contains('open') ? closeNav() : openNav());
overlay.addEventListener('click', closeNav);
navPin.addEventListener('click', toggleDesktopNav);
navTitle.addEventListener('click', () => navigateTo(HOME_ROUTE, '', 'push'));
topbarTitle.addEventListener('click', () => navigateTo(HOME_ROUTE, '', 'push'));
frame.addEventListener('load', () => {
  bindFrameHashSync();
  syncParentUrl(true);
});
window.addEventListener('popstate', () => applyRouteFromUrl(true));
window.addEventListener('message', onChildStateMessage);

async function pageHasShell(page) {
  try {
    const href = page.href || `./${page.slug}/`;
    const response = await fetch(href.replace(/\/?$/, '/') + 'index.html', { method: 'HEAD', cache: 'no-cache' });
    return response.ok;
  } catch (e) {
    return false;
  }
}

async function init() {
  const response = await fetch('./manifest.json', { cache: 'no-cache' });
  const manifest = await response.json();
  const manifestPages = Array.isArray(manifest.pages) ? manifest.pages : [];
  const manifestBySlug = new Map(manifestPages.map(page => [page.slug, page]));
  const seen = new Set();
  const legacyCandidates = LEGACY_NAV_ENTRIES
    .filter(entry => manifestBySlug.has(entry.slug))
    .map(entry => {
      seen.add(entry.slug);
      return {
        ...manifestBySlug.get(entry.slug),
        route: entry.route,
        sectionTitle: entry.sectionTitle,
        title: entry.title,
      };
    });
  const fallbackCandidates = manifestPages.filter(page => !seen.has(page.slug));
  const candidates = legacyCandidates.concat(fallbackCandidates);
  const checks = await Promise.all(candidates.map(async page => ({ page, ok: await pageHasShell(page) })));
  pages = checks.filter(item => item.ok).map(item => item.page);
  renderNav();
  buildHomeView();
  applyRouteFromUrl(true);
}

init().catch(error => {
  navList.innerHTML = '<div class="nav-section-head">Error</div><div class="nav-item"><span class="nav-title-text">Unable to load navigation</span></div>';
  homeView.innerHTML = '<div class="home-wrap"><div class="home-title">Unable to load navigation</div></div>';
  showHomeView();
  console.error(error);
});
</script>
</body>
